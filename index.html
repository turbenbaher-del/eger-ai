        ref.set({username:uname,displayName:user.displayName||"Рыбак"},{merge:true});
        setUsername(uname);
      });
    },[user]);

    // строит base в момент вызова (не при рендере) — избегает stale uid
    const mkBase = () => ({
      uid: user.uid,
      displayName: user.displayName || "Рыбак",
      username: username || genUsername(user.displayName||"рыбак"),
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    /* ── upload helper ── */
    const uploadFile = async (blob, path, contentType) => {
      const ref = storage.ref(path);
      const task = ref.put(blob, {contentType});
      await new Promise((res, rej) => task.on("state_changed", ()=>{}, rej, res));
      return await ref.getDownloadURL();
    };

    /* ── reactions ── */
    const toggleReaction = async (msgId, emoji) => {
      if(!user){ onLogin(); return; }
      setSelectedMsg(null);
      const ref=db.collection("messages").doc(msgId);
      const doc=await ref.get();
      const reactions=doc.data().reactions||{};
      const upd={};
      // Снять предыдущую реакцию пользователя (одна реакция на пользователя)
      for(const [e, uids] of Object.entries(reactions)){
        if(uids.includes(user.uid)){
          const filtered=uids.filter(u=>u!==user.uid);
          upd[`reactions.${e}`]=filtered.length>0?filtered:firebase.firestore.FieldValue.delete();
        }
      }
      // Добавить новую, если не совпадает с предыдущей (нажал ту же — снял)
      const alreadyHad=(reactions[emoji]||[]).includes(user.uid);
      if(!alreadyHad){
        const cur=(reactions[emoji]||[]).filter(u=>u!==user.uid);
        upd[`reactions.${emoji}`]=[...cur,user.uid];
      }
      if(Object.keys(upd).length>0) await ref.update(upd);
    };

    /* ── delete ── */
    const deleteMsg = async (msgId) => {
      setSelectedMsg(null);
      await db.collection("messages").doc(msgId).delete();
    };

    /* ── edit ── */
    const startEdit = (msg) => {
      setEditingMsg({id: msg.id, text: msg.text});
      setInput(msg.text);
      setSelectedMsg(null);
    };

    const cancelEdit = () => {
      setEditingMsg(null);
      setInput("");
    };

    /* ── text / edit ── */
    const send = async () => {
      const text = input.trim(); if(!text) return;
      if(!user){ onLogin(); return; }

      // Режим редактирования
      if(editingMsg) {
        setInput(""); setEditingMsg(null);
        try {
          await db.collection("messages").doc(editingMsg.id).update({text, edited: true});
        } catch(e) { alert("Ошибка редактирования: " + e.message); }
        return;
      }

      setInput(""); setReplyTo(null); setSelectedMsg(null);
      try {
        const base = mkBase();
        const msg = {...base, type:"text", text};
        if(replyTo) msg.replyTo={id:replyTo.id,text:replyTo.text||"",displayName:replyTo.displayName,username:replyTo.username||""};
        await db.collection("messages").add(msg);
      } catch(e) {
        setInput(text);
        alert("Ошибка отправки: " + e.message + "\n\nПроверь правила Firestore — разреши write для коллекции messages.");
      }
    };

    /* ── photo ── */
    const sendPhoto = async (file) => {
      if(!file) return;
      if(!user){ onLogin(); return; }
      setAttachOpen(false); setMediaUploading(true);
      try {
        const url = await uploadFile(file, `chat_photos/${user.uid}_${Date.now()}.jpg`, file.type||"image/jpeg");
        await db.collection("messages").add({...mkBase(), type:"image", imageUrl:url});
      } catch(e) {
        alert("Ошибка загрузки фото: " + e.message + "\n\nПроверь правила Firebase Storage.");
      }
      setMediaUploading(false);
    };

    /* ── video from gallery ── */
    const sendVideoFile = async (file) => {
      if(!file) return;
      if(!user){ onLogin(); return; }
      setAttachOpen(false); setMediaUploading(true);
      try {
        const ext = (file.name||"").split(".").pop() || "mp4";
        const url = await uploadFile(file, `chat_videos/${user.uid}_${Date.now()}.${ext}`, file.type||"video/mp4");
        await db.collection("messages").add({...mkBase(), type:"video", videoUrl:url});
      } catch(e) {
        alert("Ошибка загрузки видео: " + e.message);
      }
      setMediaUploading(false);
    };

    /* ── video circle ── */
    const [camFacing, setCamFacing] = useState("environment");

    const startCamStream = async (facing) => {
      if(vidStream.current){ vidStream.current.getTracks().forEach(t=>t.stop()); vidStream.current=null; }
      const s = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:facing, width:{ideal:400}, height:{ideal:400}},
        audio: true
      });
      vidStream.current = s;
      if(liveRef.current){ liveRef.current.srcObject=s; liveRef.current.play(); }
      return s;
    };

    const openVideoRec = async () => {
      if(!user){ onLogin(); return; }
      setAttachOpen(false);
      setVidBlob(null); setVidPreview(null); setVidRec(false); setVidSec(0);
      try {
        await startCamStream(camFacing);
        setShowVideoRec(true);
      } catch(e){ alert("Нет доступа к камере: " + e.message); }
    };

    const flipCamera = async () => {
      if(vidRec) return; // нельзя флипнуть во время записи
      const newFacing = camFacing === "environment" ? "user" : "environment";
      setCamFacing(newFacing);
      try { await startCamStream(newFacing); }
      catch(e){ alert("Не удалось переключить камеру: " + e.message); }
    };

    const startVidRec = () => {
      if(!vidStream.current) return;
      vidChunks.current = [];
      const mime = MediaRecorder.isTypeSupported("video/mp4") ? "video/mp4" : "video/webm";
      const mr = new MediaRecorder(vidStream.current, {mimeType:mime});
      mr.ondataavailable = e => { if(e.data&&e.data.size>0) vidChunks.current.push(e.data); };
      mr.onstop = () => {
        const blob = new Blob(vidChunks.current, {type:mime});
        setVidBlob(blob); setVidPreview(URL.createObjectURL(blob)); setVidRec(false);
        if(liveRef.current) liveRef.current.srcObject = null;
        if(vidStream.current){ vidStream.current.getTracks().forEach(t=>t.stop()); vidStream.current=null; }
      };
      mr.start(100); vidMR.current = mr;
      setVidRec(true); setVidSec(0);
      vidTimer.current = setInterval(()=>setVidSec(s=>{ if(s>=59){stopVidRec();return 60;} return s+1; }),1000);
    };

    const stopVidRec = () => {
      if(vidTimer.current){ clearInterval(vidTimer.current); vidTimer.current=null; }
      if(vidMR.current && vidMR.current.state!=="inactive") vidMR.current.stop();
    };

    const closeVideoRec = () => {
      stopVidRec();
      if(vidStream.current){ vidStream.current.getTracks().forEach(t=>t.stop()); vidStream.current=null; }
      setShowVideoRec(false); setVidBlob(null); setVidPreview(null); setVidRec(false); setVidSec(0);
    };

    const sendVideoCircle = async () => {
      if(!vidBlob||!user) return;
      setVidUploading(true);
      try {
        const ext = vidBlob.type.includes("mp4") ? "mp4" : "webm";
        const url = await uploadFile(vidBlob, `chat_videos/${user.uid}_${Date.now()}.${ext}`, vidBlob.type);
        await db.collection("messages").add({...mkBase(), type:"video", videoUrl:url});
        closeVideoRec();
      } catch(e){ alert("Ошибка: " + e.message + "\n\nПроверь правила Firebase Storage."); }
      setVidUploading(false);
    };

    /* ── voice ── */
    const startVoice = async () => {
      if(!user){ onLogin(); return; }
      try {
        const s = await navigator.mediaDevices.getUserMedia({audio:true});
        voiceStream.current = s; voiceChunks.current = [];
        const mime = MediaRecorder.isTypeSupported("audio/mp4") ? "audio/mp4" : "audio/webm";
        const mr = new MediaRecorder(s, {mimeType:mime});
        mr.ondataavailable = e => { if(e.data&&e.data.size>0) voiceChunks.current.push(e.data); };
        mr.onstop = async () => {
          const blob = new Blob(voiceChunks.current, {type:mime});
          const dur = voiceSec;
          setVoiceRec(false); setVoiceSec(0);
          try {
            const ext = mime.includes("mp4") ? "m4a" : "webm";
            const url = await uploadFile(blob, `chat_voice/${user.uid}_${Date.now()}.${ext}`, mime);
            await db.collection("messages").add({...mkBase(), type:"voice", voiceUrl:url, dur});
          } catch(e){ alert("Ошибка загрузки голосового: " + e.message); }
        };
        mr.start(100); voiceMR.current = mr;
        setVoiceRec(true); setVoiceSec(0);
        voiceTimer.current = setInterval(()=>setVoiceSec(s=>{ if(s>=120){stopVoice();return 120;} return s+1; }),1000);
      } catch(e){ alert("Нет доступа к микрофону: " + e.message); }
    };

    const stopVoice = () => {
      if(voiceTimer.current){ clearInterval(voiceTimer.current); voiceTimer.current=null; }
      if(voiceMR.current && voiceMR.current.state!=="inactive") voiceMR.current.stop();
      if(voiceStream.current){ voiceStream.current.getTracks().forEach(t=>t.stop()); voiceStream.current=null; }
    };

    const aColor=uid=>{const cols=[C.accent,C.cyan,C.gold,C.blue,"#a78bfa","#f472b6"];let h=0;for(let c of(uid||"x"))h=(h*31+c.charCodeAt(0))%cols.length;return cols[h];};
    const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{padding:"10px 16px 8px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center"}}><MessageCircle size={17} color="#fff"/></div>
            <div><div style={{fontSize:13,fontWeight:700,color:C.text}}>Чат рыбаков</div><div style={{fontSize:10,color:C.accent}}>{onlineCount} онлайн · Ростовская обл.</div></div>
          </div>
          {!user&&<button onClick={onLogin} style={{padding:"6px 12px",borderRadius:12,border:`1px solid ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:11,fontWeight:700,cursor:"pointer"}}>Войти</button>}
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"12px 12px 6px"}} onClick={()=>setAttachOpen(false)}>
          {messages.length===0&&<div style={{textAlign:"center",padding:40,color:C.dimmer}}><MessageCircle size={40} color={C.dimmer} style={{margin:"0 auto 12px",display:"block"}}/><div style={{fontSize:14}}>Будь первым!</div></div>}
          {messages.map(msg=>{
            const isMe=user&&msg.uid===user.uid, col=aColor(msg.uid), ts=msg.timestamp?fmtDate(msg.timestamp):"";
            const isVideo=msg.type==="video"&&msg.videoUrl;
            const isVoice=msg.type==="voice"&&msg.voiceUrl;
            const isImage=msg.type==="image"&&msg.imageUrl;
            const isSel=selectedMsg===msg.id;
            const rxEntries=Object.entries(msg.reactions||{}).filter(([,u])=>u&&u.length>0);
            return (
              <div key={msg.id} style={{display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start",marginBottom:10,animation:"fadeUp .25s ease"}}>
                <div style={{display:"flex",justifyContent:isMe?"flex-end":"flex-start",width:"100%"}}>
                  {!isMe&&<div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,background:`linear-gradient(135deg,${col},${col}88)`,display:"flex",alignItems:"center",justifyContent:"center",marginRight:8,alignSelf:"flex-end",fontSize:13,fontWeight:800,color:"#07111e"}}>{(msg.displayName||"Р")[0].toUpperCase()}</div>}
                  <div style={{maxWidth:isVideo?"160px":"75%"}} onClick={()=>setSelectedMsg(isSel?null:msg.id)}>
                    {!isMe&&<div style={{fontSize:10,color:col,fontWeight:700,marginBottom:2,paddingLeft:4}}>
                      {msg.displayName}
                      {msg.username&&<span style={{color:C.dimmer,fontWeight:400,marginLeft:4}}>@{msg.username}</span>}
                    </div>}
                    {/* Reply preview inside bubble */}
                    {msg.replyTo&&<div style={{margin:"0 0 6px",padding:"6px 10px",borderRadius:8,background:"rgba(255,255,255,.06)",borderLeft:`3px solid ${col}`,cursor:"default"}} onClick={e=>e.stopPropagation()}>
                      <div style={{fontSize:10,color:col,fontWeight:700,marginBottom:1}}>{msg.replyTo.displayName}{msg.replyTo.username?` @${msg.replyTo.username}`:""}</div>
                      <div style={{fontSize:11,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:180}}>{msg.replyTo.text||"медиафайл"}</div>
                    </div>}
                    {isVideo&&<div>
                      <VideoNote url={msg.videoUrl} isMe={isMe} col={col}/>
                      <div style={{display:"flex",alignItems:"center",justifyContent:isMe?"flex-end":"flex-start",gap:8,marginTop:4}}>
                        <div style={{fontSize:9,opacity:.4}}>{ts}</div>
                        <button onClick={e=>{e.stopPropagation();setSelectedMsg(isSel?null:msg.id);}}
                          style={{background:"rgba(255,255,255,.07)",border:`1px solid ${C.border}`,borderRadius:12,padding:"2px 8px",fontSize:12,cursor:"pointer",color:C.muted}}>
                          😊
                        </button>
                      </div>
                    </div>}
                    {isVoice&&<div>
                      <VoiceMessage url={msg.voiceUrl} dur={msg.dur} isMe={isMe} col={col}/>
                      <div style={{display:"flex",alignItems:"center",justifyContent:isMe?"flex-end":"flex-start",gap:8,marginTop:4}}>
                        <div style={{fontSize:9,opacity:.4}}>{ts}</div>
                        <button onClick={e=>{e.stopPropagation();setSelectedMsg(isSel?null:msg.id);}}
                          style={{background:"rgba(255,255,255,.07)",border:`1px solid ${C.border}`,borderRadius:12,padding:"2px 8px",fontSize:12,cursor:"pointer",color:C.muted}}>
                          😊
                        </button>
                      </div>
                    </div>}
                    {isImage&&<div>
                      <div style={{position:"relative",display:"inline-block"}}>
                        <img src={msg.imageUrl} alt="" style={{maxWidth:220,maxHeight:200,borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",display:"block",objectFit:"cover"}}/>
                        <a href={msg.imageUrl} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
                          style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,.6)",borderRadius:8,padding:"3px 8px",fontSize:11,color:"#fff",textDecoration:"none",backdropFilter:"blur(4px)"}}>
                          🔍
                        </a>
                      </div>
                      <div style={{fontSize:9,marginTop:4,opacity:.4,textAlign:isMe?"right":"left"}}>{ts}</div>
                    </div>}
                    {!isVideo&&!isVoice&&!isImage&&<div style={{padding:"10px 14px",borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",background:isMe?`linear-gradient(135deg,#1a5276,${C.blue})`:"rgba(255,255,255,0.07)",border:isMe?"none":`1px solid ${C.border}`,color:C.text,fontSize:13.5,lineHeight:1.5}}>
                      {msg.text}
                      <div style={{fontSize:9,marginTop:4,opacity:.4,textAlign:"right",display:"flex",justifyContent:"flex-end",gap:6}}>
                        {msg.edited&&<span>изменено</span>}
                        <span>{ts}</span>
                      </div>
                    </div>}
                  </div>
                </div>

                {/* Reactions display */}
                {rxEntries.length>0&&<div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap",paddingLeft:isMe?0:40}}>
                  {rxEntries.map(([emoji,uids])=>(
                    <button key={emoji} onClick={()=>toggleReaction(msg.id,emoji)}
                      style={{display:"flex",alignItems:"center",gap:3,padding:"3px 8px",borderRadius:20,border:`1px solid ${uids.includes(user?.uid)?C.borderHi:C.border}`,background:uids.includes(user?.uid)?C.accentDim:"rgba(255,255,255,.04)",cursor:"pointer",fontSize:13}}>
                      <span>{emoji}</span><span style={{fontSize:11,color:C.muted,fontWeight:700}}>{uids.length}</span>
                    </button>
                  ))}
                </div>}

                {/* Action bar: reply + reactions + edit/delete */}
                {isSel&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:6,padding:"4px 8px",background:"rgba(7,17,30,.96)",borderRadius:20,border:`1px solid ${C.border}`,boxShadow:"0 4px 16px rgba(0,0,0,.5)",animation:"fadeUp .15s ease",flexWrap:"wrap",maxWidth:320}}>
                  <button onClick={()=>{setReplyTo(msg);setSelectedMsg(null);}} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:14,background:"none",border:`1px solid ${C.border}`,color:C.muted,fontSize:11,cursor:"pointer",fontWeight:700}}>
                    ↩ Ответить
                  </button>
                  {isMe&&msg.type==="text"&&<button onClick={()=>startEdit(msg)} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:14,background:"none",border:`1px solid ${C.border}`,color:C.cyan,fontSize:11,cursor:"pointer",fontWeight:700}}>
                    ✏️ Изменить
                  </button>}
                  {isMe&&<button onClick={()=>deleteMsg(msg.id)} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:14,background:"none",border:"1px solid rgba(239,68,68,.4)",color:"#f87171",fontSize:11,cursor:"pointer",fontWeight:700}}>
                    🗑 Удалить
                  </button>}
                  <div style={{width:1,height:20,background:C.border,margin:"0 2px"}}/>
                  {REACTIONS_LIST.map(emoji=>(
                    <button key={emoji} onClick={()=>toggleReaction(msg.id,emoji)}
                      style={{width:32,height:32,borderRadius:"50%",background:"none",border:"none",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",transition:"transform .15s"}}
                      onMouseOver={e=>e.currentTarget.style.transform="scale(1.3)"}
                      onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>
                      {emoji}
                    </button>
                  ))}
                </div>}
              </div>
            );
          })}
          <div ref={bottomRef}/>
        </div>

        {/* Запись голоса */}
        {voiceRec&&<div style={{padding:"10px 14px",background:"rgba(239,68,68,.12)",borderTop:`1px solid #ef444433`,display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:"#ef4444",animation:"pulseGlow .8s ease infinite"}}/>
          <span style={{color:"#ef4444",fontSize:14,fontWeight:700,flex:1}}>🎤 Запись {fmt(voiceSec)}</span>
          <button onClick={stopVoice} style={{padding:"8px 18px",borderRadius:20,border:"none",background:"#ef4444",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Отправить</button>
          <button onClick={()=>{stopVoice();}} style={{padding:"8px 14px",borderRadius:20,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.muted,fontSize:13,cursor:"pointer"}}>Отмена</button>
        </div>}

        {mediaUploading&&<div style={{padding:"8px 14px",background:C.accentDim,borderTop:`1px solid ${C.border}`,fontSize:12,color:C.accent,textAlign:"center"}}>Загружаем медиафайл...</div>}

        {/* Edit mode bar */}
        {editingMsg&&<div style={{padding:"8px 14px",background:"rgba(34,211,238,.08)",borderTop:`1px solid rgba(34,211,238,.25)`,display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:3,height:36,borderRadius:2,background:C.cyan,flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,color:C.cyan,fontWeight:700,marginBottom:1}}>✏️ Редактирование</div>
            <div style={{fontSize:12,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{editingMsg.text}</div>
          </div>
          <button onClick={cancelEdit} style={{background:"none",border:"none",cursor:"pointer",color:C.dimmer,fontSize:20,lineHeight:1,padding:"0 4px"}}>×</button>
        </div>}

        {/* Reply preview bar */}
        {replyTo&&<div style={{padding:"8px 14px",background:"rgba(46,204,113,.08)",borderTop:`1px solid rgba(46,204,113,.25)`,display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:3,height:36,borderRadius:2,background:C.accent,flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:1}}>↩ {replyTo.displayName}{replyTo.username?` @${replyTo.username}`:""}</div>
            <div style={{fontSize:12,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{replyTo.text||"медиафайл"}</div>
          </div>
          <button onClick={()=>setReplyTo(null)} style={{background:"none",border:"none",cursor:"pointer",color:C.dimmer,fontSize:20,lineHeight:1,padding:"0 4px"}}>×</button>
        </div>}

        {/* Панель вложений */}
        {attachOpen&&<div style={{padding:"12px 14px",borderTop:`1px solid ${C.border}`,background:"rgba(7,17,30,.97)",display:"flex",gap:12,justifyContent:"center",animation:"slideUp .2s ease"}}>
          {[
            {icon:<VideoIcon size={22} color={C.text}/>,label:"Видео с кам",fn:()=>videoCamRef.current?.click()},
            {icon:<AttachIcon size={22} color={C.text}/>,label:"Видео файл",fn:()=>videoGallRef.current?.click()},
            {icon:<div style={{width:22,height:22,borderRadius:"50%",background:"#ef4444",flexShrink:0}}/>,label:"Кружок",fn:openVideoRec},
            {icon:<Mic size={22} color={C.text}/>,label:"Голос",fn:startVoice},
          ].map(({icon,label,fn})=>(
            <button key={label} onClick={fn} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",padding:"8px 12px",borderRadius:12}}>
              <div style={{width:48,height:48,borderRadius:14,background:C.surfaceHi,display:"flex",alignItems:"center",justifyContent:"center"}}>{icon}</div>
              <span style={{fontSize:10,color:C.muted,fontWeight:600}}>{label}</span>
            </button>
          ))}
        </div>}

        <div style={{padding:"8px 12px 14px",borderTop:`1px solid ${C.border}`,background:"rgba(7,17,30,.92)",backdropFilter:"blur(20px)",display:"flex",gap:8,alignItems:"flex-end"}}>
          <input ref={photoGallRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>sendPhoto(e.target.files[0])}/>
          <input ref={photoCamRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>sendPhoto(e.target.files[0])}/>
          <input ref={videoGallRef} type="file" accept="video/*" style={{display:"none"}} onChange={e=>sendVideoFile(e.target.files[0])}/>
          <input ref={videoCamRef} type="file" accept="video/*" capture="environment" style={{display:"none"}} onChange={e=>sendVideoFile(e.target.files[0])}/>

          {/* Фото из галереи */}
          <button onClick={()=>{if(!user){onLogin();return;}photoGallRef.current?.click();}} style={{width:40,height:40,borderRadius:"50%",border:"none",flexShrink:0,cursor:"pointer",background:C.surfaceHi,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <ImageIcon size={17} color={C.muted}/>
          </button>
          {/* Камера */}
          <button onClick={()=>{if(!user){onLogin();return;}photoCamRef.current?.click();}} style={{width:40,height:40,borderRadius:"50%",border:"none",flexShrink:0,cursor:"pointer",background:C.surfaceHi,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Camera size={17} color={C.muted}/>
          </button>
          {/* Ещё (видео, кружок, голос) */}
          <button onClick={()=>{if(!user){onLogin();return;}setAttachOpen(o=>!o);}} style={{width:40,height:40,borderRadius:"50%",border:"none",flexShrink:0,cursor:"pointer",background:attachOpen?C.accentDim:C.surfaceHi,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s",transform:attachOpen?"rotate(45deg)":"none"}}>
            <AttachIcon size={17} color={attachOpen?C.accent:C.muted}/>
          </button>

          <textarea rows={1} value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder={editingMsg?"Редактировать сообщение...":user?"Написать в чат...":"Войдите чтобы писать..."}
            style={{flex:1,resize:"none",background:C.surfaceHi,border:`1px solid ${C.border}`,borderRadius:14,padding:"11px 14px",color:C.text,fontSize:14,outline:"none",lineHeight:1.4,boxSizing:"border-box"}}
            onFocus={e=>e.target.style.borderColor=C.borderHi} onBlur={e=>e.target.style.borderColor=C.border}/>
          {input.trim()
            ? <button onClick={send} style={{width:44,height:44,borderRadius:"50%",border:"none",flexShrink:0,cursor:"pointer",background:`linear-gradient(135deg,#1a5276,${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .25s"}}>
                <Send size={17} color="#fff"/>
              </button>
            : <button onClick={voiceRec?stopVoice:startVoice} style={{width:44,height:44,borderRadius:"50%",border:"none",flexShrink:0,cursor:"pointer",background:voiceRec?"#ef4444":C.surfaceHi,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .25s"}}>
                <Mic size={18} color={voiceRec?"#fff":C.muted}/>
              </button>
          }
        </div>

        {/* ── Рекордер кружочков ── */}
        {showVideoRec&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.93)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",animation:"fadeIn .2s ease"}}>
          <div style={{position:"absolute",top:16,right:16}}>
            <button onClick={closeVideoRec} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:"50%",width:40,height:40,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <XIcon size={20} color="#fff"/>
            </button>
          </div>
          <div style={{position:"relative",width:260,height:260,marginBottom:28}}>
            {vidRec&&<svg style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}} width={260} height={260}>
              <circle cx={130} cy={130} r={126} fill="none" stroke={C.accent} strokeWidth={4} strokeOpacity={.2}/>
              <circle cx={130} cy={130} r={126} fill="none" stroke={C.accent} strokeWidth={4}
                strokeDasharray={2*Math.PI*126} strokeDashoffset={2*Math.PI*126*(1-vidSec/60)} style={{transition:"stroke-dashoffset 1s linear"}}/>
            </svg>}
            <div style={{position:"absolute",inset:vidRec?5:0,borderRadius:"50%",overflow:"hidden",background:"#111",border:`3px solid ${vidRec?C.accent:vidPreview?"#2ecc71":C.border}`}}>
              {!vidPreview&&<video ref={liveRef} muted playsInline style={{width:"100%",height:"100%",objectFit:"cover",display:"block",transform:"scaleX(-1)"}}/>}
              {vidPreview&&<video ref={previewVidRef} src={vidPreview} loop playsInline controls style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>}
            </div>
            {vidRec&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",color:"#fff",fontSize:36,fontWeight:800,textShadow:"0 2px 8px rgba(0,0,0,.8)",pointerEvents:"none"}}>{60-vidSec}</div>}
          </div>
          {!vidPreview&&!vidRec&&<div style={{display:"flex",alignItems:"center",gap:24,marginBottom:16}}>
            <div style={{width:48}}/>
            <button onClick={startVidRec} style={{width:72,height:72,borderRadius:"50%",border:`4px solid ${C.accent}`,background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{width:44,height:44,borderRadius:"50%",background:C.accent}}/>
            </button>
            <button onClick={flipCamera} style={{width:48,height:48,borderRadius:"50%",border:`1px solid ${C.border}`,background:"rgba(255,255,255,.1)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} title="Сменить камеру">
              <span style={{fontSize:22}}>🔄</span>
            </button>
          </div>}
          {vidRec&&<button onClick={stopVidRec} style={{width:72,height:72,borderRadius:"50%",border:`4px solid #ef4444`,background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
            <div style={{width:26,height:26,borderRadius:4,background:"#ef4444"}}/>
          </button>}
          {vidPreview&&!vidUploading&&<div style={{display:"flex",gap:16,marginBottom:16}}>
            <button onClick={()=>{setVidPreview(null);setVidBlob(null);setVidSec(0);openVideoRec();}} style={{padding:"12px 24px",borderRadius:14,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.text,fontSize:14,fontWeight:700,cursor:"pointer"}}>Переснять</button>
            <button onClick={sendVideoCircle} style={{padding:"12px 28px",borderRadius:14,border:"none",background:`linear-gradient(135deg,#1a8a50,${C.accent})`,color:"#07111e",fontSize:14,fontWeight:800,cursor:"pointer"}}>Отправить</button>
          </div>}
          {vidUploading&&<div style={{color:C.accent,fontSize:14,fontWeight:700}}>Загрузка...</div>}
          <div style={{color:C.muted,fontSize:12,marginTop:8}}>{!vidPreview&&!vidRec?"Нажми для начала записи":vidRec?"Нажми квадрат для остановки":""}</div>
        </div>}
      </div>
    );
  }

  /* ── NEWS ── */

  const NEWS_ITEMS=[
    {id:1,title:"Нерест завершён — рыбалка на Дону открыта",date:"12 мая 2026",source:"Азово-Черноморское управление Росрыболовства",text:"С 12 мая снят нерестовый запрет на большинстве водоёмов Ростовской области. Разрешена ловля всех видов рыб. Норма вылова 5 кг на человека в сутки.",tag:"Официально"},
    {id:2,title:"Уровень воды в Дону поднялся на 42 см выше нормы",date:"10 мая 2026",source:"Донское бассейновое водное управление",text:"Половодье продолжается. У Аксайской пристани уровень составил 342 см. Прогноз — начало спада через 5–7 дней. Белый амур и карась активно кормятся у берегов.",tag:"Гидрология"},
    {id:3,title:"Запрет на ловлю судака продлён до 20 мая",date:"5 мая 2026",source:"Рыбнадзор РО",text:"В Аксайском и Азовском районах запрет на ловлю судака продлён до 20 мая в связи с поздним нерестом. Штраф за нарушение — до 100 000 рублей.",tag:"Запрет"},
    {id:4,title:"На Цимлянском водохранилище отличный клёв леща",date:"8 мая 2026",source:"Рыболовный клуб «Дон»",text:"Рыбаки сообщают о хорошем клёве леща. Глубина 6–8 метров, прикормка с кориандром, крючок №6 с опарышем дают стабильный результат.",tag:"Клёв"},
    {id:5,title:"Итоги весеннего нереста в Ростовской области",date:"3 мая 2026",source:"Минприроды РО",text:"Нерест 2026 года прошёл успешно. Численность молоди сазана и леща выше прошлогоднего уровня на 15%. Браконьерство снизилось на треть.",tag:"Аналитика"},
    {id:6,title:"Открытие сезона спортивной рыбалки на Мёртвом Донце",date:"1 мая 2026",source:"ФРР Ростовской области",text:"15 мая состоятся официальные соревнования по ловле карпа на Мёртвом Донце. Регистрация команд до 13 мая.",tag:"Соревнования"},
  ];
  function NewsScreen({ user, onLogin, userLat, userLon }) {
    const nearestCity = useMemo(()=>{
      if(!userLat||!userLon) return null;
      const cities = [
        {name:"Аксай",     lat:47.2681, lon:39.8699, kw:["аксай","аксайск"]},
        {name:"Батайск",   lat:47.1456, lon:39.7456, kw:["батайск"]},
        {name:"Азов",      lat:47.1023, lon:39.4123, kw:["азов","азовск"]},
        {name:"Таганрог",  lat:47.2090, lon:38.9360, kw:["таганрог"]},
        {name:"Новочеркасск", lat:47.4181, lon:40.0956, kw:["новочеркасск"]},
        {name:"Ростов-на-Дону", lat:47.2357, lon:39.7015, kw:["ростов"]},
      ];
      return cities.sort((a,b)=>haversine(userLat,userLon,a.lat,a.lon)-haversine(userLat,userLon,b.lat,b.lon))[0];
    },[userLat,userLon]);
    const [tab,setTab]=useState("news");
    const [newsItems,setNewsItems]=useState(NEWS_ITEMS);
    const [newsLoading,setNewsLoading]=useState(false);
    const [newIds,setNewIds]=useState(new Set());
    const [lastUpdated,setLastUpdated]=useState(null);
    const [newCount,setNewCount]=useState(0);
    const seenIdsRef=useRef(new Set(NEWS_ITEMS.map(n=>n.id)));
    const [notifEnabled,setNotifEnabled]=useState(()=>!!localStorage.getItem('fcm_token'));

    const requestNotif=async()=>{
      if(!("serviceWorker" in navigator)) return;
      try{
        const reg=await navigator.serviceWorker.register('/eger-ai/firebase-messaging-sw.js');
        const token=await messaging.getToken({vapidKey:VAPID_KEY,serviceWorkerRegistration:reg});
        if(token){
          await db.collection("fcm_tokens").doc(token).set({
            createdAt:firebase.firestore.FieldValue.serverTimestamp(),
            ua:navigator.userAgent.slice(0,100)
          });
          localStorage.setItem('fcm_token',token);
          setNotifEnabled(true);
        }
      }catch(e){ console.log("FCM error:",e); }
    };

    useEffect(()=>{
      if(!notifEnabled) return;
      return messaging.onMessage(payload=>{
        setNewCount(n=>n+1);
      });
    },[notifEnabled]);
    const [reports,setReports]=useState([]);
    const [reportsErr,setReportsErr]=useState(false);
    const [showForm,setShowForm]=useState(false);
    const [editTarget,setEditTarget]=useState(null);
    const [form,setForm]=useState({title:"",body:"",location:"",fish:""});
    const [photoFile,setPhotoFile]=useState(null);
    const [photoPreview,setPhotoPreview]=useState(null);
    const [posting,setPosting]=useState(false);
    const [uploadPct,setUploadPct]=useState(null);

    // Реальное время: Firestore onSnapshot (бот пишет, сайт читает)
    useEffect(()=>{
      setNewsLoading(true);
      const unsub=db.collection("news").orderBy("timestamp","desc").limit(20)
        .onSnapshot(snap=>{
          setNewsLoading(false);
          if(snap.empty) return;
          const items=snap.docs.map(d=>({id:d.id,...d.data(),
            date:d.data().timestamp?.toDate?.().toLocaleDateString("ru-RU",{day:"numeric",month:"long"})||""}));
          const fresh=items.filter(it=>!seenIdsRef.current.has(it.id));
          if(fresh.length>0){
            fresh.forEach(it=>seenIdsRef.current.add(it.id));
            setNewIds(prev=>new Set([...prev,...fresh.map(it=>it.id)]));
            setNewCount(n=>n+fresh.length);
            setNewsItems(prev=>[...fresh,...prev].slice(0,30));
          }
          setLastUpdated(new Date());
        }, err=>{ console.log("news snapshot err",err); setNewsLoading(false); });
      return unsub;
    },[]);

    useEffect(()=>{
      const unsub=db.collection("reports").orderBy("timestamp","desc").limit(50)
        .onSnapshot(s=>{setReports(s.docs.map(d=>({id:d.id,...d.data()}))); setReportsErr(false);},
          err=>{console.error("Reports:",err); setReportsErr(true);});
      return unsub;
    },[]);

    const openCreate=()=>{ if(!user){onLogin();return;} setEditTarget(null); setForm({title:"",body:"",location:"",fish:""}); setPhotoFile(null); setPhotoPreview(null); setShowForm(true); };
    const openEdit=r=>{ setEditTarget(r); setForm({title:r.title||"",body:r.body||"",location:r.location||"",fish:r.fish||""}); setPhotoPreview(r.photo_url||null); setPhotoFile(null); setShowForm(true); };

    const onFileChange=e=>{ const f=e.target.files[0]; if(!f)return; setPhotoFile(f); const rd=new FileReader(); rd.onload=ev=>setPhotoPreview(ev.target.result); rd.readAsDataURL(f); };

    const uploadPhoto=async uid=>{
      if(!photoFile) return null;
      const ref=storage.ref(`reports/${uid}_${Date.now()}.jpg`);
      const task=ref.put(photoFile);
      await new Promise((res,rej)=>task.on("state_changed",snap=>setUploadPct(Math.round(snap.bytesTransferred/snap.totalBytes*100)),rej,res));
      setUploadPct(null);
      return await ref.getDownloadURL();
    };

    const submitReport=async()=>{
      if(!form.title||!form.body||!user) return;
      setPosting(true);
      try {
        let photo_url=editTarget?.photo_url||null;
        if(photoFile) photo_url=await uploadPhoto(user.uid);
        const data={...form,uid:user.uid,displayName:user.displayName||"Рыбак",timestamp:firebase.firestore.FieldValue.serverTimestamp(),...(photo_url?{photo_url}:{})};
        if(editTarget) await db.collection("reports").doc(editTarget.id).update(data);
        else await db.collection("reports").add(data);
        setShowForm(false); setForm({title:"",body:"",location:"",fish:""}); setPhotoFile(null); setPhotoPreview(null); setEditTarget(null);
      } catch(e){ alert("Ошибка: "+e.message); }
      setPosting(false);
    };

    const deleteReport=async id=>{ if(!window.confirm("Удалить отчёт?")) return; await db.collection("reports").doc(id).delete(); };

    const tagColor=t=>({Официально:"#2ecc71",Гидрология:C.cyan,Запрет:"#ef4444",Клёв:C.gold,Аналитика:C.blue,Соревнования:"#a78bfa"}[t]||C.muted);
    const srcLabel=s=>s==="telegram"?"📱 Telegram":s==="telegram_chat"?"💬 Из чата":null;

    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{padding:"10px 16px 0",borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex"}}>
            {["news","reports"].map(t=>(<button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"10px 0",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:tab===t?C.accent:C.muted,borderBottom:tab===t?`2px solid ${C.accent}`:"2px solid transparent",transition:"all .2s"}}>{t==="news"?"Новости":"Отчёты рыбаков"}</button>))}
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>
          {tab==="news"&&<div>
            {/* Live-шапка */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",animation:"pulseGlow .8s ease infinite"}}/>
                <span style={{fontSize:11,color:C.text,fontWeight:700}}>В эфире</span>
                {lastUpdated&&<span style={{fontSize:10,color:C.dimmer}}>· {lastUpdated.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"})}</span>}
                {newCount>0&&<span style={{fontSize:10,fontWeight:800,color:"#fff",background:"#ef4444",borderRadius:10,padding:"1px 7px",cursor:"pointer"}} onClick={()=>setNewCount(0)}>+{newCount} новых</span>}
                {nearestCity&&<span style={{fontSize:10,color:C.accent,background:C.accentDim,borderRadius:8,padding:"1px 7px",border:`1px solid ${C.borderHi}`}}>📍 {nearestCity.name}</span>}
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {"serviceWorker" in navigator&&(
                  <button onClick={notifEnabled?undefined:requestNotif} title={notifEnabled?"Уведомления включены":"Включить push-уведомления"}
                    style={{background:notifEnabled?`rgba(46,204,113,.15)`:"none",border:`1px solid ${notifEnabled?C.accent:C.border}`,borderRadius:10,padding:"4px 8px",color:notifEnabled?C.accent:C.muted,fontSize:11,cursor:notifEnabled?"default":"pointer",display:"flex",alignItems:"center",gap:4,transition:"all .2s"}}>
                    {notifEnabled?<BellIcon size={11} color={C.accent}/>:<BellOffIcon size={11} color={C.muted}/>}
                    {notifEnabled?"Push вкл":"Уведомления"}
                  </button>
                )}
                <div style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:10,border:`1px solid ${C.border}`,color:C.dimmer,fontSize:11}}>
                  <RefreshCw size={11} color={newsLoading?C.accent:C.dimmer} style={newsLoading?{animation:"spin 1s linear infinite"}:undefined}/>
                  {newsLoading?"Загрузка...":"Авто"}
                </div>
              </div>
            </div>
            {[...newsItems].sort((a,b)=>{
              if(!nearestCity) return 0;
              const kws=nearestCity.kw;
              const match=n=>{const t=(n.title||"").toLowerCase()+(n.text||"").toLowerCase(); return kws.some(k=>t.includes(k));};
              return match(b)-match(a);
            }).map(n=>{
              const isNew=newIds.has(n.id);
              const isLocal=nearestCity&&nearestCity.kw.some(k=>((n.title||"").toLowerCase()+(n.text||"").toLowerCase()).includes(k));
              return(
                <div key={n.id} style={{...glass(),padding:"14px",marginBottom:10,animation:isNew?"newsSlideIn .5s cubic-bezier(.22,.61,.36,1), glowFlash 1.4s ease .35s":"fadeUp .3s ease",border:isNew?`1px solid rgba(239,68,68,.4)`:isLocal?`1px solid ${C.borderHi}`:`1px solid ${C.border}`,position:"relative",overflow:"hidden"}}>
                  {isNew&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,#ef4444,#f59e0b)",animation:"pulseGlow 2s ease 3"}}/>}
                  {isLocal&&!isNew&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${C.accent},${C.cyan})`}}/>}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:10,fontWeight:700,color:tagColor(n.tag),background:`${tagColor(n.tag)}20`,borderRadius:6,padding:"3px 8px"}}>{n.tag}</span>
                      {isNew&&<span style={{fontSize:9,fontWeight:800,color:"#ef4444",background:"rgba(239,68,68,.15)",borderRadius:6,padding:"2px 6px"}}>НОВОЕ</span>}
                      {isLocal&&!isNew&&<span style={{fontSize:9,fontWeight:800,color:C.accent,background:C.accentDim,borderRadius:6,padding:"2px 6px"}}>📍 рядом</span>}
                    </div>
                    <span style={{fontSize:10,color:C.dimmer}}>{n.date}</span>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:C.text,lineHeight:1.4,marginBottom:6}}>{n.title}</div>
                  <div style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:8}}>{n.text}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:10,color:C.dimmer}}>Источник: {n.source}</span>
                    {n.link&&<a href={n.link} target="_blank" rel="noreferrer" style={{fontSize:10,color:C.accent,fontWeight:700,textDecoration:"none"}}>Читать →</a>}
                  </div>
                </div>
              );
            })}
          </div>}
          {tab==="reports"&&<div>
            <button onClick={openCreate} style={{width:"100%",padding:"13px",borderRadius:14,border:`1px dashed ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <Plus size={16} color={C.accent}/> Добавить отчёт о рыбалке
            </button>
            {reportsErr&&<div style={{padding:"12px 14px",borderRadius:12,background:"rgba(239,68,68,.1)",border:"1px solid #ef444444",color:"#ef4444",fontSize:12,marginBottom:12}}>⚠️ Ошибка загрузки отчётов. Нужно обновить правила Firestore — разреши read для коллекции reports.</div>}
            {reports.length===0&&!reportsErr&&<div style={{textAlign:"center",padding:40,color:C.dimmer}}><Fish size={40} color={C.dimmer} style={{margin:"0 auto 12px",display:"block"}}/><div style={{fontSize:14}}>Отчётов пока нет — будь первым!</div></div>}
            {reports.map(r=>{
              const isOwn=user&&r.uid===user.uid;
              const sl=srcLabel(r.source);
              return (<div key={r.id} style={{...glass(),padding:"14px",marginBottom:10,animation:"fadeUp .3s ease"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#07111e",flexShrink:0}}>{(r.displayName||"Р")[0].toUpperCase()}</div>
                    <div><div style={{fontSize:12,fontWeight:700,color:C.accent}}>{r.displayName}</div>{sl&&<div style={{fontSize:10,color:C.muted}}>{sl}</div>}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10,color:C.dimmer}}>{r.timestamp?fmtDate(r.timestamp):""}</span>
                    {isOwn&&<button onClick={()=>openEdit(r)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"3px 7px",color:C.accent,fontSize:11,cursor:"pointer",lineHeight:1}}>✏️</button>}
                    {isOwn&&<button onClick={()=>deleteReport(r.id)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"3px 7px",color:"#ef4444",fontSize:11,cursor:"pointer",lineHeight:1}}>🗑</button>}
                  </div>
                </div>
                {r.photo_url&&<img src={r.photo_url} alt="улов" onClick={()=>window.open(r.photo_url,"_blank")} style={{width:"100%",maxHeight:200,objectFit:"cover",borderRadius:10,marginBottom:10,cursor:"pointer",display:"block"}}/>}
                <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:6}}>{r.title}</div>
                {r.location&&<div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4}}><MapPin size={11} color={C.muted}/><span style={{fontSize:11,color:C.muted}}>{r.location}</span></div>}
                {r.fish&&<div style={{display:"flex",alignItems:"center",gap:4,marginBottom:6}}><Fish size={11} color={C.gold}/><span style={{fontSize:11,color:C.gold}}>{r.fish}</span></div>}
                <div style={{fontSize:13,color:"rgba(232,244,240,.8)",lineHeight:1.6}}>{r.body}</div>
              </div>);
            })}
          </div>}
        </div>

        {showForm&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:100,display:"flex",alignItems:"flex-end",animation:"fadeIn .2s ease"}} onClick={e=>{if(e.target===e.currentTarget)setShowForm(false);}}>
          <div style={{...glass(),width:"100%",maxWidth:430,margin:"0 auto",borderRadius:"20px 20px 0 0",padding:20,maxHeight:"90dvh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <span style={{fontSize:16,fontWeight:800,color:C.text}}>{editTarget?"Редактировать":"Новый отчёт"}</span>
              <button onClick={()=>setShowForm(false)} style={{background:"none",border:"none",cursor:"pointer"}}><XIcon size={22} color={C.muted}/></button>
            </div>
            {[{key:"title",ph:"Заголовок (обязательно)"},{key:"location",ph:"Место рыбалки"},{key:"fish",ph:"Что поймал (вид, вес, штук)"}].map(({key,ph})=>(
              <input key={key} value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} placeholder={ph}
                style={{width:"100%",padding:"12px 14px",borderRadius:12,marginBottom:10,background:C.surfaceHi,border:`1px solid ${C.border}`,color:C.text,fontSize:14,outline:"none"}}
                onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
            ))}
            <textarea rows={4} value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))} placeholder="Расскажи подробнее: снасти, насадка, время клёва..."
              style={{width:"100%",resize:"none",padding:"12px 14px",borderRadius:12,marginBottom:10,background:C.surfaceHi,border:`1px solid ${C.border}`,color:C.text,fontSize:14,outline:"none",lineHeight:1.5}}
              onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
            <div style={{marginBottom:14}}>
              {photoPreview&&<img src={photoPreview} alt="preview" style={{width:"100%",maxHeight:160,objectFit:"cover",borderRadius:10,marginBottom:8,display:"block"}}/>}
              <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"11px",borderRadius:12,border:`1px dashed ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:13,fontWeight:700,cursor:"pointer"}}>
                <Camera size={16} color={C.accent}/>{photoPreview?"Сменить фото":"Добавить фото улова"}
                <input type="file" accept="image/*" onChange={onFileChange} style={{display:"none"}}/>
              </label>
              {uploadPct!==null&&<div style={{marginTop:6,height:4,borderRadius:4,background:C.surface}}><div style={{height:4,borderRadius:4,background:C.accent,width:`${uploadPct}%`,transition:"width .2s"}}/></div>}
            </div>
            <button onClick={submitReport} disabled={!form.title||!form.body||posting}
              style={{width:"100%",padding:"14px",borderRadius:14,border:"none",cursor:"pointer",
                background:form.title&&form.body?`linear-gradient(135deg,#1a8a50,${C.accent})`:C.surface,

  function ShopsScreen({ userLat, userLon }) {
    const [selected, setSelected] = useState(null);
    const [search, setSearch] = useState("");

    const isOpen = (h) => {
      const now = new Date(), cur = now.getHours()*60+now.getMinutes();
      const parts = h.replace("–","-").split("-").map(t=>{ const [hh,mm]=(t+":00").split(":").map(Number); return hh*60+(mm||0); });
      return cur>=parts[0]&&cur<parts[1];
    };

    const Stars = ({r}) => {
      const full=Math.floor(r), half=r%1>=0.5;
      return <span style={{color:"#f59e0b",fontSize:12,letterSpacing:1}}>{"★".repeat(full)}{half?"☆":""}{"☆".repeat(5-full-(half?1:0))}</span>;
    };

    const shopDist = (s) => userLat && userLon ? haversine(userLat, userLon, s.lat, s.lng) : null;

    const filtered = SHOPS
      .filter(s=>{
        if(!search) return true;
        const q=search.toLowerCase();
        return s.name.toLowerCase().includes(q)||s.addr.toLowerCase().includes(q)||s.city.toLowerCase().includes(q)||s.tags.some(t=>t.includes(q));
      })
      .sort((a,b)=>{ const da=shopDist(a),db=shopDist(b); return (da!==null&&db!==null)?da-db:0; });

    const centerLon = selected ? selected.lng : (userLon||39.75);
    const centerLat = selected ? selected.lat : (userLat||47.23);
    const zoom = selected ? 15 : 10;
    const pts = SHOPS.map(s=>`${s.lng},${s.lat},${selected?.id===s.id?"pm2gnl1":"pm2rdl1"}`).join("~");
    const mapSrc = `https://yandex.ru/map-widget/v1/?ll=${centerLon},${centerLat}&z=${zoom}&pt=${pts}&l=map`;

    const o = selected ? isOpen(selected.hours) : false;

    return(
      <div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg,overflow:"hidden"}}>

        {/* Search bar */}
        <div style={{padding:"8px 12px",background:"rgba(7,17,30,.97)",backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,background:C.surfaceHi,borderRadius:12,padding:"9px 12px",border:`1px solid ${C.border}`}}>
            <MapPin size={15} color={C.muted}/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск рыболовных магазинов..." style={{flex:1,background:"none",border:"none",outline:"none",color:C.text,fontSize:14}}/>
            {search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:18,lineHeight:1}}>×</button>}
          </div>
        </div>

        {/* Embedded map */}
        <div style={{flex:"0 0 44%",position:"relative",background:"#0a192f"}}>
          <iframe
            key={`${centerLon}_${centerLat}_${zoom}`}
            src={mapSrc}
            style={{width:"100%",height:"100%",display:"block",border:"none"}}
            frameBorder="0"
            allowFullScreen={true}
            loading="lazy"
          />
          {selected&&(
            <div style={{position:"absolute",bottom:8,left:8,right:8,background:"rgba(7,17,30,.92)",backdropFilter:"blur(12px)",border:`1px solid ${C.borderHi}`,borderRadius:12,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{selected.name}</div>
                <div style={{fontSize:10,color:o?"#2ecc71":"#ef4444"}}>{o?"● Открыто":"● Закрыто"} · {selected.hours}</div>
              </div>
              <button onClick={()=>window.open(ymapsLL(selected.lat,selected.lng),"_blank","noopener,noreferrer")}
                style={{padding:"5px 12px",borderRadius:8,background:`linear-gradient(135deg,#1a8a50,${C.accent})`,color:"#07111e",fontSize:11,fontWeight:800,border:"none",cursor:"pointer",flexShrink:0}}>
                Маршрут
              </button>
              <button onClick={()=>setSelected(null)}
                style={{width:26,height:26,borderRadius:"50%",border:`1px solid ${C.border}`,background:C.surface,color:C.muted,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                ✕
              </button>
            </div>
          )}
        </div>

        {/* Bottom panel — shop list or shop detail */}
        <div style={{flex:1,overflowY:"auto",background:"rgba(7,17,30,.98)",borderTop:`1px solid ${C.border}`}}>
          {selected?(
            <div style={{padding:"14px 14px 24px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                <button onClick={()=>setSelected(null)} style={{background:C.surfaceHi,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 12px",color:C.muted,fontSize:12,cursor:"pointer"}}>
                  ← Все магазины
                </button>
                <span style={{fontSize:11,color:C.dimmer}}>{selected.city}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div>
                  <div style={{fontSize:19,fontWeight:800,color:C.text,marginBottom:3}}>{selected.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <Stars r={selected.rating}/>
                    <span style={{color:"#f59e0b",fontSize:12,fontWeight:700}}>{selected.rating}</span>
                    <span style={{color:C.muted,fontSize:11}}>({selected.cnt} отз.)</span>
                  </div>
                </div>
                <div style={{padding:"5px 10px",borderRadius:8,background:o?"rgba(46,204,113,.15)":"rgba(239,68,68,.15)",border:`1px solid ${o?"rgba(46,204,113,.4)":"rgba(239,68,68,.4)"}`,fontSize:11,fontWeight:800,color:o?"#2ecc71":"#ef4444",whiteSpace:"nowrap"}}>
                  {o?"● Открыт":"● Закрыт"}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12,padding:"10px 12px",background:C.surfaceHi,borderRadius:12,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><MapPin size={13} color={C.muted}/><span style={{color:C.text,fontSize:13}}>{selected.addr}, {selected.city}</span></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><Clock size={13} color={C.muted}/><span style={{color:C.text,fontSize:13}}>Работает: {selected.hours}</span></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:13}}>📞</span><a href={`tel:${selected.phone}`} style={{color:C.accent,fontSize:13,textDecoration:"none",fontWeight:700}}>{selected.phone}</a></div>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                {selected.tags.map(t=><span key={t} style={{padding:"3px 10px",borderRadius:20,background:C.accentDim,border:`1px solid ${C.borderHi}`,color:C.accent,fontSize:11,fontWeight:600}}>{t}</span>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>window.open(ymapsLL(selected.lat,selected.lng),"_blank","noopener,noreferrer")} style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:`linear-gradient(135deg,#1a8a50,${C.accent})`,color:"#07111e",fontSize:13,fontWeight:800,cursor:"pointer"}}>
                  📍 Маршрут
                </button>
                <a href={`tel:${selected.phone}`} style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:13,fontWeight:800,cursor:"pointer",textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  📞 Позвонить
                </a>
              </div>
            </div>
          ):(
            <div style={{padding:"12px 12px 24px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:14,fontWeight:800,color:C.text}}>Рыболовные магазины</span>
                <span style={{fontSize:11,color:C.muted,background:C.surfaceHi,padding:"3px 8px",borderRadius:8}}>{filtered.length} из {SHOPS.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {filtered.map(shop=>{
                  const op=isOpen(shop.hours);
                  return(
                    <button key={shop.id} onClick={()=>setSelected(shop)} style={{display:"flex",gap:10,padding:"11px 12px",borderRadius:12,background:C.surfaceHi,border:`1px solid ${C.border}`,cursor:"pointer",textAlign:"left",width:"100%"}}>
                      <div style={{width:42,height:42,borderRadius:12,background:C.accentDim,border:`1px solid ${C.borderHi}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20}}>🎣</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                          <span style={{fontSize:14,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{shop.name}</span>
                          <span style={{fontSize:10,fontWeight:700,color:op?"#2ecc71":"#ef4444",flexShrink:0,marginLeft:6}}>{op?"● Открыт":"● Закрыт"}</span>
                        </div>
                        <div style={{fontSize:11,color:C.muted,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{shop.addr}, {selected?.id===shop.id?"":shop.city}</div>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          <Stars r={shop.rating}/>
                          <span style={{fontSize:11,color:"#f59e0b",fontWeight:700}}>{shop.rating}</span>
                          <span style={{fontSize:10,color:C.dimmer}}>• {shop.hours}</span>
                          {shopDist(shop)!==null&&<span style={{fontSize:10,fontWeight:700,color:C.cyan,marginLeft:4}}>📍 {Math.round(shopDist(shop))} км</span>}
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ── APP ── */
  function App() {
    const [user, setUser] = useState(null);
    const [authLoading, setAuthLoading] = useState(true);
    const [showAuth, setShowAuth] = useState(false);
    const [tab, setTab] = useState("home");
    const [weather, setWeather] = useState(null);
    const [weatherLoading, setWeatherLoading] = useState(false);
    const [unreadChat, setUnreadChat] = useState(0);
    const [unreadNews, setUnreadNews] = useState(0);
    const tabRef = useRef("home");
    const [userLat, setUserLat] = useState(null);
    const [userLon, setUserLon] = useState(null);
    const geoRef = useRef({lat: null, lon: null});

    useEffect(()=>{ const u=auth.onAuthStateChanged(u=>{setUser(u);setAuthLoading(false);}); return u; },[]);

    const loadWeather = useCallback(async()=>{
      setWeatherLoading(true);
      const {lat, lon} = geoRef.current;
      try { setWeather(await fetchWeather(lat||47.27, lon||39.87)); } catch(e){ console.log("weather error",e); }
      setWeatherLoading(false);
    },[]);

    useEffect(()=>{ loadWeather(); const t=setInterval(loadWeather,10*60*1000); return()=>clearInterval(t); },[loadWeather]);

    // Геолокация пользователя
    useEffect(()=>{
      if(!("geolocation" in navigator)) return;
      navigator.geolocation.getCurrentPosition(
        pos => {
          const lat = pos.coords.latitude, lon = pos.coords.longitude;
          _uLat = lat; _uLon = lon;
          geoRef.current = {lat, lon};
          setUserLat(lat); setUserLon(lon);
          // Перезагружаем погоду по реальной позиции
          (async()=>{
            setWeatherLoading(true);
            try { setWeather(await fetchWeather(lat, lon)); } catch(e){}
            setWeatherLoading(false);
          })();
        },
        err => console.log("geo denied", err.message),
        {enableHighAccuracy: false, timeout: 12000, maximumAge: 5*60*1000}
      );
    },[]);

    // Запрос разрешения на уведомления
    useEffect(()=>{
      if("Notification" in window && Notification.permission==="default"){
        setTimeout(()=>Notification.requestPermission(), 4000);
      }
    },[]);

    // Слушатель новых сообщений чата
    useEffect(()=>{
      let first=true;
      const unsub=db.collection("messages").orderBy("timestamp","asc").limit(200)
        .onSnapshot(snap=>{
          if(first){ first=false; return; }
          snap.docChanges().filter(c=>c.type==="added").forEach(c=>{
            if(tabRef.current==="community") return;
            const d=c.doc.data();
            setUnreadChat(n=>n+1);
            if("Notification" in window && Notification.permission==="granted" && !document.hasFocus()){
              new Notification("💬 Новое сообщение в чате",{
                body:`${d.displayName||"Рыбак"}: ${d.text||"прикрепил медиафайл"}`,
                icon:"https://turbenbaher-del.github.io/eger-ai/fish-icon.png",
                tag:"chat-msg",
              });
            }
          });
        });
      return unsub;
    },[]);

    // Слушатель новых отчётов
    useEffect(()=>{
      let first=true;
      const unsub=db.collection("reports").orderBy("createdAt","desc").limit(50)
        .onSnapshot(snap=>{
          if(first){ first=false; return; }
          snap.docChanges().filter(c=>c.type==="added").forEach(c=>{
            if(tabRef.current==="news") return;
            const d=c.doc.data();
            setUnreadNews(n=>n+1);
            if("Notification" in window && Notification.permission==="granted" && !document.hasFocus()){
              new Notification("🐟 Новый отчёт о рыбалке",{
                body:`${d.author||"Рыбак"}: ${d.title||"добавил отчёт"}`,
                icon:"https://turbenbaher-del.github.io/eger-ai/fish-icon.png",
                tag:"report-new",
              });
            }
          });
        });
      return unsub;
    },[]);

    const goTab=(id)=>{
      tabRef.current=id;
      setTab(id);
      if(id==="community") setUnreadChat(0);
      if(id==="news") setUnreadNews(0);
    };

    if (authLoading) return (
      <div style={{height:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#07111e"}}>
        <div style={{width:48,height:48,borderRadius:"50%",border:`3px solid ${C.accent}`,borderTopColor:"transparent",animation:"spin 1s linear infinite"}}/>
      </div>
    );

    const NAV=[
      {id:"home",     label:"Главная", Icon:Home},
      {id:"chat",     label:"Егерь",   Icon:Fish},
      {id:"spots",    label:"Точки",   Icon:MapPin},
      {id:"community",label:"Чат",     Icon:MessageCircle},
      {id:"map",      label:"Магазины",Icon:Anchor},
      {id:"news",     label:"Новости", Icon:Newspaper},
      {id:"weather",  label:"Погода",  Icon:Cloud},
      {id:"profile",  label:"Профиль", Icon:User},
    ];

    return (
      <div style={{maxWidth:430,margin:"0 auto",height:"100dvh",display:"flex",flexDirection:"column",background:"linear-gradient(180deg,#07111e 0%,#0a192f 100%)",position:"relative",overflow:"hidden"}}>
        {showAuth && <AuthModal onClose={()=>setShowAuth(false)} onSuccess={()=>setShowAuth(false)}/>}

        <div style={{position:"absolute",top:-100,left:-60,width:280,height:280,borderRadius:"50%",pointerEvents:"none",zIndex:0,background:"radial-gradient(circle,rgba(46,204,113,.08) 0%,transparent 70%)"}}/>
        <div style={{position:"absolute",bottom:80,right:-80,width:240,height:240,borderRadius:"50%",pointerEvents:"none",zIndex:0,background:"radial-gradient(circle,rgba(34,211,238,.07) 0%,transparent 70%)"}}/>

        <header style={{padding:"48px 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(7,17,30,.85)",backdropFilter:"blur(24px)",borderBottom:`1px solid ${C.border}`,position:"relative",zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 18px ${C.accentGlow}`}}><Fish size={21} color="#07111e"/></div>
            <div>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:24,letterSpacing:2.5,lineHeight:1,background:"linear-gradient(90deg,#fff 20%,#2ecc71 80%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Егерь ИИ</div>
              <div style={{fontSize:10,color:C.dimmer,letterSpacing:.5}}>Умный помощник рыбака</div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
            {user ? (
              <div style={{display:"flex",alignItems:"center",gap:6,background:C.accentDim,border:`1px solid ${C.borderHi}`,borderRadius:20,padding:"5px 10px"}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#07111e"}}>{(user.displayName||"Р")[0].toUpperCase()}</div>
                <span style={{fontSize:11,color:C.accent,fontWeight:700}}>{(user.displayName||"").split(" ")[0]}</span>
              </div>
            ) : (
              <button onClick={()=>setShowAuth(true)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:11,fontWeight:700,cursor:"pointer"}}>Войти</button>
            )}
            <div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(34,211,238,.1)",border:"1px solid rgba(34,211,238,.3)",borderRadius:20,padding:"4px 10px"}}>
              <WaveIcon size={14}/>
              <span style={{fontSize:10,color:C.cyan,fontWeight:700}}>Дон +40 см</span>
            </div>
          </div>
        </header>

        <main style={{flex:1,overflow:"hidden",position:"relative",zIndex:1}}>
          {tab==="home"      && <HomeScreen onGoChat={()=>goTab("chat")} weather={weather} weatherLoading={weatherLoading} onRefreshWeather={loadWeather} setTab={goTab} userLat={userLat} userLon={userLon}/>}
          {tab==="chat"      && <ChatScreen weather={weather} userLat={userLat} userLon={userLon}/>}
          {tab==="community" && <CommunityScreen user={user} onLogin={()=>setShowAuth(true)}/>}
          {tab==="spots"     && <MapScreen userLat={userLat} userLon={userLon}/>}
          {tab==="map"       && <ShopsScreen userLat={userLat} userLon={userLon}/>}
          {tab==="news"      && <NewsScreen user={user} onLogin={()=>setShowAuth(true)} userLat={userLat} userLon={userLon}/>}
          {tab==="weather"   && <WeatherScreen weather={weather} weatherLoading={weatherLoading} onRefresh={loadWeather}/>}
          {tab==="profile"   && <ProfileScreen user={user} onLogin={()=>setShowAuth(true)}/>}
        </main>

        <nav style={{display:"flex",background:"rgba(7,17,30,.95)",backdropFilter:"blur(24px)",borderTop:`1px solid ${C.border}`,paddingBottom:"env(safe-area-inset-bottom,6px)",position:"relative",zIndex:10}}>
          {NAV.map(({id,label,Icon})=>{
            const active=tab===id;
            const badge=id==="community"?unreadChat:id==="news"?unreadNews:0;
            return (
              <button key={id} onClick={()=>goTab(id)} style={{flex:1,padding:"8px 0 6px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
                {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,borderRadius:2,background:C.accent,boxShadow:`0 0 8px ${C.accent}`}}/>}
                <div style={{position:"relative",display:"inline-flex"}}>
                  <div style={{width:34,height:34,borderRadius:10,background:active?C.accentDim:"transparent",border:`1px solid ${active?C.borderHi:"transparent"}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                    <Icon size={17} color={active?C.accent:C.dimmer} style={active?{filter:`drop-shadow(0 0 5px ${C.accent})`}:undefined}/>
                  </div>
                  {badge>0&&<div style={{position:"absolute",top:-4,right:-4,minWidth:16,height:16,borderRadius:8,background:"#ef4444",color:"#fff",fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px",border:"2px solid #07111e",lineHeight:1,animation:"pulseGlow .8s ease infinite"}}>
                    {badge>99?"99+":badge}
                  </div>}
                </div>
                <span style={{fontSize:9,letterSpacing:.3,fontWeight:active?700:500,color:active?C.accent:C.dimmer}}>{label}</span>
              </button>
            );
          })}
        </nav>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
