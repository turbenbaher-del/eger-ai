  /* ── Weather fetch (Open-Meteo, бесплатно) ── */
  async function fetchWeather() {
    const url = "https://api.open-meteo.com/v1/forecast?latitude=47.27&longitude=39.87" +
      "&current=temperature_2m,wind_speed_10m,surface_pressure,weather_code,relative_humidity_2m" +
      "&wind_speed_unit=ms&timezone=Europe%2FMoscow";
    const r = await fetch(url);
    const d = await r.json();
    const c = d.current;
    const airTemp = Math.round(c.temperature_2m);
    const month = new Date().getMonth();
    const waterTemp = month >= 5 && month <= 8 ? airTemp - 1 : airTemp - 3;
    const pressureMmHg = Math.round(c.surface_pressure * 0.750064);
    return {
      airTemp, waterTemp: Math.max(2, waterTemp),
      wind: Math.round(c.wind_speed_10m),
      pressure: pressureMmHg,
      humidity: c.relative_humidity_2m,
      code: c.weather_code,
      updated: new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}),
    };
  }

  /* ── Bite score (давление + месяц) ── */
  function calcBiteScore(pressure, month) {
    let score = 7;
    if (pressure >= 758 && pressure <= 765) score = 9;
    else if (pressure >= 750 && pressure <= 770) score = 8;
    else if (pressure < 745 || pressure > 775) score = 5;
    if (month >= 4 && month <= 9) score = Math.min(10, score + 1);
    return score;
  }

  /* ── Sparkline ── */
  function Sparkline({ data, width=280, height=60 }) {
    const min=Math.min(...data)-2, max=Math.max(...data)+2;
    const pts = data.map((v,i)=>{ const x=(i/(data.length-1))*width, y=height-((v-min)/(max-min))*height; return `${x},${y}`; }).join(" ");
    const fillPts = `0,${height} ${pts} ${width},${height}`;
    const [lx,ly] = pts.split(" ").slice(-1)[0].split(",");
    return (
      <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{overflow:"visible"}}>
        <defs>
          <linearGradient id="spGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={C.accent} stopOpacity="0.35"/><stop offset="100%" stopColor={C.accent} stopOpacity="0"/>
          </linearGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <polygon points={fillPts} fill="url(#spGrad)"/>
        <polyline points={pts} fill="none" stroke={C.accent} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" filter="url(#glow)"/>
        <circle cx={lx} cy={ly} r="4" fill={C.accent} style={{filter:`drop-shadow(0 0 6px ${C.accent})`}}/>
      </svg>
    );
  }

  /* ── BiteArc ── */
  function BiteArc({ score=8 }) {
    const pct=score/10, R=52, cx=64, cy=64, sA=Math.PI*.75, eA=Math.PI*2.25, sw=eA-sA;
    const ang=sA+sw*pct, xy=(a)=>[cx+R*Math.cos(a),cy+R*Math.sin(a)];
    const [bx,by]=xy(sA),[ex,ey]=xy(ang),[fx,fy]=xy(eA);
    const large=sw*pct>Math.PI?1:0, tl=(eA-sA)>Math.PI?1:0;
    const col=score>=8?C.accent:score>=5?C.gold:"#ef4444";
    return (
      <svg width={128} height={96} viewBox="0 0 128 96">
        <defs><linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor={col} stopOpacity="0.4"/><stop offset="100%" stopColor={col}/></linearGradient></defs>
        <path d={`M${bx},${by} A${R},${R} 0 ${tl},1 ${fx},${fy}`} stroke="rgba(255,255,255,0.08)" strokeWidth="10" fill="none" strokeLinecap="round"/>
        {pct>0&&<path d={`M${bx},${by} A${R},${R} 0 ${large},1 ${ex},${ey}`} stroke="url(#arcGrad)" strokeWidth="10" fill="none" strokeLinecap="round" style={{filter:`drop-shadow(0 0 8px ${col})`}}/>}
        <text x={cx} y={cy-4} textAnchor="middle" fill={col} style={{fontSize:28,fontWeight:800,fontFamily:"'Bebas Neue',cursive",filter:`drop-shadow(0 0 10px ${col})`}}>{score}</text>
        <text x={cx} y={cy+14} textAnchor="middle" fill={C.muted} style={{fontSize:9,letterSpacing:2}}>ИЗ 10</text>
      </svg>
    );
  }

        {showForm&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:100,display:"flex",alignItems:"flex-end",animation:"fadeIn .2s ease"}}>
          <div style={{...glass(),width:"100%",maxWidth:430,margin:"0 auto",borderRadius:"20px 20px 0 0",padding:20,maxHeight:"85dvh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><span style={{fontSize:16,fontWeight:800,color:C.text}}>Новый отчёт</span><button onClick={()=>setShowForm(false)} style={{background:"none",border:"none",cursor:"pointer"}}><XIcon size={22} color={C.muted}/></button></div>
            {[{key:"title",ph:"Заголовок (обязательно)"},{key:"location",ph:"Место рыбалки"},{key:"fish",ph:"Что поймал"}].map(({key,ph})=>(<input key={key} value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} placeholder={ph} style={{width:"100%",padding:"12px 14px",borderRadius:12,marginBottom:10,background:C.surfaceHi,border:`1px solid ${C.border}`,color:C.text,fontSize:14,outline:"none"}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>))}
            <textarea rows={4} value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))} placeholder="Расскажи подробнее: снасти, насадка, время клёва..." style={{width:"100%",resize:"none",padding:"12px 14px",borderRadius:12,marginBottom:14,background:C.surfaceHi,border:`1px solid ${C.border}`,color:C.text,fontSize:14,outline:"none",lineHeight:1.5}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
            <button onClick={submitReport} disabled={!form.title||!form.body||posting} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",cursor:"pointer",background:form.title&&form.body?`linear-gradient(135deg,#1a8a50,${C.accent})`:C.surface,color:form.title&&form.body?"#07111e":C.muted,fontSize:15,fontWeight:800}}>{posting?"Публикуем...":"Опубликовать отчёт"}</button>
          </div>
        </div>}
      </div>
    );
  }

  /* ── PROFILE ── */
  function ProfileScreen({ user, onLogin }) {
    if (!user) return <RequireAuth user={user} onLogin={onLogin}><div/></RequireAuth>;
    const stats=[{label:"Уловов",val:"47"},{label:"Рекорд (кг)",val:"12.3"},{label:"Дней",val:"38"}];
    const menu=[
      {Icon:Clock,label:"История уловов",href:"#"},
      {Icon:MapPin,label:"Мои точки",href:"#"},
      {Icon:AlertCircle,label:"Telegram-бот",href:"https://t.me/egerai_bot"},
      {Icon:Gauge,label:"Настройки",href:"#"},
    ];
    return (
      <div style={{padding:"16px 14px",overflowY:"auto",height:"100%"}}>
        <div style={{...glass(`0 0 0 1px ${C.borderHi}`),background:"linear-gradient(135deg,rgba(46,204,113,.12),rgba(59,130,246,.08))",padding:24,textAlign:"center",marginBottom:14}}>
          <div style={{width:72,height:72,borderRadius:"50%",margin:"0 auto 12px",background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 24px ${C.accentGlow}`,fontSize:28,fontWeight:800,color:"#07111e"}}>{(user.displayName||"Р")[0].toUpperCase()}</div>
          <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:2}}>{user.displayName||"Рыбак"}</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:4}}>{user.email}</div>
          <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:10}}>{[1,2,3,4,5].map(i=><Star key={i} size={14} color={C.gold} fill={C.gold}/>)}</div>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:14}}>{stats.map(s=>(<div key={s.label} style={{...glass(),flex:1,padding:"14px 8px",textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,color:C.accent,filter:`drop-shadow(0 0 8px ${C.accent})`}}>{s.val}</div><div style={{fontSize:10,color:C.dimmer,marginTop:2}}>{s.label}</div></div>))}</div>
        {menu.map(({Icon,label,href})=>(
          <a key={label} href={href} target={href.startsWith("http")?"_blank":"_self"} rel="noreferrer" style={{textDecoration:"none"}}>
            <div style={{...glass(),padding:"14px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
              <Icon size={18} color={C.accent}/><span style={{fontSize:14,color:C.text,flex:1}}>{label}</span><ChevronRight size={15} color={C.dimmer}/>
            </div>
          </a>
        ))}
        <button onClick={()=>auth.signOut()} style={{width:"100%",marginTop:8,padding:"14px 16px",borderRadius:20,border:"1px solid rgba(239,68,68,.3)",background:"rgba(239,68,68,.1)",display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer"}}>
          <LogOut size={18} color="#f87171"/><span style={{fontSize:14,color:"#f87171",fontWeight:700}}>Выйти из аккаунта</span>
        </button>
      </div>
    );
  }

  /* ── APP ── */
  function App() {
    const [user, setUser] = useState(null);
    const [authLoading, setAuthLoading] = useState(true);
    const [showAuth, setShowAuth] = useState(false);
    const [tab, setTab] = useState("home");
    const [weather, setWeather] = useState(null);
    const [weatherLoading, setWeatherLoading] = useState(false);

    useEffect(()=>{ const u=auth.onAuthStateChanged(u=>{setUser(u);setAuthLoading(false);}); return u; },[]);

    const loadWeather = useCallback(async()=>{
      setWeatherLoading(true);
      try { setWeather(await fetchWeather()); } catch(e){ console.log("weather error",e); }
      setWeatherLoading(false);
    },[]);

    useEffect(()=>{ loadWeather(); const t=setInterval(loadWeather,10*60*1000); return()=>clearInterval(t); },[loadWeather]);

    if (authLoading) return (
      <div style={{height:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#07111e"}}>
        <div style={{width:48,height:48,borderRadius:"50%",border:`3px solid ${C.accent}`,borderTopColor:"transparent",animation:"spin 1s linear infinite"}}/>
      </div>
    );

    const NAV=[
      {id:"home",     label:"Главная", Icon:Home},
      {id:"chat",     label:"Егерь",   Icon:Fish},
      {id:"community",label:"Чат",     Icon:MessageCircle},
      {id:"news",     label:"Новости", Icon:Newspaper},
      {id:"profile",  label:"Профиль", Icon:User},
    ];

    return (
      <div style={{maxWidth:430,margin:"0 auto",height:"100dvh",display:"flex",flexDirection:"column",background:"linear-gradient(180deg,#07111e 0%,#0a192f 100%)",position:"relative",overflow:"hidden"}}>
        {showAuth && <AuthModal onClose={()=>setShowAuth(false)} onSuccess={()=>setShowAuth(false)}/>}

        <div style={{position:"absolute",top:-100,left:-60,width:280,height:280,borderRadius:"50%",pointerEvents:"none",zIndex:0,background:"radial-gradient(circle,rgba(46,204,113,.08) 0%,transparent 70%)"}}/>
        <div style={{position:"absolute",bottom:80,right:-80,width:240,height:240,borderRadius:"50%",pointerEvents:"none",zIndex:0,background:"radial-gradient(circle,rgba(34,211,238,.07) 0%,transparent 70%)"}}/>

        <header style={{padding:"48px 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(7,17,30,.85)",backdropFilter:"blur(24px)",borderBottom:`1px solid ${C.border}`,position:"relative",zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 18px ${C.accentGlow}`}}><Fish size={21} color="#07111e"/></div>
            <div>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:24,letterSpacing:2.5,lineHeight:1,background:"linear-gradient(90deg,#fff 20%,#2ecc71 80%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Егерь ИИ</div>
              <div style={{fontSize:10,color:C.dimmer,letterSpacing:.5}}>Умный помощник рыбака</div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
            {user ? (
              <div style={{display:"flex",alignItems:"center",gap:6,background:C.accentDim,border:`1px solid ${C.borderHi}`,borderRadius:20,padding:"5px 10px"}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#07111e"}}>{(user.displayName||"Р")[0].toUpperCase()}</div>
                <span style={{fontSize:11,color:C.accent,fontWeight:700}}>{(user.displayName||"").split(" ")[0]}</span>
              </div>
            ) : (
              <button onClick={()=>setShowAuth(true)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:11,fontWeight:700,cursor:"pointer"}}>Войти</button>
            )}
            <div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(34,211,238,.1)",border:"1px solid rgba(34,211,238,.3)",borderRadius:20,padding:"4px 10px"}}>
              <WaveIcon size={14}/>
              <span style={{fontSize:10,color:C.cyan,fontWeight:700}}>Дон +40 см</span>
            </div>
          </div>
        </header>

        <main style={{flex:1,overflow:"hidden",position:"relative",zIndex:1}}>
          {tab==="home"      && <HomeScreen onGoChat={()=>setTab("chat")} weather={weather} weatherLoading={weatherLoading} onRefreshWeather={loadWeather} setTab={setTab}/>}
          {tab==="chat"      && <ChatScreen weather={weather}/>}
          {tab==="community" && <CommunityScreen user={user} onLogin={()=>setShowAuth(true)}/>}
          {tab==="news"      && <NewsScreen user={user} onLogin={()=>setShowAuth(true)}/>}
          {tab==="profile"   && <ProfileScreen user={user} onLogin={()=>setShowAuth(true)}/>}
        </main>

        <nav style={{display:"flex",background:"rgba(7,17,30,.95)",backdropFilter:"blur(24px)",borderTop:`1px solid ${C.border}`,paddingBottom:"env(safe-area-inset-bottom,6px)",position:"relative",zIndex:10}}>
          {NAV.map(({id,label,Icon})=>{
            const active=tab===id;
            return (<button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"8px 0 6px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
              {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,borderRadius:2,background:C.accent,boxShadow:`0 0 8px ${C.accent}`}}/>}
              <div style={{width:34,height:34,borderRadius:10,background:active?C.accentDim:"transparent",border:`1px solid ${active?C.borderHi:"transparent"}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                <Icon size={17} color={active?C.accent:C.dimmer} style={active?{filter:`drop-shadow(0 0 5px ${C.accent})`}:undefined}/>
              </div>
              <span style={{fontSize:9,letterSpacing:.3,fontWeight:active?700:500,color:active?C.accent:C.dimmer}}>{label}</span>
            </button>);
          })}
        </nav>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
