  function ShopsScreen({ userLat, userLon }) {
    const mapDiv = useRef(null);
    const lmap = useRef(null);
    const mRefs = useRef({});
    const [selected, setSelected] = useState(null);
    const [search, setSearch] = useState("");

    const isOpen = (h) => {
      const now = new Date(), cur = now.getHours()*60+now.getMinutes();
      const parts = h.replace("–","-").split("-").map(t=>{ const [hh,mm]=(t+":00").split(":").map(Number); return hh*60+(mm||0); });
      return cur>=parts[0]&&cur<parts[1];
    };

    const Stars = ({r}) => {
      const full=Math.floor(r), half=r%1>=0.5;
      return <span style={{color:"#f59e0b",fontSize:12,letterSpacing:1}}>{"★".repeat(full)}{half?"☆":""}{"☆".repeat(5-full-(half?1:0))}</span>;
    };

    useEffect(()=>{
      if(!mapDiv.current || lmap.current) return;
      if(!window.ymaps) return;
      let cancelled = false;
      const initCenter = userLat && userLon ? [userLat, userLon] : [47.3, 39.85];
      const initZoom  = userLat && userLon ? 12 : 9;

      window.ymaps.ready(()=>{
        if(cancelled || !mapDiv.current) return;
        const map = new ymaps.Map(mapDiv.current, {
          center: initCenter, zoom: initZoom,
          controls: ["zoomControl","typeSelector"],
        },{suppressMapOpenBlock:true});

        // Метка пользователя
        if(userLat && userLon){
          map.geoObjects.add(new ymaps.Placemark([userLat,userLon],
            {hintContent:"📍 Вы здесь", balloonContent:"Вы здесь"},
            {preset:"islands#blueCircleDotIcon"}));
        }

        // Метки магазинов
        SHOPS.forEach(shop=>{
          const mark = new ymaps.Placemark([shop.lat,shop.lng],
            {hintContent:shop.name, balloonContent:`<b>${shop.name}</b><br>${shop.addr}, ${shop.city}<br>${shop.phone}<br>${shop.hours}`},
            {preset:"islands#greenDotIcon", iconColor:"#2ecc71"}
          );
          mark.events.add("click",()=>{
            Object.values(mRefs.current).forEach(({mark:mk})=>mk.options.set("preset","islands#greenDotIcon"));
            mark.options.set("preset","islands#yellowDotIcon");
            setSelected(shop);
            map.setCenter([shop.lat,shop.lng],15,{duration:600});
          });
          mRefs.current[shop.id]={mark,shop};
          map.geoObjects.add(mark);
        });

        lmap.current = map;
      });

      return()=>{ cancelled=true; if(lmap.current){lmap.current.destroy();lmap.current=null;} };
    },[]);

    const flyTo=(shop)=>{
      if(!lmap.current) return;
      Object.values(mRefs.current).forEach(({mark})=>mark.options.set("preset","islands#greenDotIcon"));
      mRefs.current[shop.id]?.mark.options.set("preset","islands#yellowDotIcon");
      setSelected(shop);
      lmap.current.setCenter([shop.lat,shop.lng],15,{duration:600});
    };

    const back=()=>{
      if(lmap.current){
        Object.values(mRefs.current).forEach(({mark})=>mark.options.set("preset","islands#greenDotIcon"));
        lmap.current.setCenter(userLat&&userLon?[userLat,userLon]:[47.3,39.85], userLat&&userLon?12:9,{duration:500});
      }
      setSelected(null);
    };

    const shopDist = (s) => userLat && userLon ? haversine(userLat, userLon, s.lat, s.lng) : null;

    const filtered = SHOPS
      .filter(s=>{
        if(!search) return true;
        const q=search.toLowerCase();
        return s.name.toLowerCase().includes(q)||s.addr.toLowerCase().includes(q)||s.city.toLowerCase().includes(q)||s.tags.some(t=>t.includes(q));
      })
      .sort((a, b) => {
        const da = shopDist(a), db = shopDist(b);
        if(da !== null && db !== null) return da - db;
        return 0;
      });

    const PANEL_H=selected?300:260;
    const o=selected?isOpen(selected.hours):false;

    return(
      <div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
        {/* Search bar */}
        <div style={{padding:"8px 12px",background:"rgba(7,17,30,.97)",backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`,zIndex:20,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,background:C.surfaceHi,borderRadius:12,padding:"9px 12px",border:`1px solid ${C.border}`}}>
            <MapPin size={15} color={C.muted}/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск рыболовных магазинов..." style={{flex:1,background:"none",border:"none",outline:"none",color:C.text,fontSize:14}}/>
            {search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:18,lineHeight:1}}>×</button>}
          </div>
        </div>

        {/* Map */}
        <div ref={mapDiv} style={{flex:1,minHeight:0}}/>

        {/* Bottom panel */}
        <div style={{height:PANEL_H,background:"rgba(7,17,30,.98)",borderTop:`2px solid ${C.border}`,overflowY:"auto",flexShrink:0,transition:"height .3s ease"}}>
          {selected?(
            <div style={{padding:"14px 14px 24px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                <button onClick={back} style={{background:C.surfaceHi,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 12px",color:C.muted,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                  ← Все магазины
                </button>
                <span style={{fontSize:11,color:C.dimmer}}>{selected.city}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div>
                  <div style={{fontSize:19,fontWeight:800,color:C.text,marginBottom:3}}>{selected.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <Stars r={selected.rating}/>
                    <span style={{color:"#f59e0b",fontSize:12,fontWeight:700}}>{selected.rating}</span>
                    <span style={{color:C.muted,fontSize:11}}>({selected.cnt} отз.)</span>
                  </div>
                </div>
                <div style={{padding:"5px 10px",borderRadius:8,background:o?"rgba(46,204,113,.15)":"rgba(239,68,68,.15)",border:`1px solid ${o?"rgba(46,204,113,.4)":"rgba(239,68,68,.4)"}`,fontSize:11,fontWeight:800,color:o?"#2ecc71":"#ef4444",whiteSpace:"nowrap"}}>
                  {o?"● Открыт":"● Закрыт"}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12,padding:"10px 12px",background:C.surfaceHi,borderRadius:12,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><MapPin size={13} color={C.muted}/><span style={{color:C.text,fontSize:13}}>{selected.addr}, {selected.city}</span></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><Clock size={13} color={C.muted}/><span style={{color:C.text,fontSize:13}}>Работает: {selected.hours}</span></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:13}}>📞</span><a href={`tel:${selected.phone}`} style={{color:C.accent,fontSize:13,textDecoration:"none",fontWeight:700}}>{selected.phone}</a></div>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                {selected.tags.map(t=><span key={t} style={{padding:"3px 10px",borderRadius:20,background:C.accentDim,border:`1px solid ${C.borderHi}`,color:C.accent,fontSize:11,fontWeight:600}}>{t}</span>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>window.open(`https://maps.google.com/?q=${selected.lat},${selected.lng}`,"_blank","noopener,noreferrer")} style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:`linear-gradient(135deg,#1a8a50,${C.accent})`,color:"#07111e",fontSize:13,fontWeight:800,cursor:"pointer"}}>
                  📍 Маршрут
                </button>
                <a href={`tel:${selected.phone}`} style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:13,fontWeight:800,cursor:"pointer",textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  📞 Позвонить
                </a>
              </div>
            </div>
          ):(
            <div style={{padding:"12px 12px 24px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:14,fontWeight:800,color:C.text}}>Рыболовные магазины</span>
                <span style={{fontSize:11,color:C.muted,background:C.surfaceHi,padding:"3px 8px",borderRadius:8}}>{filtered.length} из {SHOPS.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {filtered.map(shop=>{
                  const op=isOpen(shop.hours);
                  return(
                    <button key={shop.id} onClick={()=>flyTo(shop)} style={{display:"flex",gap:10,padding:"11px 12px",borderRadius:12,background:C.surfaceHi,border:`1px solid ${C.border}`,cursor:"pointer",textAlign:"left",width:"100%"}}>
                      <div style={{width:42,height:42,borderRadius:12,background:C.accentDim,border:`1px solid ${C.borderHi}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20}}>🎣</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                          <span style={{fontSize:14,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{shop.name}</span>
                          <span style={{fontSize:10,fontWeight:700,color:op?"#2ecc71":"#ef4444",flexShrink:0,marginLeft:6}}>{op?"● Открыт":"● Закрыт"}</span>
                        </div>
                        <div style={{fontSize:11,color:C.muted,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{shop.addr}, {shop.city}</div>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          <Stars r={shop.rating}/>
                          <span style={{fontSize:11,color:"#f59e0b",fontWeight:700}}>{shop.rating}</span>
                          <span style={{fontSize:10,color:C.dimmer}}>• {shop.hours}</span>
                          {shopDist(shop)!==null&&<span style={{fontSize:10,fontWeight:700,color:C.cyan,marginLeft:4}}>📍 {Math.round(shopDist(shop))} км</span>}
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ── APP ── */
  function App() {
    const [user, setUser] = useState(null);
    const [authLoading, setAuthLoading] = useState(true);
    const [showAuth, setShowAuth] = useState(false);
    const [tab, setTab] = useState("home");
    const [weather, setWeather] = useState(null);
    const [weatherLoading, setWeatherLoading] = useState(false);
    const [unreadChat, setUnreadChat] = useState(0);
    const [unreadNews, setUnreadNews] = useState(0);
    const tabRef = useRef("home");
    const [userLat, setUserLat] = useState(null);
    const [userLon, setUserLon] = useState(null);
    const geoRef = useRef({lat: null, lon: null});

    useEffect(()=>{ const u=auth.onAuthStateChanged(u=>{setUser(u);setAuthLoading(false);}); return u; },[]);

    const loadWeather = useCallback(async()=>{
      setWeatherLoading(true);
      const {lat, lon} = geoRef.current;
      try { setWeather(await fetchWeather(lat||47.27, lon||39.87)); } catch(e){ console.log("weather error",e); }
      setWeatherLoading(false);
    },[]);

    useEffect(()=>{ loadWeather(); const t=setInterval(loadWeather,10*60*1000); return()=>clearInterval(t); },[loadWeather]);

    // Геолокация пользователя
    useEffect(()=>{
      if(!("geolocation" in navigator)) return;
      navigator.geolocation.getCurrentPosition(
        pos => {
          const lat = pos.coords.latitude, lon = pos.coords.longitude;
          _uLat = lat; _uLon = lon;
          geoRef.current = {lat, lon};
          setUserLat(lat); setUserLon(lon);
          // Перезагружаем погоду по реальной позиции
          (async()=>{
            setWeatherLoading(true);
            try { setWeather(await fetchWeather(lat, lon)); } catch(e){}
            setWeatherLoading(false);
          })();
        },
        err => console.log("geo denied", err.message),
        {enableHighAccuracy: false, timeout: 12000, maximumAge: 5*60*1000}
      );
    },[]);

    // Запрос разрешения на уведомления
    useEffect(()=>{
      if("Notification" in window && Notification.permission==="default"){
        setTimeout(()=>Notification.requestPermission(), 4000);
      }
    },[]);

    // Слушатель новых сообщений чата
    useEffect(()=>{
      let first=true;
      const unsub=db.collection("messages").orderBy("timestamp","asc").limit(200)
        .onSnapshot(snap=>{
          if(first){ first=false; return; }
          snap.docChanges().filter(c=>c.type==="added").forEach(c=>{
            if(tabRef.current==="community") return;
            const d=c.doc.data();
            setUnreadChat(n=>n+1);
            if("Notification" in window && Notification.permission==="granted" && !document.hasFocus()){
              new Notification("💬 Новое сообщение в чате",{
                body:`${d.displayName||"Рыбак"}: ${d.text||"прикрепил медиафайл"}`,
                icon:"https://turbenbaher-del.github.io/eger-ai/fish-icon.png",
                tag:"chat-msg",
              });
            }
          });
        });
      return unsub;
    },[]);

    // Слушатель новых отчётов
    useEffect(()=>{
      let first=true;
      const unsub=db.collection("reports").orderBy("createdAt","desc").limit(50)
        .onSnapshot(snap=>{
          if(first){ first=false; return; }
          snap.docChanges().filter(c=>c.type==="added").forEach(c=>{
            if(tabRef.current==="news") return;
            const d=c.doc.data();
            setUnreadNews(n=>n+1);
            if("Notification" in window && Notification.permission==="granted" && !document.hasFocus()){
              new Notification("🐟 Новый отчёт о рыбалке",{
                body:`${d.author||"Рыбак"}: ${d.title||"добавил отчёт"}`,
                icon:"https://turbenbaher-del.github.io/eger-ai/fish-icon.png",
                tag:"report-new",
              });
            }
          });
        });
      return unsub;
    },[]);

    const goTab=(id)=>{
      tabRef.current=id;
      setTab(id);
      if(id==="community") setUnreadChat(0);
      if(id==="news") setUnreadNews(0);
    };

    if (authLoading) return (
      <div style={{height:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"#07111e"}}>
        <div style={{width:48,height:48,borderRadius:"50%",border:`3px solid ${C.accent}`,borderTopColor:"transparent",animation:"spin 1s linear infinite"}}/>
      </div>
    );

    const NAV=[
      {id:"home",     label:"Главная", Icon:Home},
      {id:"chat",     label:"Егерь",   Icon:Fish},
      {id:"community",label:"Чат",     Icon:MessageCircle},
      {id:"map",      label:"Магазины",Icon:MapPin},
      {id:"news",     label:"Новости", Icon:Newspaper},
      {id:"profile",  label:"Профиль", Icon:User},
    ];

    return (
      <div style={{maxWidth:430,margin:"0 auto",height:"100dvh",display:"flex",flexDirection:"column",background:"linear-gradient(180deg,#07111e 0%,#0a192f 100%)",position:"relative",overflow:"hidden"}}>
        {showAuth && <AuthModal onClose={()=>setShowAuth(false)} onSuccess={()=>setShowAuth(false)}/>}

        <div style={{position:"absolute",top:-100,left:-60,width:280,height:280,borderRadius:"50%",pointerEvents:"none",zIndex:0,background:"radial-gradient(circle,rgba(46,204,113,.08) 0%,transparent 70%)"}}/>
        <div style={{position:"absolute",bottom:80,right:-80,width:240,height:240,borderRadius:"50%",pointerEvents:"none",zIndex:0,background:"radial-gradient(circle,rgba(34,211,238,.07) 0%,transparent 70%)"}}/>

        <header style={{padding:"48px 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(7,17,30,.85)",backdropFilter:"blur(24px)",borderBottom:`1px solid ${C.border}`,position:"relative",zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 18px ${C.accentGlow}`}}><Fish size={21} color="#07111e"/></div>
            <div>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:24,letterSpacing:2.5,lineHeight:1,background:"linear-gradient(90deg,#fff 20%,#2ecc71 80%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Егерь ИИ</div>
              <div style={{fontSize:10,color:C.dimmer,letterSpacing:.5}}>Умный помощник рыбака</div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
            {user ? (
              <div style={{display:"flex",alignItems:"center",gap:6,background:C.accentDim,border:`1px solid ${C.borderHi}`,borderRadius:20,padding:"5px 10px"}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#07111e"}}>{(user.displayName||"Р")[0].toUpperCase()}</div>
                <span style={{fontSize:11,color:C.accent,fontWeight:700}}>{(user.displayName||"").split(" ")[0]}</span>
              </div>
            ) : (
              <button onClick={()=>setShowAuth(true)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:11,fontWeight:700,cursor:"pointer"}}>Войти</button>
            )}
            <div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(34,211,238,.1)",border:"1px solid rgba(34,211,238,.3)",borderRadius:20,padding:"4px 10px"}}>
              <WaveIcon size={14}/>
              <span style={{fontSize:10,color:C.cyan,fontWeight:700}}>Дон +40 см</span>
            </div>
          </div>
        </header>

        <main style={{flex:1,overflow:"hidden",position:"relative",zIndex:1}}>
          {tab==="home"      && <HomeScreen onGoChat={()=>goTab("chat")} weather={weather} weatherLoading={weatherLoading} onRefreshWeather={loadWeather} setTab={goTab} userLat={userLat} userLon={userLon}/>}
          {tab==="chat"      && <ChatScreen weather={weather} userLat={userLat} userLon={userLon}/>}
          {tab==="community" && <CommunityScreen user={user} onLogin={()=>setShowAuth(true)}/>}
          {tab==="map"       && <ShopsScreen userLat={userLat} userLon={userLon}/>}
          {tab==="news"      && <NewsScreen user={user} onLogin={()=>setShowAuth(true)} userLat={userLat} userLon={userLon}/>}
          {tab==="profile"   && <ProfileScreen user={user} onLogin={()=>setShowAuth(true)}/>}
        </main>

        <nav style={{display:"flex",background:"rgba(7,17,30,.95)",backdropFilter:"blur(24px)",borderTop:`1px solid ${C.border}`,paddingBottom:"env(safe-area-inset-bottom,6px)",position:"relative",zIndex:10}}>
          {NAV.map(({id,label,Icon})=>{
            const active=tab===id;
            const badge=id==="community"?unreadChat:id==="news"?unreadNews:0;
            return (
              <button key={id} onClick={()=>goTab(id)} style={{flex:1,padding:"8px 0 6px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
                {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,borderRadius:2,background:C.accent,boxShadow:`0 0 8px ${C.accent}`}}/>}
                <div style={{position:"relative",display:"inline-flex"}}>
                  <div style={{width:34,height:34,borderRadius:10,background:active?C.accentDim:"transparent",border:`1px solid ${active?C.borderHi:"transparent"}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                    <Icon size={17} color={active?C.accent:C.dimmer} style={active?{filter:`drop-shadow(0 0 5px ${C.accent})`}:undefined}/>
                  </div>
                  {badge>0&&<div style={{position:"absolute",top:-4,right:-4,minWidth:16,height:16,borderRadius:8,background:"#ef4444",color:"#fff",fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px",border:"2px solid #07111e",lineHeight:1,animation:"pulseGlow .8s ease infinite"}}>
                    {badge>99?"99+":badge}
                  </div>}
                </div>
                <span style={{fontSize:9,letterSpacing:.3,fontWeight:active?700:500,color:active?C.accent:C.dimmer}}>{label}</span>
              </button>
            );
          })}
        </nav>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
