  /* ── Weather fetch (Open-Meteo, бесплатно) ── */
  async function fetchWeather(lat = 47.27, lon = 39.87) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      "&current=temperature_2m,wind_speed_10m,surface_pressure,weather_code,relative_humidity_2m" +
      "&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max,precipitation_sum,wind_speed_10m_max,sunrise,sunset" +
      "&hourly=temperature_2m,precipitation_probability,wind_speed_10m,weather_code" +
      "&forecast_days=7&wind_speed_unit=ms&timezone=Europe%2FMoscow";
    const r = await fetch(url);
    const d = await r.json();
    const c = d.current;
    const airTemp = Math.round(c.temperature_2m);
    const month = new Date().getMonth();
    const waterTemp = month >= 5 && month <= 8 ? airTemp - 1 : airTemp - 3;

    let score = 7;
    if (pressure >= 758 && pressure <= 765) score = 9;
    else if (pressure >= 750 && pressure <= 770) score = 8;
    else if (pressure < 745 || pressure > 775) score = 5;
    if (month >= 4 && month <= 9) score = Math.min(10, score + 1);
    return score;
  }

    const R = 6371, p = Math.PI / 180;

    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin(dLon/2)**2;
    return R * 2 * Math.asin(Math.sqrt(a));
  }

      fn:()=>`Снаряжение для комфортной рыбалки:\n\n🪑 Кресло / раскладушка:\nКарпфишинг-кресло с подлокотниками — для сидячей ловли. Раскладной стул ~500–800 руб — для фидера.\n\n🎒 Рюкзак:\n20–30 л для дневного выезда. Водонепроницаемый — обязательно.\n\n🧰 Ящик:\nДля зимней рыбалки — ящик-стул. Для летней — гибкий садок-ведро.\n\n📦 Обязательно в ящике рыбака:\n• Запасные поводки и крючки\n• Экстрактор (извлекатель крючка)\n• Зевник (для хищника)\n• Аптечка\n• Фонарь налобный\n• Дождевик\n• Термос — у воды холодно даже летом\n\n${shopLinks("рюкзак рыболовный складной стул экстрактор набор")}`

  const getBotReply = (q, weather) => {
    const l = q.toLowerCase();
    for(const intent of INTENTS){

    // Умный фоллбек — пробуем угадать по ключевым словам
    if(l.match(/привет|здрав|дарова|хай|добрый|хорош|как дела/)){

        `Здорово, рыбак! Готов помочь 🎣\n\nМогу рассказать про:\n• Точки ловли с координатами\n• Прогноз клёва по погоде\n• Снасти и насадки по любому виду рыбы\n• Правила и запреты\n• Ночную рыбалку, рыбалку с лодки\n\nСпрашивай — отвечу конкретно!`,

      return pick([
        `Уточни что именно интересует — по какой рыбе или снасти. Например:\n• "как ловить сазана на фидер"\n• "как выбрать удилище"\n• "как ловить нахлыстом"\n• "как привязать крючок"\n\nОтвечу конкретно с деталями 👍`,

    // Если совсем ничего не нашли — ответ на основе погоды
    if(weather){

        : `Клёв ${scoreText} (давление ${weather.pressure} мм).\n\n${moon.ico} ${moon.tip}\n\nПри нестабильной погоде лучше берёт хищник:\n📍 ${spot2.n}\n${ymaps(spot2.c)}${nearShops}\n\nСпроси конкретнее: "где ловить щуку", "какая насадка для карася", "почему не клюёт".`;

    return pick([

      `Уточни вопрос — отвечу конкретно!\n\nПро что могу рассказать:\n• Рыба: щука, судак, лещ, сазан, карась, сом, карп, амур, берш...\n• Снасти: фидер, спиннинг, поплавок, нахлыст, карповая\n• Выбор снастей: удилище, катушка, леска, крючки\n• Прикормка, насадки, техника проводки\n• Точки GPS, прогноз клёва, луна, запреты\n\nЧто интересует?`,
      `Хм, не совсем понял — но готов помочь! 😄\n\nСпрашивай про рыбу (куда, на что, когда), про снасти (что выбрать, как собрать), или про конкретную технику — фидер, нахлыст, спиннинг, поплавок. Отвечу как знаю.`,

  };

  // ── Context-aware AI wrapper ──
  const FISH_NAMES = ["амур","щука","лещ","карась","сазан","судак","карп","плотва","тарань","голавль","красноперка","толстолобик","чехонь","сом","окунь","жерех","берш","бычок","линь","пиленгас"];
  const detectFish = l => FISH_NAMES.find(f=>l.includes(f));

  const getBotReplyCtx = (q, weather, ctx={}) => {
    const l = q.toLowerCase();
    const newCtx = {...ctx};
    const fish = detectFish(l);
    if(fish) newCtx.fish = fish;

    // ── Отслеживаем тему разговора ──
    if(l.includes("фидер")) newCtx.lastTopic = "feeder";
    else if(l.includes("нахлыст")) newCtx.lastTopic = "fly";
    else if(l.includes("спиннинг")||l.includes("джиг")) newCtx.lastTopic = "spin";
    else if(l.includes("поплавоч")||l.match(/на поплавок|поплавком/)) newCtx.lastTopic = "float";
    else if(l.includes("карповая")||l.includes("бойл")) newCtx.lastTopic = "carp";
    else if(fish) newCtx.lastTopic = "fish_"+fish;

    // ── Личные вопросы к боту ──
    if(l.match(/ты сам|ты рыбак|ты ловишь|ты кто|кто ты|ты умеешь|ты реальный/)) {
      return {text: pick([
        `Я — Егерь ИИ, цифровой знаток всех ям и перекатов Дона 😄 Сам физически не ловлю, но знаю про рыбалку в Ростовской области, кажется, всё что только можно. Задавай любой вопрос!`,
        `Виртуальный рыбак, но с реальными знаниями 🎣 Каждую яму, каждый перекат, каждый сезонный выход рыбы — знаю. Спрашивай смело!`,
      ]), ctx: newCtx};
    }

    // ── "Расскажи ещё" / "Подробнее" / "Что ещё" ──
    if(l.match(/ещё расскажи|расскажи ещё|что ещё|хочу ещё|продолжай|подробнее расскажи|хочу знать больше|дальше/)) {
      if(newCtx.lastTopic === "feeder") return {text: getBotReply("фидер оснастка как вязать монтаж", weather), ctx: newCtx};
      if(newCtx.lastTopic === "fly")    return {text: getBotReply("нахлыст мушки на что ловить", weather), ctx: newCtx};
      if(newCtx.lastTopic === "spin")   return {text: getBotReply("спиннинг проводка как вести", weather), ctx: newCtx};

      if(newCtx.lastTopic === "carp")   return {text: getBotReply("бойл карповая оснастка", weather), ctx: newCtx};
      if(newCtx.fish) return {text: getBotReply(`насадки для ${newCtx.fish}`, weather), ctx: newCtx};
      return {text: pick([
        `Уточни тему — расскажу подробнее! Про снасти, рыбу, место или технику?`,
        `Конечно! Про что конкретно — снасти, точки, насадки, технику проводки или сезон?`,
      ]), ctx: newCtx};
    }

    // ── Короткие acknowledgments ──
    if(l.match(/^(понял|ясно|окей|ок|хорошо|понятно|чётко|четко|ясно стало|всё понял|все понял|принял|принято)\.?!?$/)) {
      return {text: pick([
        `Отлично! Ещё вопросы — всегда готов 🎣 Куда едешь кстати, уже решил?`,
        `Понял — молодец! Можешь спросить про снасти, точки или прогноз — отвечу быстро.`,

      return {text: pick([
        `Рад помочь! 🎣 Ни хвоста ни чешуи! Если ещё вопросы будут — возвращайся.`,
        `Спасибо! 😄 Удачи на рыбалке — пусть трещит удилище и гнётся удочка!`,

    }

    // ── Разочарование / негатив ──
    if(l.match(/не помог|не знаешь|не умеешь|плохой бот|бесполезн|фигня|отстой/)) {
      return {text: pick([
        `Понял тебя — постараюсь лучше! Задай вопрос конкретнее — про какую рыбу, снасть или место — отвечу точнее 🎣`,

    if(ctx.pending === 'fish') {

      if(l.match(/^2$|насад|прикорм|наживк|мотыл|червь|опарыш|бойл/)) return {text:getBotReply(`насадки для ${f}`, weather), ctx:newCtx};
      if(l.match(/^3$|снаст|фидер|спиннинг|поплавок|удоч|оснастк/))  return {text:getBotReply(`снасти для ${f}`, weather),  ctx:newCtx};
      if(l.match(/^4$|время|сезон|когда|лучш/)) {

    if(!fish && l.match(/где|куда|точк|место|координат/) && !l.match(/насадк|снасти?|прикорм|наживк/)) {

      newCtx.pending='fish'; newCtx.pendingFor='spots';
      return {text:`Какую рыбу ловишь? Дам GPS-точки именно под неё.\n\nЕсть места для: леща, судака, щуки, сазана, карася, сома, берша, амура, бычка...`, ctx:newCtx};
    }

    // ── context-enhanced "на что/насадки" without fish ──
    if(!fish && l.match(/на что|насадк|наживк|приманк/)) {
      if(newCtx.fish) return {text:getBotReply(`насадки для ${newCtx.fish}`, weather), ctx:newCtx};
      newCtx.pending='fish'; newCtx.pendingFor='bait';
      return {text:`На кого ловишь? Подберу насадку точно под рыбу.`, ctx:newCtx};
    }

    // ── context-enhanced "снасти" without fish ──
    if(!fish && l.match(/снасти?|снасть|оснастк/) && !l.match(/фидер|спиннинг|поплавок/)) {
      if(newCtx.fish) return {text:getBotReply(`снасти для ${newCtx.fish}`, weather), ctx:newCtx};
      newCtx.pending='fish'; newCtx.pendingFor='tackle';
      return {text:`Снасти под какую рыбу? Укажи — дам конкретные рекомендации.`, ctx:newCtx};
    }

    // ── context-aware greeting ──
    if(l.match(/привет|здрав|дарова|хай|добрый|как дела/)) {
      const txt = newCtx.fish
        ? `Снова привет! Продолжаем по ${newCtx.fish}у или что-то новое? 🎣`
        : pick([`Здорово, рыбак! 🎣 Что интересует — куда поехать, что ловить, на что клюёт?`,`Привет! Спрашивай — знаю все ямы Дона 😄`]);
      return {text:txt, ctx:newCtx};
    }

    // ── default: original logic ──
    newCtx.pending = null;
    return {text:getBotReply(q, weather), ctx:newCtx};
  };

  // Yandex Maps helpers (Yandex uses lon,lat order, opposite of Google)
  const ymaps   = (latlon) => { const [la,lo]=String(latlon).split(",").map(s=>s.trim()); return `https://yandex.ru/maps/?pt=${lo},${la}&z=14`; };
  const ymapsLL = (lat,lon) => `https://yandex.ru/maps/?pt=${lon},${lat}&z=14`;

  const shopLinks = (query) => {
    const q = encodeURIComponent(query);
    return `\n🛒 Купить:\nWildberries: https://www.wildberries.ru/catalog/0/search.aspx?search=${q}\nOzon: https://www.ozon.ru/search/?text=${q}\nЯндекс Маркет: https://market.yandex.ru/search?text=${q}`;
  };

  const fmtTime = () => new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  const fmtDate = (ts) => {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);

  /* ── Sparkline ── */
  function Sparkline({ data, width=280, height=60 }) {
    const min=Math.min(...data)-2, max=Math.max(...data)+2;
    const pts = data.map((v,i)=>{ const x=(i/(data.length-1))*width, y=height-((v-min)/(max-min))*height; return `${x},${y}`; }).join(" ");
    const fillPts = `0,${height} ${pts} ${width},${height}`;
    const [lx,ly] = pts.split(" ").slice(-1)[0].split(",");
    return (
      <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{overflow:"visible"}}>
        <defs>
          <linearGradient id="spGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={C.accent} stopOpacity="0.35"/><stop offset="100%" stopColor={C.accent} stopOpacity="0"/>
          </linearGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <polygon points={fillPts} fill="url(#spGrad)"/>
        <polyline points={pts} fill="none" stroke={C.accent} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" filter="url(#glow)"/>
        <circle cx={lx} cy={ly} r="4" fill={C.accent} style={{filter:`drop-shadow(0 0 6px ${C.accent})`}}/>
      </svg>
    );
  }

  /* ── BiteArc ── */
  function BiteArc({ score=8 }) {
    const pct=score/10, R=52, cx=64, cy=64, sA=Math.PI*.75, eA=Math.PI*2.25, sw=eA-sA;
    const ang=sA+sw*pct, xy=(a)=>[cx+R*Math.cos(a),cy+R*Math.sin(a)];
    const [bx,by]=xy(sA),[ex,ey]=xy(ang),[fx,fy]=xy(eA);
    const large=sw*pct>Math.PI?1:0, tl=(eA-sA)>Math.PI?1:0;
    const col=score>=8?C.accent:score>=5?C.gold:"#ef4444";
    return (
      <svg width={128} height={96} viewBox="0 0 128 96">
        <defs><linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor={col} stopOpacity="0.4"/><stop offset="100%" stopColor={col}/></linearGradient></defs>
        <path d={`M${bx},${by} A${R},${R} 0 ${tl},1 ${fx},${fy}`} stroke="rgba(255,255,255,0.08)" strokeWidth="10" fill="none" strokeLinecap="round"/>
        {pct>0&&<path d={`M${bx},${by} A${R},${R} 0 ${large},1 ${ex},${ey}`} stroke="url(#arcGrad)" strokeWidth="10" fill="none" strokeLinecap="round" style={{filter:`drop-shadow(0 0 8px ${col})`}}/>}
        <text x={cx} y={cy-4} textAnchor="middle" fill={col} style={{fontSize:28,fontWeight:800,fontFamily:"'Bebas Neue',cursive",filter:`drop-shadow(0 0 10px ${col})`}}>{score}</text>
        <text x={cx} y={cy+14} textAnchor="middle" fill={C.muted} style={{fontSize:9,letterSpacing:2}}>ИЗ 10</text>
      </svg>
    );
  }

  /* ── Shared: Voice Message Player ── */
  function VoiceMessage({ url, dur, isMe, col }) {

    const [playing, setPlaying] = useState(false);

    const [cur, setCur] = useState(0);
    const [total, setTotal] = useState(dur||0);
    const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
    const BARS = [3,5,9,14,19,22,17,11,6,8,13,20,24,16,10,6,12,18,14,8];
    const toggle = () => {
      const a = aRef.current; if(!a) return;
      if(a.paused){ a.play(); setPlaying(true); } else { a.pause(); setPlaying(false); }
    };
    return (
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:24,background:isMe?`linear-gradient(135deg,#1a5276,${C.blue})`:"rgba(255,255,255,0.08)",border:isMe?"none":`1px solid ${C.border}`,minWidth:200,maxWidth:260}}>

  /* ── AI CHAT ── */
  function getDiaryNote(query, catches) {
    if (!catches?.length) return "";
    const l = query.toLowerCase();
    const match = catches.find(c => {
      const loc = (c.locationName||"").toLowerCase();
      const parts = loc.split(/[\s,()]+/).filter(p=>p.length>3);
      return parts.some(p=>l.includes(p));
    });
    if (!match) return "";
    const fish = match.fishName || "рыбу";
    const wStr = match.weightGrams ? ` ${(match.weightGrams/1000).toFixed(1)} кг` : "";
    const d = match.createdAt?.toDate ? match.createdAt.toDate() : new Date();
    const ds = d.toLocaleDateString("ru-RU",{day:"2-digit",month:"long"});
    return `📖 Кстати, ${ds} ты здесь поймал: ${fish}${wStr} на «${match.locationName}».\n\n`;
  }

      if (!SR) {

        return;
      }
      const rec = new SR();
      rec.lang = "ru-RU";
      rec.continuous = false;
      rec.interimResults = true;
      rec.maxAlternatives = 1;
      srTextRef.current = "";

      rec.onstart = () => { setVoiceRec(true); setVoiceText(""); };

      rec.onresult = (e) => {
        let interim = "", final = "";
        for (const r of e.results) {
          if (r.isFinal) final += r[0].transcript;
          else interim += r[0].transcript;
        }
        if (final) srTextRef.current = final;
        setVoiceText(final || interim);
      };

      rec.onend = () => {
        setVoiceRec(false);
        const text = srTextRef.current.trim();

    const biteColor = biteScore>=8?"#2ecc71":biteScore>=6?"#f59e0b":"#ef4444";

    const nowHour = new Date().getHours();

      return {
        time: hourly.time[idx].slice(11,16),

            {[
              {ico:"💨",val:`${weather.wind} м/с`,lbl:"Ветер"},
              {ico:"💧",val:`${weather.humidity}%`,lbl:"Влажность"},
              {ico:"⏱",val:`${weather.pressure} мм`,lbl:"Давление"},
            ].map(({ico,val,lbl})=>(
              <div key={lbl} style={{background:"rgba(255,255,255,.05)",borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
                <div style={{fontSize:20}}>{ico}</div>
                <div style={{fontSize:13,fontWeight:700,color:C.text,marginTop:2}}>{val}</div>
                <div style={{fontSize:10,color:C.muted}}>{lbl}</div>
              </div>
            ))}
          </div>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"6px 14px",borderRadius:20,background:"rgba(34,211,238,.1)",border:"1px solid rgba(34,211,238,.25)"}}>
            <span style={{fontSize:11,color:C.cyan,fontWeight:700}}>🌊 Вода +{weather.waterTemp}°C</span>
            <span style={{fontSize:10,color:C.dimmer}}>· обновлено {weather.updated}</span>
          </div>
        </div>

        {/* Bite score */}
        <div style={{...glass(),padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:58,height:58,borderRadius:"50%",border:`3px solid ${biteColor}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 0 14px ${biteColor}55`}}>
            <div style={{fontSize:20,fontWeight:900,color:biteColor,lineHeight:1}}>{biteScore}</div>
            <div style={{fontSize:8,color:C.dimmer,letterSpacing:.5}}>ИЗ 10</div>
          </div>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:biteColor,marginBottom:3}}>{biteLabel}</div>
            <div style={{fontSize:11,color:C.muted}}>{moon.ico} {moon.tip}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>
              {weather.pressure>=758&&weather.pressure<=765?"Давление идеальное — вся рыба активна":
               weather.pressure>768?"Высокое давление — лещ и карась берут хорошо":
               weather.pressure<750?"Низкое давление — хищник оживляется":"Давление в норме"}
            </div>
          </div>
        </div>

        {/* Hourly today */}
        {hourlySlice.length>0 && (
          <div style={{...glass(),marginBottom:10,padding:"12px 12px 8px 14px"}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Сегодня по часам</div>
            <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:6}}>
              {hourlySlice.map((h,i)=>(
                <div key={i} style={{flexShrink:0,textAlign:"center",padding:"8px 8px",borderRadius:12,
                  background:i===0?"rgba(46,204,113,.1)":"rgba(255,255,255,.04)",
                  border:`1px solid ${i===0?C.borderHi:C.border}`,minWidth:52}}>
                  <div style={{fontSize:10,color:i===0?C.accent:C.muted,fontWeight:i===0?700:400}}>{i===0?"Сейчас":h.time}</div>
                  <div style={{fontSize:20,margin:"4px 0"}}>{wIcon(h.code)}</div>
                  <div style={{fontSize:13,fontWeight:700,color:C.text}}>{h.temp>0?"+":""}{h.temp}°</div>
                  {h.precip>20&&<div style={{fontSize:9,color:"#60a5fa",marginTop:2}}>💧{h.precip}%</div>}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Hourly bite chart */}
        {hourlySlice.length>0 && (
          <div style={{...glass(),marginBottom:10,padding:"12px 14px"}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Лучшее время для ловли сегодня</div>
            {(()=>{
              const biteByHour = hourlySlice.map(h=>{
                const rain = h.code>=51?1:0;
                const windOk = h.wind<=5?3:h.wind<=8?2:1;
                const tempOk = h.temp>=8&&h.temp<=26?3:h.temp>=4?1:0;
                const hourNum = parseInt(h.time);
                const timeBonus = (hourNum>=5&&hourNum<=9)||(hourNum>=17&&hourNum<=21)?2:1;
                return Math.max(1,Math.min(10,windOk+tempOk+timeBonus-(rain*2)));
              });
              const maxB = Math.max(...biteByHour,1);
              const color = s=>s>=8?"#2ecc71":s>=6?"#f59e0b":s>=4?"#f97316":"#ef4444";
              return(
                <div style={{display:"flex",gap:3,alignItems:"flex-end",height:56}}>
                  {biteByHour.map((score,i)=>(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <div style={{width:"100%",borderRadius:"3px 3px 0 0",background:color(score),height:Math.max(4,Math.round(score/maxB*44)),transition:"height .3s"}}/>
                      <div style={{fontSize:8,color:C.dimmer}}>{i===0?"":hourlySlice[i].time.slice(0,2)}</div>
                    </div>
                  ))}
                </div>
              );
            })()}
            <div style={{fontSize:10,color:C.dimmer,marginTop:4,textAlign:"center"}}>🟢 активный клёв · 🟡 средний · 🔴 слабый</div>
          </div>
        )}

        {/* 7-day forecast */}
        {weather.daily && (
          <div style={{...glass(),padding:"12px 14px"}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>Прогноз на 7 дней</div>
            {weather.daily.time.map((date,i)=>{
              const d = new Date(date+"T12:00:00");
              const maxT = Math.round(weather.daily.temperature_2m_max[i]);
              const minT = Math.round(weather.daily.temperature_2m_min[i]);
              const prec = weather.daily.precipitation_probability_max[i]||0;
              const code = weather.daily.weather_code[i];
              const biteQ = code===0?"🟢":code<=3?"🟢":code<=48?"🟡":code<=82?"🔴":"🔴";
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<6?`1px solid ${C.border}`:"none"}}>
                  <div style={{width:34,fontSize:12,fontWeight:i<=1?700:400,color:i===0?C.accent:i===1?"#f59e0b":C.text,flexShrink:0}}>
                    {i===0?"Сег":i===1?"Завт":DAYS_RU[d.getDay()]}
                  </div>
                  <div style={{fontSize:22,flexShrink:0}}>{wIcon(code)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,color:C.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{wDesc(code)}</div>
                    {prec>20&&<div style={{fontSize:9,color:"#60a5fa"}}>💧{prec}%</div>}
                  </div>
                  <div style={{fontSize:10,marginRight:4}}>{biteQ}</div>
                  <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>{maxT>0?"+":""}{maxT}°</span>
                    <span style={{fontSize:11,color:C.muted}}>{minT>0?"+":""}{minT}°</span>
                  </div>
                </div>
              );
            })}
            <div style={{fontSize:10,color:C.dimmer,marginTop:8,textAlign:"center"}}>🟢 хороший клёв · 🟡 средний · 🔴 слабый</div>
          </div>
        )}

        {/* Fish species forecast */}
        {(()=>{
          const p=weather.pressure||760, t=weather.airTemp||15, w=weather.wind||3;
          const moon=moonPhase();
          const mp=moon.phase;
          const speciesForecast=[
            {name:"Судак",   score:Math.min(10,Math.round((p>=752&&p<=768?3:1)+(t>=8&&t<=22?3:1)+(w<=5?2:1)+(mp>0.3&&mp<0.7?2:1)))},
            {name:"Щука",    score:Math.min(10,Math.round((p>=748&&p<=762?3:1)+(t>=6&&t<=20?3:1)+(w<=6?2:1)+(mp<0.35||mp>0.65?2:1)))},
            {name:"Лещ",     score:Math.min(10,Math.round((p>=758&&p<=770?4:1)+(t>=12&&t<=26?3:1)+(w<=4?2:1)+(mp>0.45&&mp<0.55?2:1)))},
            {name:"Карп",    score:Math.min(10,Math.round((p>=755&&p<=768?3:p>768?4:1)+(t>=15&&t<=28?4:1)+(w<=3?2:1)+(mp>0.4&&mp<0.6?2:1)))},
            {name:"Сом",     score:Math.min(10,Math.round((p>=748&&p<=762?3:1)+(t>=18&&t<=30?4:1)+(w<=4?2:1)+(mp>0.6?2:1)))},
            {name:"Окунь",   score:Math.min(10,Math.round((p>=750&&p<=770?3:1)+(t>=10&&t<=24?3:1)+(w<=5?2:1)+(mp>0.35&&mp<0.65?2:1)))},
          ].sort((a,b)=>b.score-a.score);
          const scoreColor=s=>s>=8?"#2ecc71":s>=6?"#f59e0b":s>=4?"#f97316":"#ef4444";
          return(
            <div style={{...glass(),padding:"12px 14px",marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Клёв по видам рыб</div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {speciesForecast.map(({name,score})=>(
                  <div key={name} style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:56,fontSize:12,color:C.muted}}>{name}</div>
                    <div style={{flex:1,height:6,borderRadius:3,background:"rgba(255,255,255,.07)",overflow:"hidden"}}>
                      <div style={{width:`${score*10}%`,height:"100%",borderRadius:3,background:scoreColor(score),transition:"width .5s"}}/>
                    </div>
                    <div style={{width:36,textAlign:"right",fontSize:12,fontWeight:700,color:scoreColor(score)}}>{score}/10</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}
      </div>
    );
  }

  /* ── MAP / SPOTS ── */
  function SuggestSpotForm({ user, userLat, userLon, onClose }) {
    const [name, setName] = useState("");
    const [desc, setDesc] = useState("");
    const [fish, setFish] = useState("");
    const [saving, setSaving] = useState(false);
    const [done, setDone] = useState(false);
    const handleSave = async () => {
      if (!name.trim()) return;
      setSaving(true);
      try {
        await db.collection("suggested_spots").add({
          name: name.trim(), description: desc.trim(), fish: fish.trim(),
          lat: userLat||null, lng: userLon||null,
          userId: user?.uid||"anon", userName: user?.displayName||"Рыбак",
          status: "pending", createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        logEvent("spot_suggested");
        setDone(true);
      } catch(e) { setSaving(false); }
    };
    return (
      <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"flex-end"}}>
        <div style={{width:"100%",maxWidth:430,margin:"0 auto",background:"#0d1f35",borderRadius:"24px 24px 0 0",padding:"20px 16px 40px"}}>
          <div style={{display:"flex",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:17,fontWeight:800,color:C.text,flex:1}}>📍 Предложить точку</div>
            <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer"}}>✕</button>
          </div>
          {done ? (
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:48,marginBottom:12}}>✅</div>
              <div style={{fontSize:16,fontWeight:700,color:C.accent,marginBottom:8}}>Спасибо!</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Ваша точка отправлена на модерацию. После одобрения она появится на карте.</div>
              <button onClick={onClose} style={{padding:"12px 32px",borderRadius:14,border:"none",background:`linear-gradient(135deg,#1a8a50,${C.accent})`,color:"#07111e",fontSize:14,fontWeight:800,cursor:"pointer"}}>Закрыть</button>
            </div>
          ) : (
            <>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700}}>НАЗВАНИЕ ТОЧКИ *</div>
                <input value={name} onChange={e=>setName(e.target.value)} placeholder="Напр.: Яма у старого моста" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.text,fontSize:13,boxSizing:"border-box",outline:"none"}}/>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700}}>КАКАЯ РЫБА ЛОВИТСЯ</div>
                <input value={fish} onChange={e=>setFish(e.target.value)} placeholder="Напр.: Судак, Лещ, Карп" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.text,fontSize:13,boxSizing:"border-box",outline:"none"}}/>
              </div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700}}>ОПИСАНИЕ</div>
                <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Глубина, дно, особенности..." rows={3} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.text,fontSize:13,boxSizing:"border-box",resize:"none",outline:"none"}}/>
              </div>
              {userLat&&<div style={{fontSize:11,color:C.accent,marginBottom:16,textAlign:"center"}}>📍 Координаты определены автоматически</div>}
              <button onClick={handleSave} disabled={saving||!name.trim()} style={{width:"100%",padding:"15px",borderRadius:16,border:"none",background:name.trim()?`linear-gradient(135deg,#1a8a50,${C.accent})`:"#1e3a2a",color:name.trim()?"#07111e":"#4a6e5a",fontSize:15,fontWeight:800,cursor:name.trim()?"pointer":"default"}}>
                {saving?"Отправляем...":"📤 Отправить на модерацию"}
              </button>
            </>
          )}
        </div>
      </div>
    );
  }

  function MapScreen({ userLat, userLon, user }) {
    const [selIdx, setSelIdx] = useState(null);
    const [filter, setFilter] = useState("");
    const [fishFilter, setFishFilter] = useState("");
    const [mapLoaded, setMapLoaded] = useState(false);
    const [showSuggest, setShowSuggest] = useState(false);
    useEffect(()=>{ logEvent("map_opened"); },[]);

    const allFish = useMemo(()=>{
      const set = new Set();
      SPOT_LIST.forEach(s=>s.fish.split(/[,，]+/).forEach(f=>{ const t=f.trim(); if(t) set.add(t); }));
      return [...set].sort();
    },[]);

    const sorted = useMemo(()=>{
      if(userLat && userLon)
        return [...SPOT_LIST].sort((a,b)=>haversine(userLat,userLon,a.lat,a.lon)-haversine(userLat,userLon,b.lat,b.lon));
      return SPOT_LIST;
    },[userLat,userLon]);

    const filtered = useMemo(()=>{
      return sorted.filter(s=>{
        if(filter && !s.name.toLowerCase().includes(filter.toLowerCase()) && !s.fish.toLowerCase().includes(filter.toLowerCase())) return false;
        if(fishFilter && !s.fish.toLowerCase().includes(fishFilter.toLowerCase())) return false;
        return true;
      });
    },[sorted,filter,fishFilter]);

    const sel = selIdx !== null ? SPOT_LIST[selIdx] : null;
    const centerLon = sel ? sel.lon : 39.95;
    const centerLat = sel ? sel.lat : 47.24;
    const zoom = sel ? 13 : 8;

    const pts = SPOT_LIST.map((s,i)=>
      `${s.lon},${s.lat},${i===selIdx?"pm2gnl1":"pm2rdl1"}`
    ).join("~");

    const mapSrc = `https://yandex.ru/map-widget/v1/?ll=${centerLon},${centerLat}&z=${zoom}&pt=${pts}&l=map`;

    return (
      <div style={{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {showSuggest&&<SuggestSpotForm user={user} userLat={userLat} userLon={userLon} onClose={()=>setShowSuggest(false)}/>}

        {/* ── Embedded map ── */}
        <div style={{flex:"0 0 44%",position:"relative",background:"#0a192f"}}>
          {!mapLoaded&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,background:"rgba(7,17,30,.95)",zIndex:1}}>
            <div style={{width:32,height:32,borderRadius:"50%",border:`2px solid ${C.accent}`,borderTopColor:"transparent",animation:"spin 1s linear infinite"}}/>
            <div style={{fontSize:12,color:C.muted}}>Загрузка карты...</div>
            <a href={`https://yandex.ru/maps/?ll=${centerLon},${centerLat}&z=${zoom}`} target="_blank" rel="noreferrer" style={{fontSize:11,color:C.accent,textDecoration:"none"}}>Открыть в Яндекс.Картах ↗</a>
          </div>}
          <iframe
            key={`${centerLon}_${centerLat}_${zoom}`}
            src={mapSrc}
            style={{width:"100%",height:"100%",display:"block",border:"none",opacity:mapLoaded?1:0,transition:"opacity .5s"}}
            frameBorder="0"
            allowFullScreen={true}
            loading="lazy"
            onLoad={()=>setMapLoaded(true)}
          />
          {sel && (
            <div style={{position:"absolute",bottom:8,left:8,right:8,background:"rgba(7,17,30,.9)",backdropFilter:"blur(12px)",border:`1px solid ${C.borderHi}`,borderRadius:12,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{sel.name}</div>
                <div style={{fontSize:10,color:C.muted}}>{sel.fish}</div>
              </div>
              <a href={ymapsLL(sel.lat,sel.lon)} target="_blank" rel="noreferrer"
                style={{padding:"5px 12px",borderRadius:8,background:`linear-gradient(135deg,#1a8a50,${C.accent})`,color:"#07111e",fontSize:11,fontWeight:800,textDecoration:"none",flexShrink:0}}>
                Маршрут
              </a>
              <button onClick={()=>setSelIdx(null)}
                style={{width:26,height:26,borderRadius:"50%",border:`1px solid ${C.border}`,background:C.surface,color:C.muted,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                ✕
              </button>
            </div>
          )}
        </div>

        {/* ── Search bar + fish filter ── */}
        <div style={{padding:"8px 12px 6px",background:"rgba(7,17,30,.95)",borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",gap:8,marginBottom:6}}>
            <input
              value={filter} onChange={e=>setFilter(e.target.value)}
              placeholder={`🔍 Поиск по ${SPOT_LIST.length} точкам...`}
              style={{flex:1,background:C.surfaceHi,border:`1px solid ${C.border}`,borderRadius:12,padding:"8px 12px",color:C.text,fontSize:13,outline:"none"}}
            />
            <button onClick={()=>setShowSuggest(true)} style={{flexShrink:0,padding:"7px 12px",borderRadius:12,background:C.accentDim,border:`1px solid ${C.accent}`,color:C.accent,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              + Точку
            </button>
          </div>
          <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:4}}>
            <button onClick={()=>setFishFilter("")} style={{flexShrink:0,padding:"3px 10px",borderRadius:12,background:!fishFilter?C.accentDim:C.surface,border:`1px solid ${!fishFilter?C.accent:C.border}`,color:!fishFilter?C.accent:C.muted,fontSize:11,cursor:"pointer"}}>Все</button>
            {["Судак","Щука","Сом","Лещ","Карп","Карась","Окунь","Сазан","Амур","Тарань","Чехонь","Жерех"].map(f=>(
              <button key={f} onClick={()=>setFishFilter(fishFilter===f?"":f)} style={{flexShrink:0,padding:"3px 10px",borderRadius:12,background:fishFilter===f?C.accentDim:C.surface,border:`1px solid ${fishFilter===f?C.accent:C.border}`,color:fishFilter===f?C.accent:C.muted,fontSize:11,cursor:"pointer"}}>{f}</button>
            ))}
          </div>
        </div>

        {/* ── Spots list ── */}
        <div style={{flex:1,overflowY:"auto",padding:"6px 10px"}}>
          {userLat && !filter && (
            <div style={{fontSize:10,color:C.muted,padding:"4px 4px 6px",textAlign:"center"}}>
              📍 По расстоянию от вас
            </div>
          )}
          {filtered.length===0&&filter&&(
            <div style={{textAlign:"center",padding:"40px 20px",color:C.muted}}>
              <div style={{fontSize:40,marginBottom:12}}>🔍</div>
              <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:8}}>Ничего не найдено</div>
              <div style={{fontSize:12,marginBottom:14}}>Попробуй другой запрос</div>
              <button onClick={()=>setFilter("")} style={{padding:"8px 20px",borderRadius:12,border:`1px solid ${C.accent}`,background:C.accentDim,color:C.accent,fontSize:12,fontWeight:700,cursor:"pointer"}}>Сбросить</button>
            </div>
          )}
          {filtered.map((s,i)=>{
            const realIdx = SPOT_LIST.indexOf(s);
            const dist = userLat&&userLon ? Math.round(haversine(userLat,userLon,s.lat,s.lon)) : null;
            const isSel = selIdx===realIdx;
            return (
              <div key={realIdx} onClick={()=>setSelIdx(isSel?null:realIdx)}
                style={{display:"flex",alignItems:"center",gap:9,padding:"9px 10px",marginBottom:5,borderRadius:12,cursor:"pointer",
                  background:isSel?`rgba(46,204,113,.1)`:"rgba(255,255,255,.03)",
                  border:`1px solid ${isSel?C.accent:C.border}`,transition:"all .15s"}}>
                <div style={{width:30,height:30,borderRadius:8,background:isSel?C.accent:C.accentDim,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <s.Icon size={14} color={isSel?"#07111e":C.accent}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.name}</div>
                  <div style={{fontSize:10,color:C.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.fish}{dist!==null?` · ${dist} км`:""}</div>
                </div>
                <ChevronRight size={12} color={isSel?C.accent:C.dimmer}/>
              </div>
            );
          })}
          {filtered.length===0 && (
            <div style={{textAlign:"center",padding:24,color:C.muted,fontSize:13}}>Ничего не найдено</div>
          )}
        </div>
      </div>
    );
  }

  /* ── COMMUNITY ── */
  /* ── Circular video message player ── */
  function VideoNote({ url, isMe, col }) {
    const vRef = useRef(null);
    const [playing, setPlaying] = useState(false);
    const [progress, setProgress] = useState(0);
    const SIZE = 148;
    const toggle = () => {
      const v = vRef.current; if(!v) return;
      if(v.paused){ v.play(); setPlaying(true); } else { v.pause(); setPlaying(false); }
    };
    const onTime = () => {
      const v = vRef.current; if(!v||!v.duration) return;
      setProgress(v.currentTime/v.duration);
    };
    const onEnd = () => { setPlaying(false); setProgress(0); };
    const circ = 2*Math.PI*(SIZE/2-4);
    return (
      <div style={{position:"relative",width:SIZE,height:SIZE,cursor:"pointer"}} onClick={e=>{e.stopPropagation();toggle();}}>
        <svg style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}} width={SIZE} height={SIZE}>
          <circle cx={SIZE/2} cy={SIZE/2} r={SIZE/2-4} fill="none" stroke={isMe?C.blue:col} strokeWidth={3} strokeOpacity={.25}/>
          <circle cx={SIZE/2} cy={SIZE/2} r={SIZE/2-4} fill="none" stroke={isMe?C.blue:col} strokeWidth={3}
            strokeDasharray={circ} strokeDashoffset={circ*(1-progress)} style={{transition:"stroke-dashoffset .1s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:4,borderRadius:"50%",overflow:"hidden",background:"#000"}}>
          <video ref={vRef} src={url} playsInline style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}
            onTimeUpdate={onTime} onEnded={onEnd}/>
        </div>
        {!playing&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
          <div style={{width:38,height:38,borderRadius:"50%",background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <PlayIcon size={16} color="#fff" style={{marginLeft:3}}/>
          </div>
        </div>}
      </div>
    );
  }

  function CommunityScreen({ user, onLogin }) {
    const [messages, setMessages] = useState([]);
    const [input, setInput] = useState("");
    const [onlineCount] = useState(Math.floor(Math.random()*8)+3);
    const [attachOpen, setAttachOpen] = useState(false);
    const [username, setUsername] = useState("");
    const [userTopBadge, setUserTopBadge] = useState("");
    const [replyTo, setReplyTo] = useState(null);
    const [selectedMsg, setSelectedMsg] = useState(null);
    const [editingMsg, setEditingMsg] = useState(null); // {id, text}
    // video circle state
    const [showVideoRec, setShowVideoRec] = useState(false);
    const [vidRec, setVidRec] = useState(false);
    const [vidSec, setVidSec] = useState(0);
    const [vidBlob, setVidBlob] = useState(null);
    const [vidPreview, setVidPreview] = useState(null);
    const [vidUploading, setVidUploading] = useState(false);
    const [vidUpPct, setVidUpPct] = useState(null);
    // voice state
    const [voiceRec, setVoiceRec] = useState(false);
    const [voiceSec, setVoiceSec] = useState(0);
    // upload progress
    const [mediaUploading, setMediaUploading] = useState(false);

    const bottomRef = useRef(null);
    const photoGallRef = useRef(null);
    const photoCamRef = useRef(null);
    const videoGallRef = useRef(null);
    const videoCamRef = useRef(null);
    const liveRef = useRef(null);
    const previewVidRef = useRef(null);
    const vidMR = useRef(null);
    const vidStream = useRef(null);
    const vidChunks = useRef([]);
    const vidTimer = useRef(null);
    const voiceMR = useRef(null);
    const voiceStream = useRef(null);
    const voiceChunks = useRef([]);
    const voiceTimer = useRef(null);

    const [olderMsgs, setOlderMsgs] = useState([]);
    const [loadingOlder, setLoadingOlder] = useState(false);
    const [noMoreOlder, setNoMoreOlder] = useState(false);
    const oldestDocRef = useRef(null);

    useEffect(()=>{
      const unsub=db.collection("messages").orderBy("timestamp","desc").limit(50).onSnapshot(snap=>{
        const docs=snap.docs;
        if(docs.length>0) oldestDocRef.current=docs[docs.length-1];
        setMessages([...docs].reverse().map(d=>({id:d.id,...d.data()})));
        setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),50);
      });
      return unsub;
    },[]);

    const loadOlderMsgs = async () => {
      if(!oldestDocRef.current||loadingOlder||noMoreOlder) return;
      setLoadingOlder(true);
      try {
        const snap=await db.collection("messages").orderBy("timestamp","desc").startAfter(oldestDocRef.current).limit(50).get();
        if(snap.docs.length<50) setNoMoreOlder(true);
        if(snap.docs.length>0){
          oldestDocRef.current=snap.docs[snap.docs.length-1];
          const older=[...snap.docs].reverse().map(d=>({id:d.id,...d.data()}));
          setOlderMsgs(prev=>[...older,...prev]);
        } else { setNoMoreOlder(true); }
      } catch(e){}
      setLoadingOlder(false);
    };

    const allMsgs = useMemo(()=>{
      const seen=new Set();
      return [...olderMsgs,...messages].filter(m=>{ if(seen.has(m.id))return false; seen.add(m.id); return true; });
    },[olderMsgs,messages]);

    // Загрузка/создание username + top badge
    useEffect(()=>{
      if(!user) return;
      const ref=db.collection("users").doc(user.uid);
      ref.get().then(doc=>{
        if(doc.exists && doc.data().username){ setUsername(doc.data().username); return; }
        const uname=genUsername(user.displayName);
        ref.set({username:uname,displayName:user.displayName||"Рыбак"},{merge:true});
        setUsername(uname);
      });
      db.collection("users").doc(user.uid).collection("badges").get().then(snap=>{
        if(snap.empty) return;
        const topBadgeOrder=["whale_15kg","trophy_5kg","diversity_10","reporter","traveler","weekly_angler","photographer","early_bird","first_catch"];
        const ids=new Set(snap.docs.map(d=>d.id));
        const top=topBadgeOrder.find(id=>ids.has(id));
        if(top){const bd=BADGE_DEFS.find(b=>b.id===top); if(bd) setUserTopBadge(bd.emoji);}
      }).catch(()=>{});
    },[user]);

    // строит base в момент вызова (не при рендере) — избегает stale uid
    const mkBase = () => ({
      uid: user.uid,
      displayName: user.displayName || "Рыбак",
      username: username || genUsername(user.displayName||"рыбак"),
      topBadge: userTopBadge || null,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    /* ── upload helper ── */
    const uploadFile = async (blob, path, contentType) => {
      const ref = storage.ref(path);
      const task = ref.put(blob, {contentType});
      await new Promise((res, rej) => task.on("state_changed", ()=>{}, rej, res));
      return await ref.getDownloadURL();
    };

    /* ── reactions ── */
    const toggleReaction = async (msgId, emoji) => {
      if(!user){ onLogin(); return; }
      setSelectedMsg(null);
      const ref=db.collection("messages").doc(msgId);
      const doc=await ref.get();
      const reactions=doc.data().reactions||{};
      const upd={};
      // Снять предыдущую реакцию пользователя (одна реакция на пользователя)
      for(const [e, uids] of Object.entries(reactions)){
        if(uids.includes(user.uid)){
          const filtered=uids.filter(u=>u!==user.uid);
          upd[`reactions.${e}`]=filtered.length>0?filtered:firebase.firestore.FieldValue.delete();
        }
      }
      // Добавить новую, если не совпадает с предыдущей (нажал ту же — снял)
      const alreadyHad=(reactions[emoji]||[]).includes(user.uid);
      if(!alreadyHad){
        const cur=(reactions[emoji]||[]).filter(u=>u!==user.uid);
        upd[`reactions.${emoji}`]=[...cur,user.uid];
      }
      if(Object.keys(upd).length>0) await ref.update(upd);
    };

    /* ── delete ── */
    const deleteMsg = async (msgId) => {
      setSelectedMsg(null);
      await db.collection("messages").doc(msgId).delete();
    };

    /* ── edit ── */
    const startEdit = (msg) => {
      setEditingMsg({id: msg.id, text: msg.text});
      setInput(msg.text);
      setSelectedMsg(null);
    };

    const cancelEdit = () => {
      setEditingMsg(null);
      setInput("");
    };

    /* ── text / edit ── */
    const send = async () => {
      const text = input.trim(); if(!text) return;
      if(!user){ onLogin(); return; }

      // Режим редактирования
      if(editingMsg) {
        setInput(""); setEditingMsg(null);
        try {
          await db.collection("messages").doc(editingMsg.id).update({text, edited: true});
        } catch(e) { alert("Ошибка редактирования: " + e.message); }
        return;
      }

      setInput(""); setReplyTo(null); setSelectedMsg(null);
      try {
        const base = mkBase();
        const msg = {...base, type:"text", text};
        if(replyTo) msg.replyTo={id:replyTo.id,text:replyTo.text||"",displayName:replyTo.displayName,username:replyTo.username||""};
        await db.collection("messages").add(msg);
      } catch(e) {
        setInput(text);
        alert("Ошибка отправки: " + e.message + "\n\nПроверь правила Firestore — разреши write для коллекции messages.");
      }
    };

    /* ── photo ── */
    const sendPhoto = async (file) => {
      if(!file) return;
      if(!user){ onLogin(); return; }
      setAttachOpen(false); setMediaUploading(true);
      try {
        const url = await uploadFile(file, `chat_photos/${user.uid}_${Date.now()}.jpg`, file.type||"image/jpeg");
        await db.collection("messages").add({...mkBase(), type:"image", imageUrl:url});
      } catch(e) {
        alert("Ошибка загрузки фото: " + e.message + "\n\nПроверь правила Firebase Storage.");
      }
      setMediaUploading(false);
    };

    /* ── video from gallery ── */
    const sendVideoFile = async (file) => {
      if(!file) return;
      if(!user){ onLogin(); return; }
      setAttachOpen(false); setMediaUploading(true);
      try {
        const ext = (file.name||"").split(".").pop() || "mp4";
        const url = await uploadFile(file, `chat_videos/${user.uid}_${Date.now()}.${ext}`, file.type||"video/mp4");
        await db.collection("messages").add({...mkBase(), type:"video", videoUrl:url});
      } catch(e) {
        alert("Ошибка загрузки видео: " + e.message);
      }
      setMediaUploading(false);
    };

    /* ── video circle ── */
    const [camFacing, setCamFacing] = useState("environment");

    const startCamStream = async (facing) => {
      if(vidStream.current){ vidStream.current.getTracks().forEach(t=>t.stop()); vidStream.current=null; }
      const s = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:facing, width:{ideal:400}, height:{ideal:400}},
        audio: true
      });
      vidStream.current = s;
      if(liveRef.current){ liveRef.current.srcObject=s; liveRef.current.play(); }
      return s;
    };

    const openVideoRec = async () => {
      if(!user){ onLogin(); return; }
      setAttachOpen(false);
      setVidBlob(null); setVidPreview(null); setVidRec(false); setVidSec(0);
      try {
        await startCamStream(camFacing);
        setShowVideoRec(true);
      } catch(e){ alert("Нет доступа к камере: " + e.message); }
    };

    const flipCamera = async () => {
      if(vidRec) return; // нельзя флипнуть во время записи
      const newFacing = camFacing === "environment" ? "user" : "environment";
      setCamFacing(newFacing);
      try { await startCamStream(newFacing); }
      catch(e){ alert("Не удалось переключить камеру: " + e.message); }
    };

    const startVidRec = () => {
      if(!vidStream.current) return;
      vidChunks.current = [];
      const mime = MediaRecorder.isTypeSupported("video/mp4") ? "video/mp4" : "video/webm";
      const mr = new MediaRecorder(vidStream.current, {mimeType:mime});
      mr.ondataavailable = e => { if(e.data&&e.data.size>0) vidChunks.current.push(e.data); };
      mr.onstop = () => {
        const blob = new Blob(vidChunks.current, {type:mime});
        setVidBlob(blob); setVidPreview(URL.createObjectURL(blob)); setVidRec(false);
        if(liveRef.current) liveRef.current.srcObject = null;
        if(vidStream.current){ vidStream.current.getTracks().forEach(t=>t.stop()); vidStream.current=null; }
      };
      mr.start(100); vidMR.current = mr;
      setVidRec(true); setVidSec(0);
      vidTimer.current = setInterval(()=>setVidSec(s=>{ if(s>=59){stopVidRec();return 60;} return s+1; }),1000);
    };

    const stopVidRec = () => {
      if(vidTimer.current){ clearInterval(vidTimer.current); vidTimer.current=null; }
      if(vidMR.current && vidMR.current.state!=="inactive") vidMR.current.stop();
    };

    const closeVideoRec = () => {
      stopVidRec();
      if(vidStream.current){ vidStream.current.getTracks().forEach(t=>t.stop()); vidStream.current=null; }
      setShowVideoRec(false); setVidBlob(null); setVidPreview(null); setVidRec(false); setVidSec(0);
    };

    const sendVideoCircle = async () => {
      if(!vidBlob||!user) return;
      setVidUploading(true);
      try {
        const ext = vidBlob.type.includes("mp4") ? "mp4" : "webm";
        const url = await uploadFile(vidBlob, `chat_videos/${user.uid}_${Date.now()}.${ext}`, vidBlob.type);
        await db.collection("messages").add({...mkBase(), type:"video", videoUrl:url});
        closeVideoRec();
      } catch(e){ alert("Ошибка: " + e.message + "\n\nПроверь правила Firebase Storage."); }
      setVidUploading(false);
    };

    /* ── voice ── */
    const startVoice = async () => {
      if(!user){ onLogin(); return; }
      try {
        const s = await navigator.mediaDevices.getUserMedia({audio:true});
        voiceStream.current = s; voiceChunks.current = [];
        const mime = MediaRecorder.isTypeSupported("audio/mp4") ? "audio/mp4" : "audio/webm";
        const mr = new MediaRecorder(s, {mimeType:mime});
        mr.ondataavailable = e => { if(e.data&&e.data.size>0) voiceChunks.current.push(e.data); };
        mr.onstop = async () => {
          const blob = new Blob(voiceChunks.current, {type:mime});
          const dur = voiceSec;
          setVoiceRec(false); setVoiceSec(0);
          try {
            const ext = mime.includes("mp4") ? "m4a" : "webm";
            const url = await uploadFile(blob, `chat_voice/${user.uid}_${Date.now()}.${ext}`, mime);
            await db.collection("messages").add({...mkBase(), type:"voice", voiceUrl:url, dur});
          } catch(e){ alert("Ошибка загрузки голосового: " + e.message); }
        };
        mr.start(100); voiceMR.current = mr;
        setVoiceRec(true); setVoiceSec(0);
        voiceTimer.current = setInterval(()=>setVoiceSec(s=>{ if(s>=120){stopVoice();return 120;} return s+1; }),1000);
      } catch(e){ alert("Нет доступа к микрофону: " + e.message); }
    };

    const stopVoice = () => {
      if(voiceTimer.current){ clearInterval(voiceTimer.current); voiceTimer.current=null; }
      if(voiceMR.current && voiceMR.current.state!=="inactive") voiceMR.current.stop();
      if(voiceStream.current){ voiceStream.current.getTracks().forEach(t=>t.stop()); voiceStream.current=null; }
    };

    const aColor=uid=>{const cols=[C.accent,C.cyan,C.gold,C.blue,"#a78bfa","#f472b6"];let h=0;for(let c of(uid||"x"))h=(h*31+c.charCodeAt(0))%cols.length;return cols[h];};
    const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{padding:"10px 16px 8px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center"}}><MessageCircle size={17} color="#fff"/></div>
            <div><div style={{fontSize:13,fontWeight:700,color:C.text}}>Чат рыбаков</div><div style={{fontSize:10,color:C.accent}}>{onlineCount} онлайн · Ростовская обл.</div></div>
          </div>
          {!user&&<button onClick={onLogin} style={{padding:"6px 12px",borderRadius:12,border:`1px solid ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:11,fontWeight:700,cursor:"pointer"}}>Войти</button>}
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"12px 12px 6px"}} onClick={()=>setAttachOpen(false)}>
          {!noMoreOlder&&messages.length>=50&&(
            <div style={{textAlign:"center",padding:"8px 0 12px"}}>
              <button onClick={loadOlderMsgs} disabled={loadingOlder} style={{padding:"7px 18px",borderRadius:16,border:`1px solid ${C.border}`,background:C.surface,color:C.muted,fontSize:12,cursor:"pointer"}}>
                {loadingOlder?"Загружаем...":"📋 Загрузить старые сообщения"}
              </button>
            </div>
          )}
          {allMsgs.length===0&&<div style={{textAlign:"center",padding:40,color:C.dimmer}}><MessageCircle size={40} color={C.dimmer} style={{margin:"0 auto 12px",display:"block"}}/><div style={{fontSize:14}}>Будь первым!</div></div>}
          {allMsgs.map((msg,i)=>{
            const isMe=user&&msg.uid===user.uid, col=aColor(msg.uid), ts=msg.timestamp?fmtDate(msg.timestamp):"";
            const isVideo=msg.type==="video"&&msg.videoUrl;
            const isVoice=msg.type==="voice"&&msg.voiceUrl;
            const isImage=msg.type==="image"&&msg.imageUrl;
            const isSel=selectedMsg===msg.id;
            // показываем время только в конце кластера (последнее сообщение отправителя или при выборе)
            const showTs = isSel || i===allMsgs.length-1 || allMsgs[i+1]?.uid!==msg.uid;
            // прячем аватар/имя если предыдущее — тот же отправитель
            const sameAsPrev = i>0 && allMsgs[i-1]?.uid===msg.uid;
            const rxEntries=Object.entries(msg.reactions||{}).filter(([,u])=>u&&u.length>0);
            return (
              <div key={msg.id} style={{display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start",marginBottom:sameAsPrev?3:10,animation:"fadeUp .25s ease"}}>
                <div style={{display:"flex",justifyContent:isMe?"flex-end":"flex-start",width:"100%"}}>
                  {!isMe&&<div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,background:sameAsPrev?"transparent":`linear-gradient(135deg,${col},${col}88)`,display:"flex",alignItems:"center",justifyContent:"center",marginRight:8,alignSelf:"flex-end",fontSize:13,fontWeight:800,color:"#07111e"}}>{sameAsPrev?"":(msg.displayName||"Р")[0].toUpperCase()}</div>}
                  <div style={{maxWidth:isVideo?"160px":"75%"}} onClick={()=>setSelectedMsg(isSel?null:msg.id)}>
                    {!isMe&&!sameAsPrev&&<div style={{fontSize:10,color:col,fontWeight:700,marginBottom:2,paddingLeft:4,display:"flex",alignItems:"center",gap:4}}>
                      {msg.topBadge&&<span style={{fontSize:12}}>{msg.topBadge}</span>}
                      {msg.displayName}
                      {msg.username&&<span style={{color:C.dimmer,fontWeight:400,marginLeft:2}}>@{msg.username}</span>}
                    </div>}
                    {/* Reply preview inside bubble */}
                    {msg.replyTo&&<div style={{margin:"0 0 6px",padding:"6px 10px",borderRadius:8,background:"rgba(255,255,255,.06)",borderLeft:`3px solid ${col}`,cursor:"default"}} onClick={e=>e.stopPropagation()}>
                      <div style={{fontSize:10,color:col,fontWeight:700,marginBottom:1}}>{msg.replyTo.displayName}{msg.replyTo.username?` @${msg.replyTo.username}`:""}</div>
                      <div style={{fontSize:11,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:180}}>{msg.replyTo.text||"медиафайл"}</div>
                    </div>}
                    {isVideo&&<div>
                      <VideoNote url={msg.videoUrl} isMe={isMe} col={col}/>
                      <div style={{display:"flex",alignItems:"center",justifyContent:isMe?"flex-end":"flex-start",gap:8,marginTop:4}}>
                        {showTs&&<div style={{fontSize:9,opacity:.4}}>{ts}</div>}
                        <button onClick={e=>{e.stopPropagation();setSelectedMsg(isSel?null:msg.id);}}
                          style={{background:"rgba(255,255,255,.07)",border:`1px solid ${C.border}`,borderRadius:12,padding:"2px 8px",fontSize:12,cursor:"pointer",color:C.muted}}>
                          😊
                        </button>
                      </div>
                    </div>}
                    {isVoice&&<div>
                      <VoiceMessage url={msg.voiceUrl} dur={msg.dur} isMe={isMe} col={col}/>
                      <div style={{display:"flex",alignItems:"center",justifyContent:isMe?"flex-end":"flex-start",gap:8,marginTop:4}}>
                        {showTs&&<div style={{fontSize:9,opacity:.4}}>{ts}</div>}
                        <button onClick={e=>{e.stopPropagation();setSelectedMsg(isSel?null:msg.id);}}
                          style={{background:"rgba(255,255,255,.07)",border:`1px solid ${C.border}`,borderRadius:12,padding:"2px 8px",fontSize:12,cursor:"pointer",color:C.muted}}>
                          😊
                        </button>
                      </div>
                    </div>}
                    {isImage&&<div>
                      <div style={{position:"relative",display:"inline-block"}}>
                        <img src={msg.imageUrl} alt="" style={{maxWidth:220,maxHeight:200,borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",display:"block",objectFit:"cover"}}/>
                        <a href={msg.imageUrl} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
                          style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,.6)",borderRadius:8,padding:"3px 8px",fontSize:11,color:"#fff",textDecoration:"none",backdropFilter:"blur(4px)"}}>
                          🔍
                        </a>
                      </div>
                      {showTs&&<div style={{fontSize:9,marginTop:4,opacity:.4,textAlign:isMe?"right":"left"}}>{ts}</div>}
                    </div>}
                    {!isVideo&&!isVoice&&!isImage&&<div style={{padding:"10px 14px",borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",background:isMe?`linear-gradient(135deg,#1a5276,${C.blue})`:"rgba(255,255,255,0.07)",border:isMe?"none":`1px solid ${C.border}`,color:C.text,fontSize:13.5,lineHeight:1.5}}>
                      {msg.text}
                      {showTs&&<div style={{fontSize:9,marginTop:4,opacity:.4,textAlign:"right",display:"flex",justifyContent:"flex-end",gap:6}}>
                        {msg.edited&&<span>изменено</span>}
                        <span>{ts}</span>
                      </div>}
                    </div>}
                  </div>
                </div>

                {/* Reactions display */}
                {rxEntries.length>0&&<div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap",paddingLeft:isMe?0:40}}>
                  {rxEntries.map(([emoji,uids])=>(
                    <button key={emoji} onClick={()=>toggleReaction(msg.id,emoji)}
