  /* ── Weather fetch (Open-Meteo, бесплатно) ── */
  async function fetchWeather(lat = 47.27, lon = 39.87) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      "&current=temperature_2m,wind_speed_10m,surface_pressure,weather_code,relative_humidity_2m" +
      "&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max,precipitation_sum,wind_speed_10m_max,sunrise,sunset" +
      "&hourly=temperature_2m,precipitation_probability,wind_speed_10m,weather_code" +
      "&forecast_days=7&wind_speed_unit=ms&timezone=Europe%2FMoscow";
    const r = await fetch(url);
    const d = await r.json();
    const c = d.current;
    const airTemp = Math.round(c.temperature_2m);
    const month = new Date().getMonth();
    const waterTemp = month >= 5 && month <= 8 ? airTemp - 1 : airTemp - 3;
    const pressureMmHg = Math.round(c.surface_pressure * 0.750064);
    return {
      airTemp, waterTemp: Math.max(2, waterTemp),
      wind: Math.round(c.wind_speed_10m),
      pressure: pressureMmHg,
      humidity: c.relative_humidity_2m,
      code: c.weather_code,
      updated: new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}),
      daily: d.daily,
      hourly: d.hourly,
    };
  }

  /* ── Bite score (давление + месяц) ── */
  function calcBiteScore(pressure, month) {
    let score = 7;
    if (pressure >= 758 && pressure <= 765) score = 9;
    else if (pressure >= 750 && pressure <= 770) score = 8;
    else if (pressure < 745 || pressure > 775) score = 5;
    if (month >= 4 && month <= 9) score = Math.min(10, score + 1);
    return score;
  }

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371, p = Math.PI / 180;
    const dLat = (lat2 - lat1) * p, dLon = (lon2 - lon1) * p;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin(dLon/2)**2;
    return R * 2 * Math.asin(Math.sqrt(a));
  }

      const scoreText = score>=8?"отличный":score>=6?"хороший":score>=4?"средний":"слабый";
      const nearShops = fmtNearestShops(2);
      const spot1 = nearestFishSpot("лещ"), spot2 = nearestFishSpot("судак");
      return score>=7
        ? `Клёв сегодня ${scoreText}! 🎣\n\n${moon.ico} ${moon.tip}\nДавление ${weather.pressure} мм, вода +${weather.waterTemp}°C — рыба активна.\n\nСейчас на Дону: ${seasonFish(month)}\n\nБлижайшие точки:\n📍 ${spot1.n}\n${ymaps(spot1.c)}\n📍 ${spot2.n}\n${ymaps(spot2.c)}${nearShops}\n\nСпроси про конкретную рыбу или снасть — отвечу подробнее.`
        : `Клёв ${scoreText} (давление ${weather.pressure} мм).\n\n${moon.ico} ${moon.tip}\n\nПри нестабильной погоде лучше берёт хищник:\n📍 ${spot2.n}\n${ymaps(spot2.c)}${nearShops}\n\nСпроси конкретнее: "где ловить щуку", "какая насадка для карася", "почему не клюёт".`;
    }
    return pick([
      `Спроси меня конкретнее 🎣\n\nЯ могу:\n• Назвать ближайшие точки по любой рыбе\n• Дать прогноз клёва по погоде и луне\n• Рассказать снасти, насадки, прикормки\n• Объяснить технику проводки\n• Сказать что сейчас активно по сезону\n• Предупредить о запретах\n\nПример: "где ловить сома", "как прикормить леща", "почему не клюёт"`,
      `Уточни вопрос — отвечу точно и по делу.\n\nТемы: рыба (щука, судак, лещ, сазан, карась, сом, карп, амур, берш...), снасти (фидер, спиннинг, поплавок, нахлыст), точки, прогноз, луна, запреты, зима.\n\nЧто интересует?`,
    ]);
  };

  // ── Context-aware AI wrapper ──
  const FISH_NAMES = ["амур","щука","лещ","карась","сазан","судак","карп","плотва","тарань","голавль","красноперка","толстолобик","чехонь","сом","окунь","жерех","берш","бычок","линь","пиленгас"];
  const detectFish = l => FISH_NAMES.find(f=>l.includes(f));

  const getBotReplyCtx = (q, weather, ctx={}) => {
    const l = q.toLowerCase();
    const newCtx = {...ctx};
    const fish = detectFish(l);
    if(fish) newCtx.fish = fish;

    // ── resolve pending: waiting for fish name ──
    if(ctx.pending === 'fish') {
      if(fish) {
        newCtx.pending = null;
        const pf = ctx.pendingFor;
        if(pf === 'spots') {
          const s = nearestFishSpot(fish);
          return {text:`Точки для ловли ${fish}а:\n\n📍 ${s.n}\n${ymaps(s.c)}\n\nЕщё — спроси "ещё точки для ${fish}а"`, ctx:newCtx};
        }
        if(pf === 'bait')   return {text:getBotReply(`насадки для ${fish}`, weather), ctx:newCtx};
        if(pf === 'tackle') return {text:getBotReply(`снасти для ${fish}`, weather),  ctx:newCtx};
        // generic — ask what aspect
        newCtx.pending = 'topic';
        const cap = fish.charAt(0).toUpperCase()+fish.slice(1);
        return {text:`${cap} — отличный выбор! Что интересует:\n\n1️⃣ Точки ловли (GPS)\n2️⃣ Насадки и прикормка\n3️⃣ Снасти и оснастка\n4️⃣ Лучшее время\n\nНапиши цифру или своими словами.`, ctx:newCtx};
      }
      return {text:`Не расслышал 😄 Какую рыбу ловишь? Например: лещ, судак, щука, сазан, сом, берш, амур...`, ctx:newCtx};
    }

    // ── resolve pending: waiting for topic selection ──
    if(ctx.pending === 'topic' && ctx.fish) {
      const f = ctx.fish;
      newCtx.pending = null;
      if(l.match(/^1$|точк|место|куда|где|координат/))               { const s=nearestFishSpot(f); return {text:`📍 Точки для ${f}а:\n\n${s.n}\n${ymaps(s.c)}\n\nЧто ещё интересует по ${f}у?`, ctx:newCtx}; }
      if(l.match(/^2$|насад|прикорм|наживк|мотыл|червь|опарыш|бойл/)) return {text:getBotReply(`насадки для ${f}`, weather), ctx:newCtx};
      if(l.match(/^3$|снаст|фидер|спиннинг|поплавок|удоч|оснастк/))  return {text:getBotReply(`снасти для ${f}`, weather),  ctx:newCtx};
      if(l.match(/^4$|время|сезон|когда|лучш/)) {
        const moon=moonPhase(), month=new Date().getMonth();
        return {text:`🕐 Лучшее время для ${f}а:\n\n${moon.ico} ${moon.tip}\n\nАктивен сейчас: ${seasonFish(month)}\n\nЛучшие часы: 4–8 утра и 17–20 вечера.`, ctx:newCtx};
      }
      // topic not matched — fall through to normal processing
    }

    // ── context-enhanced "где/куда" without fish ──
    if(!fish && l.match(/где|куда|точк|место|координат/) && !l.match(/насадк|снасти?|прикорм|наживк/)) {
      if(newCtx.fish) {
        const s = nearestFishSpot(newCtx.fish);
        return {text:`Точки для ${newCtx.fish}а:\n\n📍 ${s.n}\n${ymaps(s.c)}`, ctx:newCtx};
      }
      newCtx.pending='fish'; newCtx.pendingFor='spots';
      return {text:`Какую рыбу ловишь? Дам GPS-точки именно под неё.\n\nЕсть места для: леща, судака, щуки, сазана, карася, сома, берша, амура, бычка...`, ctx:newCtx};
    }

    // ── context-enhanced "на что/насадки" without fish ──
    if(!fish && l.match(/на что|насадк|наживк|приманк/)) {
      if(newCtx.fish) return {text:getBotReply(`насадки для ${newCtx.fish}`, weather), ctx:newCtx};
      newCtx.pending='fish'; newCtx.pendingFor='bait';
      return {text:`На кого ловишь? Подберу насадку точно под рыбу.`, ctx:newCtx};
    }

    // ── context-enhanced "снасти" without fish ──
    if(!fish && l.match(/снасти?|снасть|оснастк/) && !l.match(/фидер|спиннинг|поплавок/)) {
      if(newCtx.fish) return {text:getBotReply(`снасти для ${newCtx.fish}`, weather), ctx:newCtx};
      newCtx.pending='fish'; newCtx.pendingFor='tackle';
      return {text:`Снасти под какую рыбу? Укажи — дам конкретные рекомендации.`, ctx:newCtx};
    }

    // ── context-aware greeting ──
    if(l.match(/привет|здрав|дарова|хай|добрый|как дела/)) {
      const txt = newCtx.fish
        ? `Снова привет! Продолжаем по ${newCtx.fish}у или что-то новое? 🎣`
        : pick([`Здорово, рыбак! 🎣 Что интересует — куда поехать, что ловить, на что клюёт?`,`Привет! Спрашивай — знаю все ямы Дона 😄`]);
      return {text:txt, ctx:newCtx};
    }

    // ── default: original logic ──
    newCtx.pending = null;
    return {text:getBotReply(q, weather), ctx:newCtx};
  };

  // Yandex Maps helpers (Yandex uses lon,lat order, opposite of Google)
  const ymaps   = (latlon) => { const [la,lo]=String(latlon).split(",").map(s=>s.trim()); return `https://yandex.ru/maps/?pt=${lo},${la}&z=14`; };
  const ymapsLL = (lat,lon) => `https://yandex.ru/maps/?pt=${lon},${lat}&z=14`;

  const fmtTime = () => new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  const fmtDate = (ts) => {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString("ru-RU",{day:"numeric",month:"short"})+" "+d.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});

  const PRESSURE_DATA = [757,758,756,759,761,760,762,761,763,762,764,763];

  function genUsername(displayName) {

  /* ── Sparkline ── */
  function Sparkline({ data, width=280, height=60 }) {
    const min=Math.min(...data)-2, max=Math.max(...data)+2;
    const pts = data.map((v,i)=>{ const x=(i/(data.length-1))*width, y=height-((v-min)/(max-min))*height; return `${x},${y}`; }).join(" ");
    const fillPts = `0,${height} ${pts} ${width},${height}`;
    const [lx,ly] = pts.split(" ").slice(-1)[0].split(",");
    return (
      <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{overflow:"visible"}}>
        <defs>
          <linearGradient id="spGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={C.accent} stopOpacity="0.35"/><stop offset="100%" stopColor={C.accent} stopOpacity="0"/>
          </linearGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <polygon points={fillPts} fill="url(#spGrad)"/>
        <polyline points={pts} fill="none" stroke={C.accent} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" filter="url(#glow)"/>
        <circle cx={lx} cy={ly} r="4" fill={C.accent} style={{filter:`drop-shadow(0 0 6px ${C.accent})`}}/>
      </svg>
    );
  }

  /* ── BiteArc ── */
  function BiteArc({ score=8 }) {
    const pct=score/10, R=52, cx=64, cy=64, sA=Math.PI*.75, eA=Math.PI*2.25, sw=eA-sA;
    const ang=sA+sw*pct, xy=(a)=>[cx+R*Math.cos(a),cy+R*Math.sin(a)];
    const [bx,by]=xy(sA),[ex,ey]=xy(ang),[fx,fy]=xy(eA);
    const large=sw*pct>Math.PI?1:0, tl=(eA-sA)>Math.PI?1:0;
    const col=score>=8?C.accent:score>=5?C.gold:"#ef4444";
    return (
      <svg width={128} height={96} viewBox="0 0 128 96">
        <defs><linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor={col} stopOpacity="0.4"/><stop offset="100%" stopColor={col}/></linearGradient></defs>
        <path d={`M${bx},${by} A${R},${R} 0 ${tl},1 ${fx},${fy}`} stroke="rgba(255,255,255,0.08)" strokeWidth="10" fill="none" strokeLinecap="round"/>
        {pct>0&&<path d={`M${bx},${by} A${R},${R} 0 ${large},1 ${ex},${ey}`} stroke="url(#arcGrad)" strokeWidth="10" fill="none" strokeLinecap="round" style={{filter:`drop-shadow(0 0 8px ${col})`}}/>}
        <text x={cx} y={cy-4} textAnchor="middle" fill={col} style={{fontSize:28,fontWeight:800,fontFamily:"'Bebas Neue',cursive",filter:`drop-shadow(0 0 10px ${col})`}}>{score}</text>
        <text x={cx} y={cy+14} textAnchor="middle" fill={C.muted} style={{fontSize:9,letterSpacing:2}}>ИЗ 10</text>
      </svg>
    );
  }

              <button key={m} onClick={()=>{setMode(m);setError("");}} style={{flex:1,padding:"9px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:mode===m?`linear-gradient(135deg,#1a8a50,${C.accent})`:"transparent",color:mode===m?"#07111e":C.muted,transition:"all .2s"}}>
                {m==="login"?"Войти":"Регистрация"}

          <button onClick={submit} disabled={loading} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",cursor:"pointer",background:loading?C.surface:`linear-gradient(135deg,#1a8a50,${C.accent})`,color:loading?C.muted:"#07111e",fontSize:15,fontWeight:800,boxShadow:loading?"none":`0 4px 20px ${C.accentGlow}`}}>
            {loading?"Загрузка...":mode==="login"?"Войти":"Создать аккаунт"}
          </button>
          <div style={{textAlign:"center",marginTop:12,fontSize:12,color:C.dimmer}}>

  }

  /* ── Shared: Voice Message Player ── */
  function VoiceMessage({ url, dur, isMe, col }) {

    const [prog, setProg] = useState(0);
    const [cur, setCur] = useState(0);
    const [total, setTotal] = useState(dur||0);
    const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;

    const toggle = () => {
      const a = aRef.current; if(!a) return;
      if(a.paused){ a.play(); setPlaying(true); } else { a.pause(); setPlaying(false); }
    };
    return (
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:24,background:isMe?`linear-gradient(135deg,#1a5276,${C.blue})`:"rgba(255,255,255,0.08)",border:isMe?"none":`1px solid ${C.border}`,minWidth:200,maxWidth:260}}>

        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"flex-end",gap:2,height:22,marginBottom:4}}>
            {BARS.map((h,i)=><div key={i} style={{width:2.5,height:h,borderRadius:2,background:prog*BARS.length>i?(isMe?"rgba(255,255,255,.9)":col):"rgba(255,255,255,.2)",transition:"background .1s"}}/>)}
          </div>
          <div style={{fontSize:10,color:"rgba(255,255,255,.45)"}}>{fmt(cur)} / {fmt(total)}</div>
        </div>
      </div>
    );
  }

  /* ── Shared: render link text ── */
  const renderLinks = (text, isUser) =>
    (text||"").replace(/\*/g,"").split(/(https?:\/\/[^\s\n]+)/g).map((part,i)=>{
      if(!part.match(/^https?:\/\//)) return part;
      const isMaps=part.includes("maps.google")||part.includes("google.com/maps");
      const isWB=part.includes("wildberries"), isOzon=part.includes("ozon.ru"), isYM=part.includes("market.yandex");
      const label=isMaps?"📍 Открыть на карте →":isWB?"🛒 Wildberries →":isOzon?"🛒 Ozon →":isYM?"🛒 Яндекс Маркет →":part;
      return <span key={i} onClick={()=>window.open(part,"_blank","noopener,noreferrer")} style={{display:"inline-block",color:isUser?"#07111e":C.accent,textDecoration:"underline",cursor:"pointer",wordBreak:"break-all",fontWeight:isMaps||isWB||isOzon||isYM?700:400}}>{label}</span>;
    });

  /* ── Bubble (AI chat) ── */
  function Bubble({ msg }) {
    const isUser=msg.role==="user";
    const bg  = isUser?`linear-gradient(135deg,#1a8a50,${C.accent})`:"rgba(255,255,255,0.07)";
    const col = isUser?"#07111e":C.text;
    const br  = isUser?"18px 18px 4px 18px":"18px 18px 18px 4px";
    return (
      <div style={{display:"flex",justifyContent:isUser?"flex-end":"flex-start",marginBottom:12,animation:"fadeUp .3s ease"}}>
        {!isUser&&<div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",marginRight:8,alignSelf:"flex-end",boxShadow:`0 0 14px ${C.accentGlow}`}}><Fish size={17} color="#07111e"/></div>}
        <div style={{maxWidth:"80%"}}>
          {msg.type==="image"&&<div style={{marginBottom:msg.text?6:0}}>

          </div>}
          {msg.type==="voice"&&<VoiceMessage url={msg.voiceUrl} dur={msg.dur} isMe={isUser} col={C.accent}/>}
          {(msg.text||(!msg.type||msg.type==="text"))&&msg.type!=="voice"&&<div style={{padding:"11px 15px",borderRadius:br,background:bg,border:isUser?"none":`1px solid ${C.border}`,color:col,fontSize:13.5,lineHeight:1.6,fontWeight:isUser?600:400,backdropFilter:"blur(12px)",whiteSpace:"pre-wrap"}}>

            {renderLinks(msg.text,isUser)}
            <div style={{fontSize:10,marginTop:5,opacity:.5,textAlign:"right",color:col}}>{msg.time}</div>
          </div>}
          {msg.type==="image"&&<div style={{fontSize:10,marginTop:3,opacity:.4,textAlign:isUser?"right":"left",color:C.text}}>{msg.time}</div>}

  function Typing(){return(<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><div style={{width:34,height:34,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 14px ${C.accentGlow}`,flexShrink:0}}><Fish size={17} color="#07111e"/></div><div style={{padding:"12px 16px",borderRadius:"18px 18px 18px 4px",background:"rgba(255,255,255,0.07)",border:`1px solid ${C.border}`,display:"flex",gap:5,alignItems:"center"}}>{[0,1,2].map(i=>(<div key={i} style={{width:7,height:7,borderRadius:"50%",background:C.accent,animation:`bounce 1.2s ease ${i*.2}s infinite`}}/>))}</div></div>);}

  /* ── HOME ── */
  function HomeScreen({ onGoChat, weather, weatherLoading, onRefreshWeather, setTab, userLat, userLon }) {
    const month = new Date().getMonth();
    const biteScore = weather ? calcBiteScore(weather.pressure, month) : 8;
    const biteLabel = biteScore>=9?"Превосходный!":biteScore>=8?"Отличный!":biteScore>=6?"Хороший":biteScore>=4?"Средний":"Слабый";

    // Ближайшие водоёмы по геолокации
    const nearestBodies = useMemo(()=>{
      if(!userLat||!userLon) return [WATER_BODIES[0]];
      return [...WATER_BODIES].sort((a,b)=>haversine(userLat,userLon,a.lat,a.lon)-haversine(userLat,userLon,b.lat,b.lon));
    },[userLat,userLon]);

    const [bodyIdx,setBodyIdx]=useState(0);
    useEffect(()=>{
      if(nearestBodies.length<=1) return;
      const t=setInterval(()=>setBodyIdx(i=>(i+1)%Math.min(nearestBodies.length,3)),30000);
      return()=>clearInterval(t);
    },[nearestBodies]);
    const currentBody = nearestBodies[bodyIdx]||WATER_BODIES[0];

    // Уровень воды из Firestore (бот обновляет каждый час)
    const [waterLevel,setWaterLevel]=useState(null);
    useEffect(()=>{
      const unsub=db.collection("water_levels").doc("don-rostov").onSnapshot(doc=>{
        if(doc.exists) setWaterLevel(doc.data());
      });
      return unsub;
    },[]);

    // Сезонный запасной уровень если Firestore пустой
    const seasonalLevel=()=>{const m=new Date().getMonth()+1;const lvl={1:-20,2:-15,3:15,4:80,5:40,6:5,7:-10,8:-15,9:-5,10:0,11:-10,12:-20};return lvl[m]||0;};
    const levelVal = waterLevel ? waterLevel.level : seasonalLevel();
    const levelStr = `${levelVal>=0?'+':''}${levelVal} см`;

    const nearestSpots = useMemo(()=>{
      if(!userLat||!userLon) return SPOT_LIST.slice(0,3);
      return [...SPOT_LIST]
        .sort((a,b)=>haversine(userLat,userLon,a.lat,a.lon)-haversine(userLat,userLon,b.lat,b.lon))
        .slice(0,3);
    },[userLat,userLon]);
    const PRESSURE_LABELS=["8ч","","10ч","","12ч","","14ч","","16ч","","18ч",""];
    const pressureData = weather ? [...PRESSURE_DATA.slice(0,-1), weather.pressure] : PRESSURE_DATA;
    return (
      <div style={{padding:"0 14px",overflowY:"auto",height:"100%",paddingBottom:20}}>
        <div style={{...glass(`0 8px 32px rgba(0,0,0,.4),0 0 0 1px ${C.borderHi}`),background:"linear-gradient(135deg,rgba(46,204,113,.12) 0%,rgba(34,211,238,.08) 50%,rgba(59,130,246,.10) 100%)",padding:20,marginBottom:14,position:"relative",overflow:"hidden",animation:"fadeUp .5s ease"}}>
          <div style={{position:"absolute",top:-40,right:-40,width:180,height:180,borderRadius:"50%",background:"radial-gradient(circle,rgba(46,204,113,.15) 0%,transparent 70%)",pointerEvents:"none"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <Star size={12} color={C.gold} fill={C.gold}/>
                <span style={{fontSize:10,color:C.gold,letterSpacing:2.5,fontWeight:700}}>ПРОГНОЗ ДНЯ</span>
                <button onClick={onRefreshWeather} style={{background:"none",border:"none",cursor:"pointer",padding:2,marginLeft:4}}>
                  <RefreshCw size={11} color={weatherLoading?C.accent:C.dimmer} style={weatherLoading?{animation:"spin 1s linear infinite"}:undefined}/>
                </button>
              </div>
              <div style={{fontSize:20,fontWeight:800,color:C.text,lineHeight:1.2}}>{biteLabel}</div>
              <div style={{fontSize:12,color:C.muted,marginTop:2,display:"flex",alignItems:"center",gap:4}}>
                {userLat?"📍":"🗺"}
                <span key={currentBody.name} style={{animation:"textSwap 30s ease",display:"inline-block",color:C.accent,fontWeight:700}}>{currentBody.name}</span>
                <span>· {weather?"обновлено "+weather.updated:"загрузка..."}</span>
              </div>
            </div>
            <BiteArc score={biteScore}/>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:10,color:C.dimmer,letterSpacing:1.5}}>ДАВЛЕНИЕ (ммрт)</span>
              <span style={{fontSize:11,fontWeight:700,color:C.accent}}>{weather?`${weather.pressure} мм`:"…"}</span>
            </div>
            <Sparkline data={pressureData}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
              {PRESSURE_LABELS.filter((_,i)=>i%2===0).map((l,i)=>(<span key={i} style={{fontSize:9,color:C.dimmer}}>{l}</span>))}
            </div>
          </div>
          <div style={{background:"rgba(0,0,0,.3)",borderRadius:14,padding:"12px 14px",borderLeft:`3px solid ${C.accent}`}}>
            <div style={{fontSize:10,color:C.accent,letterSpacing:2,fontWeight:700,marginBottom:5}}>ИИ-СОВЕТ ЕГЕРЯ</div>
            <div style={{fontSize:13,color:"rgba(232,244,240,.85)",lineHeight:1.6}}>
              {weather ? (()=>{
                const sc = calcBiteScore(weather.pressure, month);
                const moon = moonPhase();
                const hr = new Date().getHours();
                const spot = nearestSpots[0]?.name || "Вторую дамбу";
                const timeHint = hr>=4&&hr<=8?"Сейчас пиковые часы":hr>=17&&hr<=20?"Вечерний выход рыбы":hr>=21||hr<=3?"Ночь — время сома":null;
                if(sc>=8) return `${moon.ico} Клёв отличный! Давление ${weather.pressure} мм, вода +${weather.waterTemp}°C у ${currentBody.name}.${timeHint?" "+timeHint+"!":" Фидер на"} ${spot} — лещ и сазан берут.`;
                if(sc>=6) return `${moon.ico} Клёв хороший. Давление ${weather.pressure} мм у ${currentBody.name}, вода +${weather.waterTemp}°C. Ближайшая точка: ${spot}.`;
                return `${moon.ico} Клёв слабый — давление ${weather.pressure} мм. Хищник активнее: спиннинг у ${currentBody.name} на ${spot}.`;
              })() : "Загружаю актуальный прогноз..."}
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14,animation:"fadeUp .6s ease"}}>
          <WPill Icon={Thermometer} val={weather?`+${weather.airTemp}°C`:"…"} label="воздух" color={C.gold} loading={weatherLoading}/>
          <WPill Icon={Droplets}    val={weather?`+${weather.waterTemp}°C`:"…"} label="вода"   color={C.cyan} loading={weatherLoading}/>
          <WPill Icon={Wind}        val={weather?`${weather.wind} м/с`:"…"}  label="ветер" color={C.blue} loading={weatherLoading}/>
          <WPill Icon={Waves}       val={levelStr} label={waterLevel?"Дон · живой":"Дон · сезон"} color={C.accent} loading={false}/>
        </div>
        <div style={{animation:"fadeUp .7s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:14,fontWeight:700,color:C.text}}>Горячие точки</span>
            <span onClick={()=>setTab("map")} style={{fontSize:12,color:C.accent,display:"flex",alignItems:"center",gap:2,cursor:"pointer"}}>
              На карте <ChevronRight size={13}/>
            </span>
          </div>
          {nearestSpots.map((s,i)=>{
            const distKm = userLat&&userLon ? Math.round(haversine(userLat,userLon,s.lat,s.lon)) : null;
            const scoreVal = distKm===null ? 8-i : distKm<5?10:distKm<15?9:distKm<40?8:7;
            return (
            <a key={i} href={`${ymapsLL(s.lat,s.lon)}`} target="_blank" rel="noreferrer" style={{textDecoration:"none"}}>
              <div style={{...glass(),padding:"12px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:10,background:C.accentDim,border:`1px solid ${C.borderHi}`,display:"flex",alignItems:"center",justifyContent:"center"}}><s.Icon size={16} color={C.accent}/></div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:C.text}}>{s.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>{s.fish}{distKm!==null?` · ${distKm} км`:""}</div>
                  </div>
                </div>
                <div style={{background:C.accentDim,border:`1px solid ${C.borderHi}`,borderRadius:8,padding:"4px 10px",fontSize:13,fontWeight:700,color:C.accent}}>{scoreVal}/10</div>
              </div>
            </a>
            );
          })}
          <div onClick={onGoChat} style={{...glass(`0 0 0 1px ${C.borderHi}`),background:"linear-gradient(135deg,rgba(46,204,113,.18),rgba(34,211,238,.10))",padding:"14px 18px",marginTop:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:38,height:38,borderRadius:11,background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 14px ${C.accentGlow}`}}><Fish size={19} color="#07111e"/></div>
              <div><div style={{fontSize:13,fontWeight:700,color:C.text}}>Спроси Егеря</div><div style={{fontSize:11,color:C.muted}}>ИИ-помощник рыбака</div></div>
            </div>
            <ChevronRight size={18} color={C.accent}/>
          </div>
        </div>
      </div>
    );
  }

  /* ── AI CHAT ── */
  function ChatScreen({ weather, userLat, userLon }) {
    const [msgs, setMsgs] = useState([{role:"assistant",type:"text",text:"Здорово, рыбак! Я — Егерь ИИ, знаю каждый омут Дона и Ростовской области.\n\nСпрашивай про клёв, снасти, места — пиши, присылай фото улова или места, запиши голосовой 🎣",time:fmtTime()}]);
    const [input, setInput] = useState("");
    const [typing, setTyping] = useState(false);
    const [voiceRec, setVoiceRec] = useState(false);
    const [voiceText, setVoiceText] = useState("");
    const bottomRef = useRef(null);
    const photoRef = useRef(null);
    const camRef = useRef(null);
    const srRef = useRef(null);
    const srTextRef = useRef("");
    const ctxRef = useRef({});

    useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,typing]);

    const aiReply = (text, delay=1400) => {
      setTyping(true);
      setTimeout(()=>{ setTyping(false); setMsgs(p=>[...p,{role:"assistant",type:"text",text,time:fmtTime()}]); }, delay+Math.random()*600);
    };

    const send = useCallback(()=>{
      const text=input.trim(); if(!text) return;
      setMsgs(p=>[...p,{role:"user",type:"text",text,time:fmtTime()}]);
      setInput("");
      const r = getBotReplyCtx(text, weather, ctxRef.current);
      ctxRef.current = r.ctx;
      aiReply(r.text);
    },[input,weather]);

    const sendPhoto = async (file) => {
      if(!file) return;
      const localUrl = URL.createObjectURL(file);
      setMsgs(p=>[...p,{role:"user",type:"image",imageUrl:localUrl,time:fmtTime()}]);
      aiReply(pick(PHOTO_REPLIES), 1800);
      try {
        const ref = storage.ref(`chat_photos/egер_${Date.now()}.jpg`);
        await ref.put(file,{contentType:file.type});
      } catch(e){}
    };

    const startVoice = () => {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        alert("Распознавание речи не поддерживается в вашем браузере. Используйте Chrome или Safari.");
        return;
      }
      const rec = new SR();
      rec.lang = "ru-RU";
      rec.continuous = false;
      rec.interimResults = true;
      rec.maxAlternatives = 1;
      srTextRef.current = "";

      rec.onstart = () => { setVoiceRec(true); setVoiceText(""); };

      rec.onresult = (e) => {
        let interim = "", final = "";
        for (const r of e.results) {
          if (r.isFinal) final += r[0].transcript;
          else interim += r[0].transcript;
        }
        if (final) srTextRef.current = final;
        setVoiceText(final || interim);
      };

      rec.onend = () => {
        setVoiceRec(false);
        const text = srTextRef.current.trim();
        srTextRef.current = "";
        setVoiceText("");
        if (text) {
          setMsgs(p=>[...p,{role:"user",type:"text",text,time:fmtTime(),voice:true}]);
          const r = getBotReplyCtx(text, weather, ctxRef.current);
          ctxRef.current = r.ctx;
          aiReply(r.text);
        }
      };

      rec.onerror = (e) => {
        setVoiceRec(false); setVoiceText(""); srTextRef.current = "";
        if (e.error !== "aborted" && e.error !== "no-speech") {
          alert("Ошибка распознавания: " + e.error);
        }
      };

      srRef.current = rec;
      rec.start();
    };

    const stopVoice = () => { srRef.current?.stop(); };
    const QUICK=["Скинь точку ловли","Прогноз клёва","Где белый амур?","Где щука?","На что ловить сазана?","Что ловится сейчас?"];

    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{padding:"10px 16px 6px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 12px ${C.accentGlow}`}}><Fish size={17} color="#07111e"/></div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:C.text}}>Егерь ИИ</div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:C.accent,animation:"pulseGlow 2s ease infinite"}}/>
              <span style={{fontSize:10,color:C.accent}}>онлайн · {weather?`вода +${weather.waterTemp}°C`:"Знает Дон"}</span>
            </div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"14px 14px 6px"}}>
          {msgs.map((m,i)=><Bubble key={i} msg={m}/>)}
          {typing&&<Typing/>}
          <div ref={bottomRef}/>
        </div>
        <div style={{display:"flex",gap:8,padding:"6px 14px",overflowX:"auto",scrollbarWidth:"none"}}>
          {QUICK.map(q=>(<button key={q} onClick={()=>setInput(q)} style={{flexShrink:0,padding:"6px 12px",borderRadius:20,border:`1px solid ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>{q}</button>))}
        </div>

        {/* Распознавание речи */}
        {voiceRec&&<div style={{padding:"10px 14px",background:`rgba(46,204,113,.08)`,borderTop:`1px solid rgba(46,204,113,.25)`,display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:12,height:12,borderRadius:"50%",background:C.accent,animation:"pulseGlow .6s ease infinite",flexShrink:0}}/>
          <span style={{flex:1,fontSize:13,color:voiceText?C.text:C.muted,fontStyle:voiceText?"normal":"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {voiceText||"Слушаю... говорите"}
          </span>
          <button onClick={stopVoice} style={{padding:"7px 16px",borderRadius:20,border:"none",background:`linear-gradient(135deg,#1a8a50,${C.accent})`,color:"#07111e",fontSize:13,fontWeight:800,cursor:"pointer",flexShrink:0}}>Готово</button>
        </div>}

        <div style={{padding:"8px 14px 14px",background:"rgba(7,17,30,.92)",backdropFilter:"blur(20px)",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,alignItems:"flex-end"}}>
          {/* Фото из галереи */}
          <button onClick={()=>photoRef.current?.click()} style={{width:40,height:40,borderRadius:"50%",border:"none",flexShrink:0,cursor:"pointer",background:C.surfaceHi,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <ImageIcon size={17} color={C.muted}/>
          </button>
          <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>sendPhoto(e.target.files[0])}/>
          {/* Камера */}
          <button onClick={()=>camRef.current?.click()} style={{width:40,height:40,borderRadius:"50%",border:"none",flexShrink:0,cursor:"pointer",background:C.surfaceHi,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Camera size={17} color={C.muted}/>
          </button>
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>sendPhoto(e.target.files[0])}/>

          <textarea rows={1} value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Спроси Егеря..." style={{flex:1,resize:"none",background:C.surfaceHi,border:`1px solid ${C.border}`,borderRadius:16,padding:"11px 14px",color:C.text,fontSize:14,outline:"none",lineHeight:1.4,boxSizing:"border-box"}}
            onFocus={e=>e.target.style.borderColor=C.borderHi} onBlur={e=>e.target.style.borderColor=C.border}/>

          {input.trim()
            ? <button onClick={send} style={{width:46,height:46,borderRadius:"50%",border:"none",flexShrink:0,background:`linear-gradient(135deg,#1a8a50,${C.accent})`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 16px ${C.accentGlow}`,transition:"all .25s"}}>
                <Send size={18} color="#07111e"/>
              </button>
            : <button onClick={voiceRec?stopVoice:startVoice} style={{width:46,height:46,borderRadius:"50%",border:"none",flexShrink:0,background:voiceRec?"#ef4444":C.surfaceHi,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .25s",animation:voiceRec?"pulseGlow .8s ease infinite":"none"}}>
                <Mic size={18} color={voiceRec?"#fff":C.muted}/>
              </button>
          }
        </div>
      </div>
    );
  }

  /* ── WEATHER ── */
  function WeatherScreen({ weather, weatherLoading, onRefresh }) {
    const DAYS_RU = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];

    const wIcon = (code) => {
      if(code===0) return "☀️";
      if(code===1) return "🌤️";
      if(code===2) return "⛅";
      if(code===3) return "☁️";
      if(code<=48) return "🌫️";
      if(code<=57) return "🌦️";
      if(code<=67) return "🌧️";
      if(code<=77) return "❄️";
      if(code<=82) return "🌦️";
      if(code<=86) return "🌨️";
      return "⛈️";
    };
    const wDesc = (code) => {
      if(code===0) return "Ясно";
      if(code===1) return "Малооблачно";
      if(code===2) return "Переменная облачность";
      if(code===3) return "Пасмурно";
      if(code<=48) return "Туман";
      if(code<=57) return "Морось";
      if(code<=67) return "Дождь";
      if(code<=77) return "Снег";
      if(code<=82) return "Ливень";
      if(code<=86) return "Снегопад";
      return "Гроза";
    };

      <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}}>
        <div style={{width:36,height:36,borderRadius:"50%",border:`3px solid ${C.accent}`,borderTopColor:"transparent",animation:"spin 1s linear infinite"}}/>

    if(!weather) return (

    );

    const month = new Date().getMonth();
    const biteScore = calcBiteScore(weather.pressure, month);
    const moon = moonPhase();
    const biteLabel = biteScore>=9?"🔥 Превосходный!":biteScore>=8?"✅ Отличный":biteScore>=7?"👍 Хороший":biteScore>=5?"⚠️ Средний":"❌ Слабый";
    const biteColor = biteScore>=8?"#2ecc71":biteScore>=6?"#f59e0b":"#ef4444";

    // Next 12 hours from now
    const nowHour = new Date().getHours();
    const hourly = weather.hourly;
    const hourlySlice = hourly ? Array.from({length:12},(_,i)=>{
      const idx = nowHour + i;
      if(idx >= hourly.time.length) return null;
      return {
        time: hourly.time[idx].slice(11,16),
        temp: Math.round(hourly.temperature_2m[idx]),
        precip: hourly.precipitation_probability[idx]||0,
        wind: Math.round(hourly.wind_speed_10m[idx]),
        code: hourly.weather_code[idx],
      };

    return (
      <div style={{height:"100%",overflowY:"auto",padding:"12px 14px 32px"}}>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
            {[
              {ico:"💨",val:`${weather.wind} м/с`,lbl:"Ветер"},
              {ico:"💧",val:`${weather.humidity}%`,lbl:"Влажность"},
              {ico:"⏱",val:`${weather.pressure} мм`,lbl:"Давление"},
            ].map(({ico,val,lbl})=>(
              <div key={lbl} style={{background:"rgba(255,255,255,.05)",borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
                <div style={{fontSize:20}}>{ico}</div>
                <div style={{fontSize:13,fontWeight:700,color:C.text,marginTop:2}}>{val}</div>
                <div style={{fontSize:10,color:C.muted}}>{lbl}</div>

          </div>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"6px 14px",borderRadius:20,background:"rgba(34,211,238,.1)",border:"1px solid rgba(34,211,238,.25)"}}>

            <span style={{fontSize:10,color:C.dimmer}}>· обновлено {weather.updated}</span>
          </div>
        </div>

        {/* ── Bite score ── */}

          <div style={{width:58,height:58,borderRadius:"50%",border:`3px solid ${biteColor}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 0 14px ${biteColor}55`}}>
            <div style={{fontSize:20,fontWeight:900,color:biteColor,lineHeight:1}}>{biteScore}</div>
            <div style={{fontSize:8,color:C.dimmer,letterSpacing:.5}}>ИЗ 10</div>

          <div>

            <div style={{fontSize:11,color:C.muted,marginTop:2}}>

               weather.pressure<750?"Низкое давление — хищник оживляется":"Давление в норме"}
            </div>

        {/* ── Hourly today ── */}
        {hourlySlice.length>0 && (
          <div style={{...glass(),marginBottom:10,padding:"12px 12px 8px 14px"}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Сегодня по часам</div>
            <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:6}}>

              const d = new Date(date+"T12:00:00");
              const maxT = Math.round(weather.daily.temperature_2m_max[i]);
              const minT = Math.round(weather.daily.temperature_2m_min[i]);
              const prec = weather.daily.precipitation_probability_max[i]||0;
              const code = weather.daily.weather_code[i];
              // Estimate bite quality from weather code (clear=good, rain=bad)
              const biteQ = code===0?"🟢":code<=3?"🟢":code<=48?"🟡":code<=82?"🔴":"🔴";
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<6?`1px solid ${C.border}`:"none"}}>
                  <div style={{width:34,fontSize:12,fontWeight:i<=1?700:400,color:i===0?C.accent:i===1?"#f59e0b":C.text,flexShrink:0}}>
                    {i===0?"Сег":i===1?"Завт":DAYS_RU[d.getDay()]}
                  </div>
                  <div style={{fontSize:22,flexShrink:0}}>{wIcon(code)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,color:C.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{wDesc(code)}</div>
                    {prec>20&&<div style={{fontSize:9,color:"#60a5fa"}}>💧{prec}%</div>}

                  <div style={{fontSize:10,marginRight:4}}>{biteQ}</div>
                  <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>{maxT>0?"+":""}{maxT}°</span>
                    <span style={{fontSize:11,color:C.muted}}>{minT>0?"+":""}{minT}°</span>
                  </div>
                </div>
              );
            })}
            <div style={{fontSize:10,color:C.dimmer,marginTop:8,textAlign:"center"}}>🟢 хороший клёв · 🟡 средний · 🔴 слабый</div>
          </div>
        )}
      </div>
    );
  }

      if(userLat && userLon)
        return [...SPOT_LIST].sort((a,b)=>haversine(userLat,userLon,a.lat,a.lon)-haversine(userLat,userLon,b.lat,b.lon));
      return SPOT_LIST;
    },[userLat,userLon]);

    const filtered = filter
      ? sorted.filter(s=>s.name.toLowerCase().includes(filter.toLowerCase())||s.fish.toLowerCase().includes(filter.toLowerCase()))
      : sorted;

    const sel = selIdx !== null ? SPOT_LIST[selIdx] : null;
    const centerLon = sel ? sel.lon : 39.95;
    const centerLat = sel ? sel.lat : 47.24;
    const zoom = sel ? 13 : 8;

    const pts = SPOT_LIST.map((s,i)=>
      `${s.lon},${s.lat},${i===selIdx?"pm2gnl1":"pm2rdl1"}`

  /* ── COMMUNITY ── */
  /* ── Circular video message player ── */
  function VideoNote({ url, isMe, col }) {
    const vRef = useRef(null);
    const [playing, setPlaying] = useState(false);
    const [progress, setProgress] = useState(0);
    const SIZE = 148;
    const toggle = () => {
      const v = vRef.current; if(!v) return;
      if(v.paused){ v.play(); setPlaying(true); } else { v.pause(); setPlaying(false); }
    };
    const onTime = () => {
      const v = vRef.current; if(!v||!v.duration) return;
      setProgress(v.currentTime/v.duration);
    };
    const onEnd = () => { setPlaying(false); setProgress(0); };
    const circ = 2*Math.PI*(SIZE/2-4);
    return (
      <div style={{position:"relative",width:SIZE,height:SIZE,cursor:"pointer"}} onClick={e=>{e.stopPropagation();toggle();}}>
        <svg style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}} width={SIZE} height={SIZE}>
          <circle cx={SIZE/2} cy={SIZE/2} r={SIZE/2-4} fill="none" stroke={isMe?C.blue:col} strokeWidth={3} strokeOpacity={.25}/>
          <circle cx={SIZE/2} cy={SIZE/2} r={SIZE/2-4} fill="none" stroke={isMe?C.blue:col} strokeWidth={3}
            strokeDasharray={circ} strokeDashoffset={circ*(1-progress)} style={{transition:"stroke-dashoffset .1s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:4,borderRadius:"50%",overflow:"hidden",background:"#000"}}>
          <video ref={vRef} src={url} playsInline style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}
            onTimeUpdate={onTime} onEnded={onEnd}/>
        </div>
        {!playing&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
          <div style={{width:38,height:38,borderRadius:"50%",background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <PlayIcon size={16} color="#fff" style={{marginLeft:3}}/>
          </div>
        </div>}
      </div>
    );
  }

        setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),50);
      });
      return unsub;
    },[]);

    // Загрузка/создание username
    useEffect(()=>{
      if(!user) return;
      const ref=db.collection("users").doc(user.uid);
      ref.get().then(doc=>{
        if(doc.exists && doc.data().username){ setUsername(doc.data().username); return; }
