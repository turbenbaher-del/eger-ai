  const NEWS_ITEMS=[
    {id:1,title:"Нерест завершён — рыбалка на Дону открыта",date:"12 мая 2026",source:"Азово-Черноморское управление Росрыболовства",text:"С 12 мая снят нерестовый запрет на большинстве водоёмов Ростовской области. Разрешена ловля всех видов рыб. Норма вылова 5 кг на человека в сутки.",tag:"Официально"},
    {id:2,title:"Уровень воды в Дону поднялся на 42 см выше нормы",date:"10 мая 2026",source:"Донское бассейновое водное управление",text:"Половодье продолжается. У Аксайской пристани уровень составил 342 см. Прогноз — начало спада через 5–7 дней. Белый амур и карась активно кормятся у берегов.",tag:"Гидрология"},
    {id:3,title:"Запрет на ловлю судака продлён до 20 мая",date:"5 мая 2026",source:"Рыбнадзор РО",text:"В Аксайском и Азовском районах запрет на ловлю судака продлён до 20 мая в связи с поздним нерестом. Штраф за нарушение — до 100 000 рублей.",tag:"Запрет"},
    {id:4,title:"На Цимлянском водохранилище отличный клёв леща",date:"8 мая 2026",source:"Рыболовный клуб «Дон»",text:"Рыбаки сообщают о хорошем клёве леща. Глубина 6–8 метров, прикормка с кориандром, крючок №6 с опарышем дают стабильный результат.",tag:"Клёв"},
    {id:5,title:"Итоги весеннего нереста в Ростовской области",date:"3 мая 2026",source:"Минприроды РО",text:"Нерест 2026 года прошёл успешно. Численность молоди сазана и леща выше прошлогоднего уровня на 15%. Браконьерство снизилось на треть.",tag:"Аналитика"},
    {id:6,title:"Открытие сезона спортивной рыбалки на Мёртвом Донце",date:"1 мая 2026",source:"ФРР Ростовской области",text:"15 мая состоятся официальные соревнования по ловле карпа на Мёртвом Донце. Регистрация команд до 13 мая.",tag:"Соревнования"},
  ];
  function NewsScreen({ user, onLogin, userLat, userLon }) {
    const nearestCity = useMemo(()=>{
      if(!userLat||!userLon) return null;
      const cities = [
        {name:"Аксай",     lat:47.2681, lon:39.8699, kw:["аксай","аксайск"]},
        {name:"Батайск",   lat:47.1456, lon:39.7456, kw:["батайск"]},
        {name:"Азов",      lat:47.1023, lon:39.4123, kw:["азов","азовск"]},
        {name:"Таганрог",  lat:47.2090, lon:38.9360, kw:["таганрог"]},
        {name:"Новочеркасск", lat:47.4181, lon:40.0956, kw:["новочеркасск"]},
        {name:"Ростов-на-Дону", lat:47.2357, lon:39.7015, kw:["ростов"]},
      ];
      return cities.sort((a,b)=>haversine(userLat,userLon,a.lat,a.lon)-haversine(userLat,userLon,b.lat,b.lon))[0];
    },[userLat,userLon]);
    const [tab,setTab]=useState("news");
    const [newsItems,setNewsItems]=useState([]);
    const [newsLoading,setNewsLoading]=useState(true);
    const [newIds,setNewIds]=useState(new Set());
    const [lastUpdated,setLastUpdated]=useState(null);
    const [newCount,setNewCount]=useState(0);
    const seenIdsRef=useRef(new Set());
    const firstSnapRef=useRef(true);
    const [notifEnabled,setNotifEnabled]=useState(()=>!!localStorage.getItem('fcm_token'));

    const requestNotif=async()=>{
      if(!("serviceWorker" in navigator)) return;
      try{
        const reg=await navigator.serviceWorker.register('/eger-ai/firebase-messaging-sw.js');
        const token=await messaging.getToken({vapidKey:VAPID_KEY,serviceWorkerRegistration:reg});
        if(token){
          await db.collection("fcm_tokens").doc(token).set({
            createdAt:firebase.firestore.FieldValue.serverTimestamp(),
            ua:navigator.userAgent.slice(0,100)
          });
          localStorage.setItem('fcm_token',token);
          setNotifEnabled(true);
        }
      }catch(e){ console.log("FCM error:",e); }
    };

    useEffect(()=>{
      if(!notifEnabled) return;
      return messaging.onMessage(payload=>{
        setNewCount(n=>n+1);
      });
    },[notifEnabled]);
    const [reports,setReports]=useState([]);
    const [reportsErr,setReportsErr]=useState(false);
    const [showForm,setShowForm]=useState(false);
    const [editTarget,setEditTarget]=useState(null);
    const [form,setForm]=useState({title:"",body:"",location:"",fish:""});
    const [photoFile,setPhotoFile]=useState(null);
    const [photoPreview,setPhotoPreview]=useState(null);
    const [posting,setPosting]=useState(false);
    const [uploadPct,setUploadPct]=useState(null);

    // Реальное время: Firestore onSnapshot (бот пишет, сайт читает)
    useEffect(()=>{
      const unsub=db.collection("news").orderBy("timestamp","desc").limit(20)
        .onSnapshot(snap=>{
          setNewsLoading(false);
          if(snap.empty){ setNewsItems(NEWS_ITEMS); return; }
          const items=snap.docs.map(d=>({id:d.id,...d.data(),
            date:d.data().timestamp?.toDate?.().toLocaleDateString("ru-RU",{day:"numeric",month:"long"})||""}));
          if(firstSnapRef.current){
            firstSnapRef.current=false;
            items.forEach(it=>seenIdsRef.current.add(it.id));
            setNewsItems(items);
          } else {
            const fresh=items.filter(it=>!seenIdsRef.current.has(it.id));
            if(fresh.length>0){
              fresh.forEach(it=>seenIdsRef.current.add(it.id));
              setNewIds(prev=>new Set([...prev,...fresh.map(it=>it.id)]));
              setNewCount(n=>n+fresh.length);
            }
            setNewsItems(items);
          }
          setLastUpdated(new Date());
        }, err=>{ console.log("news snapshot err",err); setNewsLoading(false); setNewsItems(NEWS_ITEMS); });
      return unsub;
    },[]);

    useEffect(()=>{
      const unsub=db.collection("reports").orderBy("timestamp","desc").limit(50)
        .onSnapshot(s=>{setReports(s.docs.map(d=>({id:d.id,...d.data()}))); setReportsErr(false);},
          err=>{console.error("Reports:",err); setReportsErr(true);});
      return unsub;
    },[]);

    const openCreate=()=>{ if(!user){onLogin();return;} setEditTarget(null); setForm({title:"",body:"",location:"",fish:""}); setPhotoFile(null); setPhotoPreview(null); setShowForm(true); };
    const openEdit=r=>{ setEditTarget(r); setForm({title:r.title||"",body:r.body||"",location:r.location||"",fish:r.fish||""}); setPhotoPreview(r.photo_url||null); setPhotoFile(null); setShowForm(true); };

    const onFileChange=e=>{ const f=e.target.files[0]; if(!f)return; setPhotoFile(f); const rd=new FileReader(); rd.onload=ev=>setPhotoPreview(ev.target.result); rd.readAsDataURL(f); };

    const uploadPhoto=async uid=>{
      if(!photoFile) return null;
      const ref=storage.ref(`reports/${uid}_${Date.now()}.jpg`);
      const task=ref.put(photoFile);
      await new Promise((res,rej)=>task.on("state_changed",snap=>setUploadPct(Math.round(snap.bytesTransferred/snap.totalBytes*100)),rej,res));
      setUploadPct(null);
      return await ref.getDownloadURL();
    };

    const submitReport=async()=>{
      if(!form.title||!form.body||!user) return;
      setPosting(true);
      try {
        let photo_url=editTarget?.photo_url||null;
        if(photoFile) photo_url=await uploadPhoto(user.uid);
        const data={...form,uid:user.uid,displayName:user.displayName||"Рыбак",timestamp:firebase.firestore.FieldValue.serverTimestamp(),...(photo_url?{photo_url}:{})};
        if(editTarget) await db.collection("reports").doc(editTarget.id).update(data);
        else await db.collection("reports").add(data);
        setShowForm(false); setForm({title:"",body:"",location:"",fish:""}); setPhotoFile(null); setPhotoPreview(null); setEditTarget(null);
      } catch(e){ alert("Ошибка: "+e.message); }
      setPosting(false);
    };

    const deleteReport=async id=>{ if(!window.confirm("Удалить отчёт?")) return; await db.collection("reports").doc(id).delete(); };

    const tagColor=t=>({Официально:"#2ecc71",Гидрология:C.cyan,Запрет:"#ef4444",Клёв:C.gold,Аналитика:C.blue,Соревнования:"#a78bfa"}[t]||C.muted);
    const srcLabel=s=>s==="telegram"?"📱 Telegram":s==="telegram_chat"?"💬 Из чата":null;

    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{padding:"10px 16px 0",borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex"}}>
            {["news","reports"].map(t=>(<button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"10px 0",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:tab===t?C.accent:C.muted,borderBottom:tab===t?`2px solid ${C.accent}`:"2px solid transparent",transition:"all .2s"}}>{t==="news"?"Новости":"Отчёты рыбаков"}</button>))}
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>
          {tab==="news"&&<div>
            {/* Live-шапка */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",animation:"pulseGlow .8s ease infinite"}}/>
                <span style={{fontSize:11,color:C.text,fontWeight:700}}>В эфире</span>
                {lastUpdated&&<span style={{fontSize:10,color:C.dimmer}}>· {lastUpdated.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"})}</span>}
                {newCount>0&&<span style={{fontSize:10,fontWeight:800,color:"#fff",background:"#ef4444",borderRadius:10,padding:"1px 7px",cursor:"pointer"}} onClick={()=>setNewCount(0)}>+{newCount} новых</span>}
                {nearestCity&&<span style={{fontSize:10,color:C.accent,background:C.accentDim,borderRadius:8,padding:"1px 7px",border:`1px solid ${C.borderHi}`}}>📍 {nearestCity.name}</span>}
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {"serviceWorker" in navigator&&(
                  <button onClick={notifEnabled?undefined:requestNotif} title={notifEnabled?"Уведомления включены":"Включить push-уведомления"}
                    style={{background:notifEnabled?`rgba(46,204,113,.15)`:"none",border:`1px solid ${notifEnabled?C.accent:C.border}`,borderRadius:10,padding:"4px 8px",color:notifEnabled?C.accent:C.muted,fontSize:11,cursor:notifEnabled?"default":"pointer",display:"flex",alignItems:"center",gap:4,transition:"all .2s"}}>
                    {notifEnabled?<BellIcon size={11} color={C.accent}/>:<BellOffIcon size={11} color={C.muted}/>}
                    {notifEnabled?"Push вкл":"Уведомления"}
                  </button>
                )}
                <div style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:10,border:`1px solid ${C.border}`,color:C.dimmer,fontSize:11}}>
                  <RefreshCw size={11} color={newsLoading?C.accent:C.dimmer} style={newsLoading?{animation:"spin 1s linear infinite"}:undefined}/>
                  {newsLoading?"Загрузка...":"Авто"}
                </div>
              </div>
            </div>
            {newsLoading&&newsItems.length===0&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 0",gap:12}}>
              <div style={{width:32,height:32,borderRadius:"50%",border:`3px solid ${C.accent}`,borderTopColor:"transparent",animation:"spin 1s linear infinite"}}/>
              <div style={{fontSize:12,color:C.muted}}>Загружаем новости...</div>
            </div>}
            {[...newsItems].sort((a,b)=>{
              if(!nearestCity) return 0;
              const kws=nearestCity.kw;
              const match=n=>{const t=(n.title||"").toLowerCase()+(n.text||"").toLowerCase(); return kws.some(k=>t.includes(k));};
              return match(b)-match(a);
            }).map(n=>{
              const isNew=newIds.has(n.id);
              const isLocal=nearestCity&&nearestCity.kw.some(k=>((n.title||"").toLowerCase()+(n.text||"").toLowerCase()).includes(k));
              return(
                <div key={n.id} style={{...glass(),padding:"14px",marginBottom:10,animation:isNew?"newsSlideIn .5s cubic-bezier(.22,.61,.36,1), glowFlash 1.4s ease .35s":"fadeUp .3s ease",border:isNew?`1px solid rgba(239,68,68,.4)`:isLocal?`1px solid ${C.borderHi}`:`1px solid ${C.border}`,position:"relative",overflow:"hidden"}}>
                  {isNew&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,#ef4444,#f59e0b)",animation:"pulseGlow 2s ease 3"}}/>}
                  {isLocal&&!isNew&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${C.accent},${C.cyan})`}}/>}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:10,fontWeight:700,color:tagColor(n.tag),background:`${tagColor(n.tag)}20`,borderRadius:6,padding:"3px 8px"}}>{n.tag}</span>
                      {isNew&&<span style={{fontSize:9,fontWeight:800,color:"#ef4444",background:"rgba(239,68,68,.15)",borderRadius:6,padding:"2px 6px"}}>НОВОЕ</span>}
                      {isLocal&&!isNew&&<span style={{fontSize:9,fontWeight:800,color:C.accent,background:C.accentDim,borderRadius:6,padding:"2px 6px"}}>📍 рядом</span>}
                    </div>
                    <span style={{fontSize:10,color:C.dimmer}}>{n.date}</span>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:C.text,lineHeight:1.4,marginBottom:6}}>{n.title}</div>
                  <div style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:8}}>{n.text}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:10,color:C.dimmer}}>Источник: {n.source}</span>
                    {n.link&&<a href={n.link} target="_blank" rel="noreferrer" style={{fontSize:10,color:C.accent,fontWeight:700,textDecoration:"none"}}>Читать →</a>}
                  </div>
                </div>
              );
            })}
          </div>}
          {tab==="reports"&&<div>
            <button onClick={openCreate} style={{width:"100%",padding:"13px",borderRadius:14,border:`1px dashed ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <Plus size={16} color={C.accent}/> Добавить отчёт о рыбалке
            </button>
            {reportsErr&&<div style={{padding:"12px 14px",borderRadius:12,background:"rgba(239,68,68,.1)",border:"1px solid #ef444444",color:"#ef4444",fontSize:12,marginBottom:12}}>⚠️ Ошибка загрузки отчётов. Нужно обновить правила Firestore — разреши read для коллекции reports.</div>}
            {reports.length===0&&!reportsErr&&<div style={{textAlign:"center",padding:40,color:C.dimmer}}><Fish size={40} color={C.dimmer} style={{margin:"0 auto 12px",display:"block"}}/><div style={{fontSize:14}}>Отчётов пока нет — будь первым!</div></div>}
            {reports.map(r=>{
              const isOwn=user&&r.uid===user.uid;
              const sl=srcLabel(r.source);
              return (<div key={r.id} style={{...glass(),padding:"14px",marginBottom:10,animation:"fadeUp .3s ease"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#07111e",flexShrink:0}}>{(r.displayName||"Р")[0].toUpperCase()}</div>
                    <div><div style={{fontSize:12,fontWeight:700,color:C.accent}}>{r.displayName}</div>{sl&&<div style={{fontSize:10,color:C.muted}}>{sl}</div>}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10,color:C.dimmer}}>{r.timestamp?fmtDate(r.timestamp):""}</span>
                    {isOwn&&<button onClick={()=>openEdit(r)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"3px 7px",color:C.accent,fontSize:11,cursor:"pointer",lineHeight:1}}>✏️</button>}
                    {isOwn&&<button onClick={()=>deleteReport(r.id)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"3px 7px",color:"#ef4444",fontSize:11,cursor:"pointer",lineHeight:1}}>🗑</button>}
                  </div>
                </div>
                {r.photo_url&&<img src={r.photo_url} alt="улов" onClick={()=>window.open(r.photo_url,"_blank")} style={{width:"100%",maxHeight:200,objectFit:"cover",borderRadius:10,marginBottom:10,cursor:"pointer",display:"block"}}/>}
                <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:6}}>{r.title}</div>
                {r.location&&<div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4}}><MapPin size={11} color={C.muted}/><span style={{fontSize:11,color:C.muted}}>{r.location}</span></div>}
                {r.fish&&<div style={{display:"flex",alignItems:"center",gap:4,marginBottom:6}}><Fish size={11} color={C.gold}/><span style={{fontSize:11,color:C.gold}}>{r.fish}</span></div>}
                <div style={{fontSize:13,color:"rgba(232,244,240,.8)",lineHeight:1.6}}>{r.body}</div>
              </div>);
            })}
          </div>}
        </div>

        {showForm&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:100,display:"flex",alignItems:"flex-end",animation:"fadeIn .2s ease"}} onClick={e=>{if(e.target===e.currentTarget)setShowForm(false);}}>
          <div style={{...glass(),width:"100%",maxWidth:430,margin:"0 auto",borderRadius:"20px 20px 0 0",padding:20,maxHeight:"90dvh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <span style={{fontSize:16,fontWeight:800,color:C.text}}>{editTarget?"Редактировать":"Новый отчёт"}</span>
              <button onClick={()=>setShowForm(false)} style={{background:"none",border:"none",cursor:"pointer"}}><XIcon size={22} color={C.muted}/></button>
            </div>
            {[{key:"title",ph:"Заголовок (обязательно)"},{key:"location",ph:"Место рыбалки"},{key:"fish",ph:"Что поймал (вид, вес, штук)"}].map(({key,ph})=>(
              <input key={key} value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} placeholder={ph}
                style={{width:"100%",padding:"12px 14px",borderRadius:12,marginBottom:10,background:C.surfaceHi,border:`1px solid ${C.border}`,color:C.text,fontSize:14,outline:"none"}}
                onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
            ))}
            <textarea rows={4} value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))} placeholder="Расскажи подробнее: снасти, насадка, время клёва..."
              style={{width:"100%",resize:"none",padding:"12px 14px",borderRadius:12,marginBottom:10,background:C.surfaceHi,border:`1px solid ${C.border}`,color:C.text,fontSize:14,outline:"none",lineHeight:1.5}}
              onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
            <div style={{marginBottom:14}}>
              {photoPreview&&<img src={photoPreview} alt="preview" style={{width:"100%",maxHeight:160,objectFit:"cover",borderRadius:10,marginBottom:8,display:"block"}}/>}
              <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"11px",borderRadius:12,border:`1px dashed ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:13,fontWeight:700,cursor:"pointer"}}>
                <Camera size={16} color={C.accent}/>{photoPreview?"Сменить фото":"Добавить фото улова"}
                <input type="file" accept="image/*" onChange={onFileChange} style={{display:"none"}}/>
              </label>
              {uploadPct!==null&&<div style={{marginTop:6,height:4,borderRadius:4,background:C.surface}}><div style={{height:4,borderRadius:4,background:C.accent,width:`${uploadPct}%`,transition:"width .2s"}}/></div>}
            </div>
            <button onClick={submitReport} disabled={!form.title||!form.body||posting}
              style={{width:"100%",padding:"14px",borderRadius:14,border:"none",cursor:"pointer",
                background:form.title&&form.body?`linear-gradient(135deg,#1a8a50,${C.accent})`:C.surface,
                color:form.title&&form.body?"#07111e":C.muted,fontSize:15,fontWeight:800}}>
              {posting?(uploadPct!==null?`Фото ${uploadPct}%...`:"Публикуем..."):editTarget?"Сохранить":"Опубликовать"}
            </button>
          </div>
        </div>}
      </div>
    );
  }

  /* ── PROFILE ── */
  function ProfileScreen({ user, onLogin, onNav }) {
    if (!user) return <RequireAuth user={user} onLogin={onLogin}><div/></RequireAuth>;
    const [profileUsername, setProfileUsername] = useState("");
    const [catchStats, setCatchStats] = useState(null);
    const [badges, setBadges] = useState([]);
    const [statsLoading, setStatsLoading] = useState(true);

    useEffect(()=>{
      db.collection("users").doc(user.uid).get().then(doc=>{
        if(doc.exists && doc.data().username) setProfileUsername(doc.data().username);
        else setProfileUsername(genUsername(user.displayName||"рыбак"));
      });
    },[user]);

    useEffect(()=>{
      setStatsLoading(true);
      db.collection("catches").doc(user.uid).collection("records")
        .orderBy("createdAt","desc").limit(200).get()
        .then(snap=>{
          const recs = snap.docs.map(d=>d.data());
          const total = recs.length;
          const totalW = recs.reduce((s,r)=>s+(r.weightGrams||0),0);
          const best = recs.reduce((b,r)=>(!b||r.weightGrams>b.weightGrams?r:b),null);
          const gc={};
          recs.forEach(r=>{ if(r.gearType) gc[r.gearType]=(gc[r.gearType]||0)+1; });
          const favGear = Object.entries(gc).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
          const uniqueDays = new Set(recs.map(r=>r.createdAt?.toDate?.()?.toDateString()).filter(Boolean)).size;
          // Monthly activity (last 12 months)
          const now2=new Date();
          const monthly=Array.from({length:12},(_,i)=>{
            const d=new Date(now2.getFullYear(),now2.getMonth()-11+i,1);
            return {month:d.toLocaleString("ru-RU",{month:"short"}),year:d.getFullYear(),m:d.getMonth(),y:d.getFullYear(),count:0};
          });
          recs.forEach(r=>{const d=r.createdAt?.toDate?.(); if(!d) return; const slot=monthly.find(s=>s.m===d.getMonth()&&s.y===d.getFullYear()); if(slot) slot.count++;});
          // Top-3 locations
          const lc={};
          recs.forEach(r=>{ if(r.locationName) lc[r.locationName]=(lc[r.locationName]||0)+1; });
          const top3locs=Object.entries(lc).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([n,c])=>({name:n,count:c}));
          setCatchStats({total,totalW,best,favGear,uniqueDays,monthly,top3locs});
          setStatsLoading(false);
        }).catch(()=>setStatsLoading(false));
      db.collection("users").doc(user.uid).collection("badges").get()
        .then(snap=>setBadges(snap.docs.map(d=>d.id))).catch(()=>{});
    },[user.uid]);

    const statItems = statsLoading
      ? [{label:"Уловов",val:"…"},{label:"Кг всего",val:"…"},{label:"Рекорд кг",val:"…"}]
      : [
          {label:"Уловов",val:catchStats?.total||0},
          {label:"Кг всего",val:catchStats?.totalW?(catchStats.totalW/1000).toFixed(1):"0"},
          {label:"Рекорд кг",val:catchStats?.best?(catchStats.best.weightGrams/1000).toFixed(1):"—"},
        ];

    const menu=[
      {Icon:Trophy,label:"Рейтинг рыбаков",nav:"leaderboard"},
      {Icon:Star,label:"Турниры",nav:"tournament"},
      {Icon:AlertCircle,label:"Telegram-бот @egerai_bot",href:"https://t.me/egerai_bot"},
      {Icon:Gauge,label:"Настройки",href:"#"},
    ];

    return (
      <div style={{padding:"16px 14px",overflowY:"auto",height:"100%"}}>
        <div style={{...glass(`0 0 0 1px ${C.borderHi}`),background:"linear-gradient(135deg,rgba(46,204,113,.12),rgba(59,130,246,.08))",padding:24,textAlign:"center",marginBottom:14}}>
          <div style={{width:72,height:72,borderRadius:"50%",margin:"0 auto 12px",background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 24px ${C.accentGlow}`,fontSize:28,fontWeight:800,color:"#07111e"}}>{(user.displayName||"Р")[0].toUpperCase()}</div>
          <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:2}}>{user.displayName||"Рыбак"}</div>
          {profileUsername&&<div style={{fontSize:13,color:C.accent,fontWeight:700,marginBottom:2}}>@{profileUsername}</div>}
          <div style={{fontSize:12,color:C.muted,marginBottom:4}}>{user.email}</div>
          <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:10}}>{[1,2,3,4,5].map(i=><Star key={i} size={14} color={C.gold} fill={C.gold}/>)}</div>
        </div>

        <div style={{display:"flex",gap:10,marginBottom:14}}>
          {statItems.map(s=>(<div key={s.label} style={{...glass(),flex:1,padding:"14px 8px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800,color:C.accent,filter:`drop-shadow(0 0 8px ${C.accent})`}}>{s.val}</div>
            <div style={{fontSize:10,color:C.dimmer,marginTop:2}}>{s.label}</div>
          </div>))}
        </div>

        {catchStats?.favGear&&<div style={{...glass(),padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}><Fish size={15} color={C.accent}/><span style={{fontSize:13,color:C.text}}>Любимая снасть: <strong style={{color:C.accent}}>{catchStats.favGear}</strong></span></div>}
        {catchStats?.best&&<div style={{...glass(),padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}><Trophy size={15} color={C.gold}/><span style={{fontSize:13,color:C.text}}>Рекорд: <strong style={{color:C.gold}}>{catchStats.best.fishName||catchStats.best.fishType||"Рыба"} · {(catchStats.best.weightGrams/1000).toFixed(1)} кг</strong></span></div>}

        {badges.length>0&&(
          <div style={{...glass(),padding:"12px 14px",marginBottom:14}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:8,fontWeight:700,letterSpacing:.5}}>МОИ ЗНАЧКИ</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {badges.map(id=>{
                const bd=BADGE_DEFS.find(b=>b.id===id);
                return bd?(<div key={id} title={bd.desc} style={{padding:"5px 10px",background:C.accentDim,border:`1px solid ${C.borderHi}`,borderRadius:12,display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:14}}>{bd.emoji}</span>
                  <span style={{fontSize:11,color:C.accent,fontWeight:700}}>{bd.name}</span>
                </div>):null;
              })}
            </div>
          </div>
        )}

        {/* Monthly activity chart */}
        {catchStats?.monthly&&catchStats.monthly.some(m=>m.count>0)&&(
          <div style={{...glass(),padding:"12px 14px",marginBottom:14}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:10,fontWeight:700,letterSpacing:.5}}>АКТИВНОСТЬ ПО МЕСЯЦАМ</div>
            {(()=>{const mx=Math.max(...catchStats.monthly.map(m=>m.count),1); return(
              <div style={{display:"flex",gap:3,alignItems:"flex-end",height:60}}>
                {catchStats.monthly.map((m,i)=>(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <div style={{width:"100%",borderRadius:"3px 3px 0 0",background:m.count>0?`linear-gradient(0deg,#1a8a50,${C.accent})`:"rgba(255,255,255,.06)",height:Math.max(3,Math.round(m.count/mx*48))}}/>
                    <div style={{fontSize:8,color:C.dimmer,whiteSpace:"nowrap"}}>{m.month}</div>
                  </div>
                ))}
              </div>
            );})()}
          </div>
        )}
        {/* Top-3 locations */}
        {catchStats?.top3locs?.length>0&&(
          <div style={{...glass(),padding:"12px 14px",marginBottom:14}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:8,fontWeight:700,letterSpacing:.5}}>ТОП МЕСТА ЛОВЛИ</div>
            {catchStats.top3locs.map((l,i)=>(
              <div key={l.name} style={{display:"flex",alignItems:"center",gap:10,marginBottom:i<catchStats.top3locs.length-1?8:0}}>
                <span style={{fontSize:14}}>{["🥇","🥈","🥉"][i]}</span>
                <span style={{flex:1,fontSize:13,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.name}</span>
                <span style={{fontSize:12,color:C.muted}}>{l.count} раз</span>
              </div>
            ))}
          </div>
        )}
        {menu.map(({Icon,label,href,nav})=>(
          nav ? (
            <button key={label} onClick={()=>onNav&&onNav(nav)} style={{width:"100%",background:"none",border:"none",padding:0,textAlign:"left",cursor:"pointer",marginBottom:8}}>
              <div style={{...glass(),padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
                <Icon size={18} color={C.accent}/><span style={{fontSize:14,color:C.text,flex:1}}>{label}</span><ChevronRight size={15} color={C.dimmer}/>
              </div>
            </button>
          ) : (
            <a key={label} href={href} target={href.startsWith("http")?"_blank":"_self"} rel="noreferrer" style={{textDecoration:"none"}}>
              <div style={{...glass(),padding:"14px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                <Icon size={18} color={C.accent}/><span style={{fontSize:14,color:C.text,flex:1}}>{label}</span><ChevronRight size={15} color={C.dimmer}/>
              </div>
            </a>
          )
        ))}
        <button onClick={()=>auth.signOut()} style={{width:"100%",marginTop:8,padding:"14px 16px",borderRadius:20,border:"1px solid rgba(239,68,68,.3)",background:"rgba(239,68,68,.1)",display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer"}}>
          <LogOut size={18} color="#f87171"/><span style={{fontSize:14,color:"#f87171",fontWeight:700}}>Выйти из аккаунта</span>
        </button>
      </div>
    );
  }

  /* ── WATER BODIES ── */
  const WATER_BODIES = [
    {name:"Дон",              lat:47.2108, lon:39.7043, station:"don-rostov-na-donu"},

  function getNearestSpotName(lat, lon) {
    if (!lat || !lon) return "Место не определено";
    let nearest = null, minD = Infinity;
    SPOT_LIST.forEach(s=>{ const d=Math.hypot(s.lat-lat,s.lon-lon); if(d<minD){minD=d;nearest=s;} });
    if (nearest && minD < 0.3) return nearest.name;
    return `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  }

  async function checkAndAwardBadges(userId, allRecords) {
    if (!userId || !allRecords.length) return;
    try {
      const total = allRecords.length;
      const withPhoto = allRecords.filter(r=>r.photoUrls&&r.photoUrls.length>0).length;
      const maxW = Math.max(...allRecords.map(r=>r.weightGrams||0),0);
      const fishSet = new Set(allRecords.map(r=>r.fishType).filter(Boolean));
      const pubCount = allRecords.filter(r=>r.isPublic).length;
      const locSet = new Set(allRecords.map(r=>r.locationName).filter(Boolean));
      const earlyBird = allRecords.filter(r=>{ const d=r.createdAt?.toDate?.(); return d&&d.getHours()<6; }).length;
      const ago30 = Date.now()-30*24*60*60*1000;
      const recentDays = new Set(allRecords.filter(r=>r.createdAt?.toDate?.()&&r.createdAt.toDate().getTime()>ago30).map(r=>r.createdAt.toDate().toDateString())).size;
      const checks=[
        {id:"first_catch",   met:total>=1},
        {id:"photographer",  met:withPhoto>=10},
        {id:"trophy_5kg",    met:maxW>=5000},
        {id:"whale_15kg",    met:maxW>=15000},
        {id:"weekly_angler", met:recentDays>=7},
        {id:"early_bird",    met:earlyBird>=3},
        {id:"traveler",      met:locSet.size>=5},
        {id:"diversity_10",  met:fishSet.size>=10},
        {id:"reporter",      met:pubCount>=10},
      ];
      const existing = await db.collection("users").doc(userId).collection("badges").get();
      const existingIds = new Set(existing.docs.map(d=>d.id));
      for (const {id,met} of checks) {
        if (met && !existingIds.has(id)) {
          await db.collection("users").doc(userId).collection("badges").doc(id).set({badgeId:id,unlockedAt:firebase.firestore.FieldValue.serverTimestamp()});
          const bd = BADGE_DEFS.find(b=>b.id===id);
          logEvent("badge_unlocked",{badge_id:id});
          if (bd && "Notification" in window && Notification.permission==="granted") {
            new Notification(`${bd.emoji} Новый значок: ${bd.name}`,{body:bd.desc,icon:"https://turbenbaher-del.github.io/eger-ai/fish-icon.png"});
          }
        }
      }
    } catch(e){ console.log("badges err",e); }
  }

  /* ── Share Card ── */
  async function generateShareCard(record) {
    const fish = FISH_TYPES.find(f=>f.id===record.fishType);
    const fishName = fish?.name||record.fishName||"Рыба";
    const weightStr = record.weightGrams?`${(record.weightGrams/1000).toFixed(1)} кг`:"";
    const loc = record.locationName||"Место не указано";
    const dateStr = (()=>{
      const d = record.createdAt?.toDate?record.createdAt.toDate():new Date();
      return d.toLocaleDateString("ru-RU",{day:"2-digit",month:"long",year:"numeric"});
    })();
    const canvas = document.createElement("canvas");
    canvas.width=1080; canvas.height=1080;
    const ctx = canvas.getContext("2d");
    const bg = ctx.createLinearGradient(0,0,1080,1080);
    bg.addColorStop(0,"#07111e"); bg.addColorStop(1,"#0a192f");
    ctx.fillStyle=bg; ctx.fillRect(0,0,1080,1080);
    const glow = ctx.createRadialGradient(200,200,0,200,200,500);
    glow.addColorStop(0,"rgba(46,204,113,0.18)"); glow.addColorStop(1,"transparent");
    ctx.fillStyle=glow; ctx.fillRect(0,0,1080,1080);
    if (record.photoUrls?.[0]) {
      try {
        const img = await new Promise((res,rej)=>{
          const i=new Image(); i.crossOrigin="anonymous";
          i.onload=()=>res(i); i.onerror=rej; i.src=record.photoUrls[0];
        });
        const scale = Math.max(1080/img.width, 1080/img.height);
        const dw=img.width*scale, dh=img.height*scale;
        ctx.drawImage(img,(1080-dw)/2,(1080-dh)/2,dw,dh);
        const ov=ctx.createLinearGradient(0,0,0,1080);
        ov.addColorStop(0,"rgba(7,17,30,0.3)"); ov.addColorStop(0.5,"rgba(7,17,30,0.05)");
        ov.addColorStop(1,"rgba(7,17,30,0.94)");
        ctx.fillStyle=ov; ctx.fillRect(0,0,1080,1080);
      } catch(e){}
    }
    // logo chip
    ctx.fillStyle="rgba(7,17,30,0.8)";
    ctx.beginPath(); ctx.roundRect(40,40,280,56,12); ctx.fill();
    ctx.fillStyle="#2ecc71"; ctx.font="bold 28px sans-serif";
    ctx.fillText("ЕГЕРЬ ИИ", 64, 78);
    ctx.fillStyle="rgba(255,255,255,0.45)"; ctx.font="22px sans-serif";
    ctx.fillText("eger-ai.app", 64, 104);
    // bottom card
    ctx.fillStyle="rgba(7,17,30,0.86)";
    ctx.beginPath(); ctx.roundRect(40,800,1000,240,20); ctx.fill();
    ctx.strokeStyle="rgba(46,204,113,0.35)"; ctx.lineWidth=1.5; ctx.stroke();
    // fish + weight
    ctx.fillStyle="#ffffff"; ctx.font="bold 68px sans-serif";
    ctx.fillText(fishName,70,890);
    if(weightStr){
      ctx.fillStyle="#2ecc71"; ctx.font="bold 76px sans-serif";
      const nm=ctx.measureText(fishName);
      ctx.fillText(weightStr,76+nm.width,890);
    }
    ctx.fillStyle="rgba(255,255,255,0.55)"; ctx.font="30px sans-serif";
    ctx.fillText("📍 "+loc.slice(0,46)+(loc.length>46?"…":""),70,945);
    ctx.fillStyle="rgba(34,211,238,0.85)"; ctx.font="26px sans-serif";
    ctx.fillText(dateStr,70,990);
    return canvas.toDataURL("image/jpeg",0.92);
  }

  async function doShareCard(record) {
    let dataUrl;
    try { dataUrl = await generateShareCard(record); } catch(e){ console.error("share card err",e); return; }
    const fish = FISH_TYPES.find(f=>f.id===record.fishType);
    const title = `${fish?.name||"Рыба"} ${record.weightGrams?(record.weightGrams/1000).toFixed(1)+" кг":""} — Егерь ИИ`;
    if (navigator.canShare) {
      try {
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob],"catch.jpg",{type:"image/jpeg"});
        if (navigator.canShare({files:[file]})) {
          await navigator.share({files:[file],title,text:"Мой улов: "+title});
          logEvent("catch_shared",{method:"web_share"}); return;
        }
      } catch(e){ if(e.name==="AbortError") return; }
    }
    const a=document.createElement("a"); a.href=dataUrl; a.download="catch-eger.jpg"; a.click();
    logEvent("catch_shared",{method:"download"});
  }

    const fish = FISH_TYPES.find(f=>f.id===record.fishType);
    const date = record.createdAt?.toDate?record.createdAt.toDate():new Date(parseInt(record.id)||Date.now());
    const [deleting, setDeleting] = useState(false);
    const [published, setPublished] = useState(record.isPublic||false);
    const [photoIdx, setPhotoIdx] = useState(0);
    const photos = record.photoUrls||[];

    const handleDelete = async () => {
      if (!window.confirm("Удалить этот улов?")) return;
      setDeleting(true);
      try { await db.collection("catches").doc(user.uid).collection("records").doc(record.id).delete(); onBack(); }
      catch(e){ setDeleting(false); }
    };

    const handlePublish = async () => {
      try {
        await db.collection("catches").doc(user.uid).collection("records").doc(record.id).update({isPublic:true});
        await db.collection("reports").doc(record.id).set({
          id:record.id, userId:record.userId, author:record.userName||user.displayName||"Рыбак",
          userPhoto:record.userPhoto||null,
          title:`${fish?.name||"Рыба"} ${record.weightGrams?(record.weightGrams/1000).toFixed(1)+" кг":""}`,
          fish:fish?.name||record.fishName||"Рыба",
          weight:record.weightGrams?(record.weightGrams/1000).toFixed(1):null,
          location:record.locationName, lat:record.lat||null, lng:record.lng||null,
          photoUrls:record.photoUrls||[], gearType:record.gearType||null, notes:record.notes||null,
          createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        });
        setPublished(true);
      } catch(e){ console.error("publish",e); }
    };

    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%",overflowY:"auto"}}>
        <div style={{padding:"12px 14px",display:"flex",alignItems:"center",borderBottom:`1px solid ${C.border}`,flexShrink:0,background:"rgba(7,17,30,.9)",position:"sticky",top:0,zIndex:2}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:14,fontWeight:700,padding:"4px 0"}}>← Назад</button>
          <div style={{flex:1}}/>
          {(record.isPublic||published)&&<span style={{fontSize:11,color:C.accent}}>📢 Опубликован</span>}
        </div>
        <div style={{padding:"0 0 24px",flex:1}}>
          {/* Photo gallery */}
          {photos.length>0&&(
            <div style={{position:"relative",background:"#000",marginBottom:0}}>
              <img src={photos[photoIdx]} alt="" style={{width:"100%",maxHeight:300,objectFit:"cover",display:"block"}}/>
              {photos.length>1&&(
                <>
                  <button onClick={()=>setPhotoIdx(i=>Math.max(0,i-1))} style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",width:32,height:32,borderRadius:"50%",background:"rgba(0,0,0,.5)",border:"none",color:"#fff",fontSize:18,cursor:"pointer",display:photoIdx===0?"none":"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                  <button onClick={()=>setPhotoIdx(i=>Math.min(photos.length-1,i+1))} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",width:32,height:32,borderRadius:"50%",background:"rgba(0,0,0,.5)",border:"none",color:"#fff",fontSize:18,cursor:"pointer",display:photoIdx===photos.length-1?"none":"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                  <div style={{position:"absolute",bottom:8,left:0,right:0,display:"flex",justifyContent:"center",gap:5}}>
                    {photos.map((_,i)=><div key={i} onClick={()=>setPhotoIdx(i)} style={{width:6,height:6,borderRadius:"50%",background:i===photoIdx?"#fff":"rgba(255,255,255,.4)",cursor:"pointer"}}/>)}
                  </div>
                </>
              )}
            </div>
          )}
          <div style={{padding:"16px 14px"}}>
            <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:12}}>
              <div style={{fontSize:22,fontWeight:800,color:C.text}}>{fish?.name||record.fishName||"Рыба"}</div>
              {record.weightGrams&&<div style={{fontSize:28,fontWeight:800,color:C.accent}}>{(record.weightGrams/1000).toFixed(1)} кг</div>}
              {record.lengthCm&&<div style={{fontSize:14,color:C.muted}}>{record.lengthCm} см</div>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              <div style={{...glass(),padding:"10px 14px",display:"flex",gap:8,alignItems:"center"}}><MapPin size={14} color={C.accent}/><span style={{fontSize:13,color:C.text}}>{record.locationName||"Место не указано"}</span></div>
              <div style={{...glass(),padding:"10px 14px",display:"flex",gap:8,alignItems:"center"}}><Clock size={14} color={C.cyan}/><span style={{fontSize:13,color:C.text}}>{date.toLocaleDateString("ru-RU",{day:"2-digit",month:"long",year:"numeric"})} {date.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"})}</span></div>
              {record.catchMethod&&<div style={{...glass(),padding:"10px 14px",fontSize:13,color:C.text}}><span style={{color:C.muted}}>🚤 Тип: </span>{record.catchMethod}</div>}
              {record.gearType&&<div style={{...glass(),padding:"10px 14px",fontSize:13,color:C.text}}><span style={{color:C.muted}}>🎣 Снасть: </span>{record.gearType}</div>}
              {record.bait&&<div style={{...glass(),padding:"10px 14px",fontSize:13,color:C.text}}><span style={{color:C.muted}}>🪱 Приманка: </span>{record.bait}</div>}
              {record.depthM&&<div style={{...glass(),padding:"10px 14px",fontSize:13,color:C.text}}><span style={{color:C.muted}}>📏 Глубина: </span>{record.depthM} м</div>}
              {record.distanceM&&<div style={{...glass(),padding:"10px 14px",fontSize:13,color:C.text}}><span style={{color:C.muted}}>↔ Дистанция: </span>{record.distanceM} м</div>}
              {record.notes&&<div style={{...glass(),padding:"10px 14px",fontSize:13,color:C.text}}><span style={{color:C.muted}}>📝 Заметка: </span>{record.notes}</div>}
              {record.weather&&(
                <div style={{...glass(),padding:"12px 14px"}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700,letterSpacing:.5}}>ПОГОДА В МОМЕНТ УЛОВА</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                    {record.weather.temp!=null&&<span style={{fontSize:12,color:C.text}}>🌡 {record.weather.temp}°C</span>}
                    {record.weather.windSpeed!=null&&<span style={{fontSize:12,color:C.text}}>💨 {record.weather.windSpeed} м/с</span>}
                    {record.weather.pressure!=null&&<span style={{fontSize:12,color:C.text}}>⬇ {record.weather.pressure} мм</span>}
                    {record.weather.moonPhase!=null&&<span style={{fontSize:12,color:C.text}}>🌙 Луна {Math.round(record.weather.moonPhase*100)}%</span>}
                    {record.weather.biteIndex!=null&&<span style={{fontSize:12,color:C.accent,fontWeight:700}}>🎣 Клёв {record.weather.biteIndex}/10</span>}
                  </div>
                </div>
              )}
            </div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <button onClick={()=>doShareCard(record)} style={{flex:1,padding:"12px",background:"rgba(34,211,238,.1)",border:"1px solid rgba(34,211,238,.3)",borderRadius:14,color:C.cyan,fontSize:13,fontWeight:700,cursor:"pointer"}}>
                📤 Поделиться
              </button>
            </div>
            <div style={{display:"flex",gap:8}}>
              {!published&&!record.isPublic&&(
                <button onClick={handlePublish} style={{flex:1,padding:"12px",background:C.accentDim,border:`1px solid ${C.accent}`,borderRadius:14,color:C.accent,fontSize:13,fontWeight:700,cursor:"pointer"}}>
                  📢 Опубликовать
                </button>
              )}
              <button onClick={handleDelete} disabled={deleting} style={{flex:1,padding:"12px",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:14,color:"#f87171",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                {deleting?"...":"🗑 Удалить"}
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ── ManualCatchForm ── */
  function ManualCatchForm({ user, userLat, userLon, onClose, onSaved }) {
    const [fishSearch, setFishSearch] = useState("");
    const [fishType, setFishType] = useState("");
    const [weightKg, setWeightKg] = useState("");
    const [lengthCm, setLengthCm] = useState("");
    const [locationName, setLocationName] = useState(userLat?getNearestSpotName(userLat,userLon):"");
    const [dateStr, setDateStr] = useState(()=>new Date().toISOString().slice(0,16));
    const [gearType, setGearType] = useState("");
    const [bait, setBait] = useState("");
    const [catchMethod, setCatchMethod] = useState("");
    const [notes, setNotes] = useState("");
    const [saving, setSaving] = useState(false);
    const fishFiltered = fishSearch ? FISH_TYPES.filter(f=>f.name.toLowerCase().includes(fishSearch.toLowerCase())) : FISH_TYPES;

    const handleSave = async () => {
      if (!fishType) return alert("Выберите вид рыбы");
      setSaving(true);
      const dt = new Date(dateStr);
      const rec = {
        userId: user.uid, userName: user.displayName||"Рыбак",
        fishType, fishName: FISH_TYPES.find(f=>f.id===fishType)?.name||"",
        weightGrams: weightKg ? Math.round(parseFloat(weightKg)*1000) : null,
        lengthCm: lengthCm ? parseFloat(lengthCm) : null,
        locationName: locationName||"Место не указано",
        lat: userLat||null, lng: userLon||null,
        gearType: gearType||null, bait: bait||null,
        catchMethod: catchMethod||null, notes: notes||null,
        photoUrls: [], isPublic: false, source: "manual",
        createdAt: firebase.firestore.Timestamp.fromDate(dt),
      };
      try {
        await db.collection("catches").doc(user.uid).collection("records").add(rec);
        logEvent("catch_saved",{source:"manual",fish_type:fishType,weight_g:rec.weightGrams||0,has_photo:false});
        onSaved?.();
        onClose();
      } catch(e){ setSaving(false); alert("Ошибка сохранения"); }

      <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"flex-end"}}>

            <div style={{fontSize:17,fontWeight:800,color:C.text,flex:1}}>📝 Добавить улов вручную</div>

          </div>
          {/* Fish type */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700}}>ВИД РЫБЫ *</div>
            <input value={fishSearch} onChange={e=>setFishSearch(e.target.value)} placeholder="Поиск..." style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.text,fontSize:13,boxSizing:"border-box",marginBottom:8,outline:"none"}}/>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,maxHeight:120,overflowY:"auto"}}>
              {fishFiltered.map(f=>(
                <button key={f.id} onClick={()=>{setFishType(f.id);setFishSearch(f.name);}} style={{padding:"5px 11px",borderRadius:14,background:fishType===f.id?C.accentDim:C.surface,border:`1px solid ${fishType===f.id?C.accent:C.border}`,color:fishType===f.id?C.accent:C.muted,fontSize:12,cursor:"pointer"}}>{f.name}</button>
              ))}
            </div>
          </div>
          {/* Weight & length */}
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700}}>ВЕС (КГ)</div>
              <input type="number" step="0.1" min="0" value={weightKg} onChange={e=>setWeightKg(e.target.value)} placeholder="0.0" style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.text,fontSize:14,boxSizing:"border-box",outline:"none"}}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700}}>ДЛИНА (СМ)</div>
              <input type="number" step="1" min="0" value={lengthCm} onChange={e=>setLengthCm(e.target.value)} placeholder="0" style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.text,fontSize:14,boxSizing:"border-box",outline:"none"}}/>
            </div>
          </div>
          {/* Location & date */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700}}>МЕСТО</div>
            <input value={locationName} onChange={e=>setLocationName(e.target.value)} placeholder="Название места" style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.text,fontSize:13,boxSizing:"border-box",outline:"none"}}/>
          </div>

          </div>
          {/* Gear */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700}}>СНАСТЬ</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {GEAR_TYPES.map(g=>(
                <button key={g} onClick={()=>setGearType(gearType===g?"":g)} style={{padding:"5px 11px",borderRadius:14,background:gearType===g?C.accentDim:C.surface,border:`1px solid ${gearType===g?C.accent:C.border}`,color:gearType===g?C.accent:C.muted,fontSize:12,cursor:"pointer"}}>{g}</button>

              {CATCH_METHODS.map(m=>(
                <button key={m} onClick={()=>setCatchMethod(catchMethod===m?"":m)} style={{padding:"5px 11px",borderRadius:14,background:catchMethod===m?C.accentDim:C.surface,border:`1px solid ${catchMethod===m?C.accent:C.border}`,color:catchMethod===m?C.accent:C.muted,fontSize:12,cursor:"pointer"}}>{m}</button>
              ))}
            </div>
          </div>
          {/* Bait */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700}}>ПРИМАНКА / НАЖИВКА</div>
            <input value={bait} onChange={e=>setBait(e.target.value)} placeholder="Напр.: Джиг, червь..." style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.text,fontSize:13,boxSizing:"border-box",outline:"none"}}/>
          </div>
          {/* Notes */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:700}}>ЗАМЕТКИ</div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Любые заметки о рыбалке..." rows={3} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:C.surfaceHi,color:C.text,fontSize:13,boxSizing:"border-box",resize:"none",outline:"none"}}/>
          </div>
          <button onClick={handleSave} disabled={saving||!fishType} style={{width:"100%",padding:"15px",borderRadius:16,border:"none",background:fishType?`linear-gradient(135deg,#1a8a50,${C.accent})`:"#1e3a2a",color:fishType?"#07111e":"#4a6e5a",fontSize:15,fontWeight:800,cursor:fishType?"pointer":"default"}}>
            {saving?"Сохраняем...":"💾 Сохранить улов"}
          </button>
        </div>
      </div>
    );
  }

  /* ── DiaryScreen ── */
  function DiaryScreen({ user, onLogin, userLat, userLon }) {
    if (!user) return <RequireAuth user={user} onLogin={onLogin}><div/></RequireAuth>;
    const [records, setRecords] = useState([]);
    const [loading, setLoading] = useState(true);
    const [loadingMore, setLoadingMore] = useState(false);
    const [noMore, setNoMore] = useState(false);
    const lastDocRef = useRef(null);
    const [filterFish, setFilterFish] = useState("");
    const [filterGear, setFilterGear] = useState("");
    const [filterPeriod, setFilterPeriod] = useState("all");
    const [search, setSearch] = useState("");
    const [selected, setSelected] = useState(null);
    const [showManual, setShowManual] = useState(false);

    const loadInitial = useCallback(()=>{
      setLoading(true); setNoMore(false); lastDocRef.current=null;
      const unsub = db.collection("catches").doc(user.uid).collection("records")
        .orderBy("createdAt","desc").limit(20)
        .onSnapshot(snap=>{
          const docs = snap.docs;
          if (docs.length>0) lastDocRef.current = docs[docs.length-1];
          if (docs.length<20) setNoMore(true);
          setRecords(docs.map(d=>({...d.data(),id:d.id})));
          setLoading(false);
        },()=>setLoading(false));
      return unsub;
    },[user.uid]);

    useEffect(()=>{
      logEvent("diary_opened",{records_count:records.length});
      const unsub = loadInitial();
      return unsub;
    },[user.uid]);

    const loadMore = async () => {
      if (!lastDocRef.current||loadingMore||noMore) return;
      setLoadingMore(true);
      const snap = await db.collection("catches").doc(user.uid).collection("records")
        .orderBy("createdAt","desc").startAfter(lastDocRef.current).limit(20).get();
      if (snap.docs.length>0) lastDocRef.current = snap.docs[snap.docs.length-1];
      if (snap.docs.length<20) setNoMore(true);
      setRecords(prev=>[...prev,...snap.docs.map(d=>({...d.data(),id:d.id}))]);
      setLoadingMore(false);
    };

    const periodStart = useMemo(()=>{
      const now=new Date();
      if(filterPeriod==="week") return new Date(now.getFullYear(),now.getMonth(),now.getDate()-7);
      if(filterPeriod==="month") return new Date(now.getFullYear(),now.getMonth(),1);
      if(filterPeriod==="year") return new Date(now.getFullYear(),0,1);
      return null;
    },[filterPeriod]);

    const filtered = useMemo(()=>{
      return records.filter(r=>{
        if(filterFish && r.fishType!==filterFish) return false;
        if(filterGear && r.gearType!==filterGear) return false;
        if(periodStart){const d=r.createdAt?.toDate?.(); if(!d||d<periodStart) return false;}
        if(search){
          const q=search.toLowerCase();
          const fishName=(FISH_TYPES.find(f=>f.id===r.fishType)?.name||r.fishName||"").toLowerCase();
          const loc=(r.locationName||"").toLowerCase();
          const notes=(r.notes||"").toLowerCase();
          if(!fishName.includes(q)&&!loc.includes(q)&&!notes.includes(q)) return false;
        }
        return true;
      });
    },[records,filterFish,filterGear,filterPeriod,search,periodStart]);

    const fishInRecs = useMemo(()=>[...new Set(records.map(r=>r.fishType).filter(Boolean))],[records]);
    const gearsInRecs = useMemo(()=>[...new Set(records.map(r=>r.gearType).filter(Boolean))],[records]);
    const totalW = useMemo(()=>records.reduce((s,r)=>s+(r.weightGrams||0),0),[records]);

    const handleScroll = useCallback((e)=>{
      const el=e.currentTarget;
      if(el.scrollHeight-el.scrollTop-el.clientHeight<100) loadMore();
    },[loadMore]);

    if (selected) return <CatchDetailView record={selected} user={user} onBack={()=>setSelected(null)}/>;

    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        {showManual&&<ManualCatchForm user={user} userLat={userLat} userLon={userLon} onClose={()=>setShowManual(false)} onSaved={()=>loadInitial()}/>}
        {/* Header */}
        <div style={{padding:"12px 14px 0",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:19,fontWeight:800,color:C.text}}>🎣 Мой дневник</div>
            <button onClick={()=>setShowManual(true)} style={{padding:"6px 14px",borderRadius:14,background:C.accentDim,border:`1px solid ${C.accent}`,color:C.accent,fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Добавить</button>
          </div>
          {/* Stats mini-bar */}
          {records.length>0&&(
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              {[{v:records.length,l:"записей"},{v:(totalW/1000).toFixed(1)+" кг",l:"всего"},{v:fishInRecs.length,l:"видов рыб"}].map(s=>(
                <div key={s.l} style={{flex:1,padding:"8px 6px",background:C.surfaceHi,borderRadius:12,textAlign:"center",border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:14,fontWeight:800,color:C.accent}}>{s.v}</div>
                  <div style={{fontSize:9,color:C.dimmer}}>{s.l}</div>
                </div>
              ))}
            </div>
          )}
          {/* Search */}
          <div style={{display:"flex",alignItems:"center",gap:8,background:C.surfaceHi,borderRadius:12,padding:"8px 12px",border:`1px solid ${C.border}`,marginBottom:8}}>
            <span style={{fontSize:14,color:C.muted}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск по рыбе, месту, заметкам..." style={{flex:1,background:"none",border:"none",outline:"none",color:C.text,fontSize:13}}/>
            {search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:18,lineHeight:1}}>×</button>}
          </div>
          {/* Period filter */}
          <div style={{display:"flex",gap:5,marginBottom:6}}>
            {[["all","Всё время"],["week","Неделя"],["month","Месяц"],["year","Год"]].map(([v,l])=>(
              <button key={v} onClick={()=>setFilterPeriod(v)} style={{flex:1,padding:"5px 4px",background:filterPeriod===v?C.accentDim:C.surface,border:`1px solid ${filterPeriod===v?C.accent:C.border}`,borderRadius:10,color:filterPeriod===v?C.accent:C.muted,fontSize:11,cursor:"pointer",fontWeight:filterPeriod===v?700:400}}>{l}</button>
            ))}
          </div>
          {/* Fish filter chips */}
          {fishInRecs.length>0&&(
            <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:8}}>

  function ShopsScreen({ userLat, userLon }) {
    const [selected, setSelected] = useState(null);
    const [search, setSearch] = useState("");

    const isOpen = (h) => {
      const now = new Date(), cur = now.getHours()*60+now.getMinutes();
      const parts = h.replace("–","-").split("-").map(t=>{ const [hh,mm]=(t+":00").split(":").map(Number); return hh*60+(mm||0); });
      return cur>=parts[0]&&cur<parts[1];
    };

    const Stars = ({r}) => {
      const full=Math.floor(r), half=r%1>=0.5;
      return <span style={{color:"#f59e0b",fontSize:12,letterSpacing:1}}>{"★".repeat(full)}{half?"☆":""}{"☆".repeat(5-full-(half?1:0))}</span>;
    };

    const shopDist = (s) => userLat && userLon ? haversine(userLat, userLon, s.lat, s.lng) : null;

    const filtered = SHOPS
      .filter(s=>{
        if(!search) return true;
        const q=search.toLowerCase();
        return s.name.toLowerCase().includes(q)||s.addr.toLowerCase().includes(q)||s.city.toLowerCase().includes(q)||s.tags.some(t=>t.includes(q));
      })
      .sort((a,b)=>{ const da=shopDist(a),db=shopDist(b); return (da!==null&&db!==null)?da-db:0; });

    const centerLon = selected ? selected.lng : (userLon||39.75);
    const centerLat = selected ? selected.lat : (userLat||47.23);
    const zoom = selected ? 15 : 10;
    const pts = SHOPS.map(s=>`${s.lng},${s.lat},${selected?.id===s.id?"pm2gnl1":"pm2rdl1"}`).join("~");
    const mapSrc = `https://yandex.ru/map-widget/v1/?ll=${centerLon},${centerLat}&z=${zoom}&pt=${pts}&l=map`;

    const o = selected ? isOpen(selected.hours) : false;

    return(
      <div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg,overflow:"hidden"}}>

        {/* Search bar */}
        <div style={{padding:"8px 12px",background:"rgba(7,17,30,.97)",backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>

          </div>
        </div>

        {/* Embedded map */}
        <div style={{flex:"0 0 44%",position:"relative",background:"#0a192f"}}>
          <iframe
            key={`${centerLon}_${centerLat}_${zoom}`}
            src={mapSrc}
            style={{width:"100%",height:"100%",display:"block",border:"none"}}
            frameBorder="0"
            allowFullScreen={true}
            loading="lazy"
          />
          {selected&&(
            <div style={{position:"absolute",bottom:8,left:8,right:8,background:"rgba(7,17,30,.92)",backdropFilter:"blur(12px)",border:`1px solid ${C.borderHi}`,borderRadius:12,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{selected.name}</div>
                <div style={{fontSize:10,color:o?"#2ecc71":"#ef4444"}}>{o?"● Открыто":"● Закрыто"} · {selected.hours}</div>
              </div>

            </div>

                <div>
                  <div style={{fontSize:19,fontWeight:800,color:C.text,marginBottom:3}}>{selected.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <Stars r={selected.rating}/>
                    <span style={{color:"#f59e0b",fontSize:12,fontWeight:700}}>{selected.rating}</span>
                    <span style={{color:C.muted,fontSize:11}}>({selected.cnt} отз.)</span>
                  </div>
                </div>
                <div style={{padding:"5px 10px",borderRadius:8,background:o?"rgba(46,204,113,.15)":"rgba(239,68,68,.15)",border:`1px solid ${o?"rgba(46,204,113,.4)":"rgba(239,68,68,.4)"}`,fontSize:11,fontWeight:800,color:o?"#2ecc71":"#ef4444",whiteSpace:"nowrap"}}>
                  {o?"● Открыт":"● Закрыт"}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12,padding:"10px 12px",background:C.surfaceHi,borderRadius:12,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><MapPin size={13} color={C.muted}/><span style={{color:C.text,fontSize:13}}>{selected.addr}, {selected.city}</span></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><Clock size={13} color={C.muted}/><span style={{color:C.text,fontSize:13}}>Работает: {selected.hours}</span></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:13}}>📞</span><a href={`tel:${selected.phone}`} style={{color:C.accent,fontSize:13,textDecoration:"none",fontWeight:700}}>{selected.phone}</a></div>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                {selected.tags.map(t=><span key={t} style={{padding:"3px 10px",borderRadius:20,background:C.accentDim,border:`1px solid ${C.borderHi}`,color:C.accent,fontSize:11,fontWeight:600}}>{t}</span>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>window.open(ymapsLL(selected.lat,selected.lng),"_blank","noopener,noreferrer")} style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:`linear-gradient(135deg,#1a8a50,${C.accent})`,color:"#07111e",fontSize:13,fontWeight:800,cursor:"pointer"}}>
                  📍 Маршрут
                </button>
                <a href={`tel:${selected.phone}`} style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${C.borderHi}`,background:C.accentDim,color:C.accent,fontSize:13,fontWeight:800,cursor:"pointer",textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  📞 Позвонить

          ):(
            <div style={{padding:"12px 12px 24px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:14,fontWeight:800,color:C.text}}>Рыболовные магазины</span>
                <span style={{fontSize:11,color:C.muted,background:C.surfaceHi,padding:"3px 8px",borderRadius:8}}>{filtered.length} из {SHOPS.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {filtered.map(shop=>{
                  const op=isOpen(shop.hours);
                  return(
                    <button key={shop.id} onClick={()=>setSelected(shop)} style={{display:"flex",gap:10,padding:"11px 12px",borderRadius:12,background:C.surfaceHi,border:`1px solid ${C.border}`,cursor:"pointer",textAlign:"left",width:"100%"}}>
                      <div style={{width:42,height:42,borderRadius:12,background:C.accentDim,border:`1px solid ${C.borderHi}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20}}>🎣</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                          <span style={{fontSize:14,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{shop.name}</span>
                          <span style={{fontSize:10,fontWeight:700,color:op?"#2ecc71":"#ef4444",flexShrink:0,marginLeft:6}}>{op?"● Открыт":"● Закрыт"}</span>
                        </div>
                        <div style={{fontSize:11,color:C.muted,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{shop.addr}, {selected?.id===shop.id?"":shop.city}</div>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          <Stars r={shop.rating}/>

  /* ── LeaderboardScreen ── */
  function LeaderboardScreen({ onBack }) {
    const [period, setPeriod] = useState("week");
    const [rows, setRows] = useState([]);
    const [loading, setLoading] = useState(true);

    useEffect(()=>{
      logEvent("leaderboard_viewed",{period});
      setLoading(true); setRows([]);
      let q = db.collection("reports").orderBy("createdAt","desc").limit(500);
      if(period==="week"){
        const since=new Date(); since.setDate(since.getDate()-7);
        q=db.collection("reports").where("createdAt",">=",firebase.firestore.Timestamp.fromDate(since)).orderBy("createdAt","desc").limit(500);
      } else if(period==="month"){
        const since=new Date(); since.setMonth(since.getMonth()-1);
        q=db.collection("reports").where("createdAt",">=",firebase.firestore.Timestamp.fromDate(since)).orderBy("createdAt","desc").limit(500);
      }
      q.get().then(snap=>{
        const map={};
        snap.docs.forEach(d=>{
          const r=d.data(); const uid=r.userId||"anon";
          if(!map[uid]) map[uid]={userId:uid,author:r.author||"Рыбак",catches:0,totalKg:0,best:0};
          map[uid].catches++;
          const kg=parseFloat(r.weight)||0;
          map[uid].totalKg+=kg;
          if(kg>map[uid].best) map[uid].best=kg;
        });
        setRows(Object.values(map).sort((a,b)=>b.totalKg-a.totalKg||b.catches-a.catches).slice(0,50));
        setLoading(false);
      }).catch(()=>setLoading(false));
    },[period]);

    const medals=["🥇","🥈","🥉"];
    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{padding:"12px 14px",display:"flex",alignItems:"center",borderBottom:`1px solid ${C.border}`,flexShrink:0,background:"rgba(7,17,30,.9)",position:"sticky",top:0,zIndex:2}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:14,fontWeight:700,padding:"4px 10px 4px 0"}}>←</button>
          <div style={{flex:1,fontSize:17,fontWeight:800,color:C.text}}>🏆 Рейтинг рыбаков</div>
        </div>
        <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:"rgba(7,17,30,.92)",flexShrink:0}}>
          {[{id:"week",label:"Неделя"},{id:"month",label:"Месяц"},{id:"all",label:"Все"}].map(t=>(
            <button key={t.id} onClick={()=>setPeriod(t.id)} style={{flex:1,padding:"10px 0",border:"none",background:"none",cursor:"pointer",fontSize:12,fontWeight:700,color:period===t.id?C.accent:C.muted,borderBottom:period===t.id?`2px solid ${C.accent}`:"2px solid transparent",transition:"all .2s"}}>
              {t.label}
            </button>
          ))}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"8px 14px 24px"}}>
          {loading&&[1,2,3,4,5].map(i=><div key={i} style={{height:62,borderRadius:14,background:C.surface,marginBottom:8,animation:"pulseGlow 1.5s ease infinite"}}/>)}
          {!loading&&rows.length===0&&<div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>Нет данных за этот период</div>}
          {!loading&&rows.map((r,i)=>(
            <div key={r.userId} style={{...glass(),padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,borderRadius:16,border:`1px solid ${i<3?`rgba(46,204,113,${0.4-i*0.1})`:C.border}`}}>
              <div style={{fontSize:i<3?26:13,fontWeight:800,color:i<3?C.accent:C.dimmer,width:30,textAlign:"center",flexShrink:0}}>{i<3?medals[i]:i+1}</div>
              <div style={{width:36,height:36,borderRadius:18,background:`linear-gradient(135deg,${C.accent},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:"#07111e",flexShrink:0}}>
                {(r.author||"Р")[0].toUpperCase()}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.author}</div>
                <div style={{fontSize:11,color:C.muted}}>{r.catches} улов{r.catches===1?"":"ов"} · лучший {r.best.toFixed(1)} кг</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:17,fontWeight:800,color:C.accent}}>{r.totalKg.toFixed(1)}</div>
                <div style={{fontSize:10,color:C.dimmer}}>кг</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
