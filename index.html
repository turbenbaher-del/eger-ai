        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill={fill}/>

    /* ─── DESIGN TOKENS ─── */
    const C = {
      bg:        "#07111e",
      surface:   "rgba(255,255,255,0.05)",
      surfaceHi: "rgba(255,255,255,0.09)",
      border:    "rgba(255,255,255,0.10)",
      borderHi:  "rgba(46,204,113,0.40)",
      accent:    "#2ecc71",
      accentDim: "rgba(46,204,113,0.15)",
      accentGlow:"rgba(46,204,113,0.35)",
      blue:      "#3b82f6",
      cyan:      "#22d3ee",
      gold:      "#f59e0b",
      text:      "#e8f4f0",
      muted:     "rgba(232,244,240,0.45)",
      dimmer:    "rgba(232,244,240,0.25)",
    };

    const glass = (extra = "") => ({
      background: C.surface,
      backdropFilter: "blur(24px)",
      WebkitBackdropFilter: "blur(24px)",
      border: `1px solid ${C.border}`,
      borderRadius: 20,
      ...(extra ? { boxShadow: extra } : {}),
    });

    /* ─── DATA ─── */
    const PRESSURE_DATA = [757,758,756,759,761,760,762,761,763,762,764,763];
    const PRESSURE_LABELS = ["8ч","","10ч","","12ч","","14ч","","16ч","","18ч",""];

    const RESPONSES = [
      "Слушай, я тебе скажу — сейчас Дон подымается, амур жмётся к камышовым крепям. Бери кукурузу варёную, иди на вторую дамбу к семи утра, и будешь с рыбой. Давление выровнялось — самое оно.",
      "На Аксае сейчас вода мутновата после дождей. Лещ стоит на 4–5 метрах у старого русла. Опарыш на крючке №8, прикормка с анисом — не промахнёшься. Лучший клёв часа три до заката.",
      "Щуку ищи у затопленных кустов на Мёртвом Донце. Воблер 7–9 см серебристый или «кровавый» — она их любит. Температура воды +17, жор начнётся часов в шесть вечера, поверь егерю.",
      "Ветер северо-западный — карась нынче капризный. Но у камышей Левобережья в тихих заводях берёт хорошо. Мотыль или красный червь. Леску ставь не толще 0.18 — он осторожный нынче.",
      "Давление вот уже двое суток стабильное, 762 мм. Это знак — сазан выходит кормиться! Иди на перекаты ниже Аксая, бойлы кукурузные или картошка варёная. Ранним утром, когда туман ещё лежит.",
      "По моим наблюдениям за много лет — как вода поднимается на полметра, белый амур идёт к берегу. Сейчас именно такой момент. Молодые камышовые побеги или водоросль — лучшей насадки не найдёшь.",
      "Судак сейчас стоит на свале — там, где глубина резко с 3 до 8 метров. Джиг 20–28 грамм, твистер белый или зелёный. Веди у самого дна, медленной ступенькой. Ночью он активнее всего.",
    ];
    let _ri = 0;
    const getBotReply = (q) => {
      const l = q.toLowerCase();
      if (l.includes("амур")||l.includes("камыш")) return RESPONSES[5];
      if (l.includes("щук")) return RESPONSES[2];
      if (l.includes("лещ")||l.includes("опарыш")) return RESPONSES[1];
      if (l.includes("карась")) return RESPONSES[3];
      if (l.includes("сазан")||l.includes("бойл")) return RESPONSES[4];
      if (l.includes("судак")||l.includes("джиг")) return RESPONSES[6];
      return RESPONSES[(_ri++)%RESPONSES.length];
    };
    const fmtTime = () => new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});

    /* ─── SPARKLINE ─── */
    function Sparkline({ data, width=280, height=60 }) {
      const min = Math.min(...data)-2, max = Math.max(...data)+2;
      const pts = data.map((v,i) => {
        const x=(i/(data.length-1))*width, y=height-((v-min)/(max-min))*height;
        return `${x},${y}`;
      }).join(" ");
      const fillPts = `0,${height} ${pts} ${width},${height}`;
      const [lx,ly] = pts.split(" ").slice(-1)[0].split(",");
      return (
        <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{overflow:"visible"}}>
          <defs>
            <linearGradient id="spGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={C.accent} stopOpacity="0.35"/>
              <stop offset="100%" stopColor={C.accent} stopOpacity="0"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <polygon points={fillPts} fill="url(#spGrad)"/>
          <polyline points={pts} fill="none" stroke={C.accent} strokeWidth="2"
            strokeLinejoin="round" strokeLinecap="round" filter="url(#glow)"/>
          <circle cx={lx} cy={ly} r="4" fill={C.accent} style={{filter:`drop-shadow(0 0 6px ${C.accent})`}}/>
        </svg>
      );
    }

    /* ─── WAVE SVG ─── */
    function WaveIcon({ size=20 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
          <path d="M2 14 Q6 10 10 14 Q14 18 18 14 Q20 12 22 14"
            stroke={C.cyan} strokeWidth="2" strokeLinecap="round"/>
          <path d="M2 18 Q6 14 10 18 Q14 22 18 18 Q20 16 22 18"
            stroke={C.cyan} strokeWidth="1.5" strokeLinecap="round" opacity="0.5"/>
        </svg>
      );
    }

    /* ─── BITE ARC ─── */
    function BiteArc({ score=8 }) {
      const pct=score/10, R=52, cx=64, cy=64;
      const sA=Math.PI*.75, eA=Math.PI*2.25, sw=eA-sA;
      const ang=sA+sw*pct;
      const xy=(a)=>[cx+R*Math.cos(a), cy+R*Math.sin(a)];
      const [bx,by]=xy(sA), [ex,ey]=xy(ang), [fx,fy]=xy(eA);
      const large=sw*pct>Math.PI?1:0, tl=(eA-sA)>Math.PI?1:0;
      const col=score>=8?C.accent:score>=5?C.gold:"#ef4444";
      return (
        <svg width={128} height={96} viewBox="0 0 128 96">
          <defs>
            <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor={col} stopOpacity="0.4"/>
              <stop offset="100%" stopColor={col}/>
            </linearGradient>
          </defs>
          <path d={`M${bx},${by} A${R},${R} 0 ${tl},1 ${fx},${fy}`}
            stroke="rgba(255,255,255,0.08)" strokeWidth="10" fill="none" strokeLinecap="round"/>
          {pct>0 && <path d={`M${bx},${by} A${R},${R} 0 ${large},1 ${ex},${ey}`}
            stroke="url(#arcGrad)" strokeWidth="10" fill="none" strokeLinecap="round"
            style={{filter:`drop-shadow(0 0 8px ${col})`}}/>}
          <text x={cx} y={cy-4} textAnchor="middle" fill={col}
            style={{fontSize:28,fontWeight:800,fontFamily:"'Bebas Neue',cursive",
              filter:`drop-shadow(0 0 10px ${col})`}}>{score}</text>
          <text x={cx} y={cy+14} textAnchor="middle" fill={C.muted}
            style={{fontSize:9,letterSpacing:2}}>ИЗ 10</text>
        </svg>
      );
    }

    /* ─── WEATHER PILL ─── */
    function WPill({ Icon, val, label, color=C.accent }) {
      return (
        <div style={{...glass(),padding:"10px 8px",flex:1,display:"flex",
          flexDirection:"column",alignItems:"center",gap:4}}>
          <Icon size={16} color={color} style={{filter:`drop-shadow(0 0 4px ${color})`}}/>
          <span style={{fontSize:14,fontWeight:700,color:C.text}}>{val}</span>
          <span style={{fontSize:9,color:C.dimmer,letterSpacing:1.5,textTransform:"uppercase"}}>{label}</span>
        </div>
      );
    }

    /* ─── CHAT BUBBLE ─── */
    function Bubble({ msg }) {
      const isUser = msg.role==="user";
      return (
        <div style={{display:"flex",justifyContent:isUser?"flex-end":"flex-start",
          marginBottom:12,animation:"fadeUp .3s ease"}}>
          {!isUser && (
            <div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,
              background:`linear-gradient(135deg,${C.accent},${C.cyan})`,
              display:"flex",alignItems:"center",justifyContent:"center",
              marginRight:8,alignSelf:"flex-end",boxShadow:`0 0 14px ${C.accentGlow}`}}>
              <Fish size={17} color="#07111e"/>
            </div>
          )}
          <div style={{maxWidth:"78%",padding:"11px 15px",
            borderRadius:isUser?"18px 18px 4px 18px":"18px 18px 18px 4px",
            background:isUser?`linear-gradient(135deg,#1a8a50,${C.accent})`:"rgba(255,255,255,0.07)",
            border:isUser?"none":`1px solid ${C.border}`,
            color:isUser?"#07111e":C.text,fontSize:13.5,lineHeight:1.55,
            fontWeight:isUser?600:400,backdropFilter:"blur(12px)"}}>
            {msg.text}
            <div style={{fontSize:10,marginTop:5,opacity:.5,textAlign:"right",
              color:isUser?"#07111e":C.text}}>{msg.time}</div>
          </div>
        </div>
      );
    }

      return (

    /* ─── HOME SCREEN ─── */
    function HomeScreen({ onGoChat }) {
      const spots = [
        {name:"Вторая дамба",    fish:"Лещ, Сазан",  score:"9/10",dist:"2.3 км",Icon:Anchor},
        {name:"Камышовая заводь",fish:"Белый амур",  score:"8/10",dist:"4.1 км",Icon:Waves},
        {name:"Перекат у Аксая", fish:"Щука, Судак", score:"7/10",dist:"1.8 км",Icon:TrendingUp},
      ];
      return (
        <div style={{padding:"0 14px",overflowY:"auto",height:"100%",paddingBottom:20}}>

          {/* forecast card */}
          <div style={{...glass(`0 8px 32px rgba(0,0,0,.4),0 0 0 1px ${C.borderHi}`),
            background:"linear-gradient(135deg,rgba(46,204,113,.12) 0%,rgba(34,211,238,.08) 50%,rgba(59,130,246,.10) 100%)",

            <div style={{position:"absolute",top:-40,right:-40,width:180,height:180,borderRadius:"50%",
              background:"radial-gradient(circle,rgba(46,204,113,.15) 0%,transparent 70%)",pointerEvents:"none"}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <Star size={12} color={C.gold} fill={C.gold}/>
                  <span style={{fontSize:10,color:C.gold,letterSpacing:2.5,fontWeight:700}}>ПРОГНОЗ ДНЯ</span>
                </div>
                <div style={{fontSize:20,fontWeight:800,color:C.text,lineHeight:1.2}}>Отличный клёв!</div>
                <div style={{fontSize:12,color:C.muted,marginTop:2}}>Аксайский р-н · Дон · Май 2026</div>
              </div>
              <BiteArc score={8}/>
            </div>

            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:10,color:C.dimmer,letterSpacing:1.5}}>ДАВЛЕНИЕ (ммрт)</span>
                <span style={{fontSize:11,fontWeight:700,color:C.accent}}>763 мм↑</span>
              </div>
              <Sparkline data={PRESSURE_DATA}/>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                {PRESSURE_LABELS.filter((_,i)=>i%2===0).map((l,i)=>(
                  <span key={i} style={{fontSize:9,color:C.dimmer}}>{l}</span>
                ))}
              </div>
            </div>

            <div style={{background:"rgba(0,0,0,.3)",borderRadius:14,padding:"12px 14px",
              borderLeft:`3px solid ${C.accent}`}}>
              <div style={{fontSize:10,color:C.accent,letterSpacing:2,fontWeight:700,marginBottom:5}}>
                ИИ-СОВЕТ ЕГЕРЯ
              </div>
              <div style={{fontSize:13,color:"rgba(232,244,240,.85)",lineHeight:1.6}}>
                В Аксае пошёл подъём воды — амур жмётся к камышу. Бери кукурузу варёную. Давление растёт — лещ выходит на 4 метра.
              </div>
            </div>
          </div>

          {/* weather pills */}
          <div style={{display:"flex",gap:8,marginBottom:14,animation:"fadeUp .6s ease"}}>
            <WPill Icon={Thermometer} val="+19°C" label="воздух" color={C.gold}/>
            <WPill Icon={Droplets}    val="+17°C" label="вода"   color={C.cyan}/>
            <WPill Icon={Wind}        val="3 м/с"  label="ветер"  color={C.blue}/>
            <WPill Icon={Waves}       val="+40см"  label="уровень" color={C.accent}/>
          </div>

          {/* hot spots */}
          <div style={{animation:"fadeUp .7s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:14,fontWeight:700,color:C.text}}>Горячие точки</span>
              <span style={{fontSize:12,color:C.accent,display:"flex",alignItems:"center",gap:2}}>
                На карте <ChevronRight size={13}/>
              </span>
            </div>
            {spots.map((s,i)=>(
              <div key={i} style={{...glass(),padding:"12px 14px",marginBottom:8,
                display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:10,background:C.accentDim,
                    border:`1px solid ${C.borderHi}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <s.Icon size={16} color={C.accent}/>
                  </div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:C.text}}>{s.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>{s.fish} · {s.dist}</div>
                  </div>
                </div>
                <div style={{background:C.accentDim,border:`1px solid ${C.borderHi}`,
                  borderRadius:8,padding:"4px 10px",fontSize:13,fontWeight:700,color:C.accent}}>
                  {s.score}
                </div>
              </div>
            ))}

            <div onClick={onGoChat} style={{...glass(`0 0 0 1px ${C.borderHi}`),
              background:"linear-gradient(135deg,rgba(46,204,113,.18),rgba(34,211,238,.10))",
              padding:"14px 18px",marginTop:8,cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:38,height:38,borderRadius:11,
                  background:`linear-gradient(135deg,${C.accent},${C.cyan})`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  boxShadow:`0 4px 14px ${C.accentGlow}`}}>
                  <Fish size={19} color="#07111e"/>
                </div>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:C.text}}>Спроси Егеря</div>
                  <div style={{fontSize:11,color:C.muted}}>Задай вопрос об улове</div>
                </div>
              </div>
              <ChevronRight size={18} color={C.accent}/>
            </div>
          </div>
        </div>
      );
    }

    /* ─── CHAT SCREEN ─── */
    function ChatScreen() {
      const [msgs, setMsgs] = useState([{
        role:"assistant",
        text:"Здорово, рыбак! Я — Егерь ИИ, знаю каждый омут Дона. Спрашивай про клёв, снасти, места — ничего не скрою 🎣",
        time:fmtTime(),
      }]);
      const [input, setInput] = useState("");
      const [typing, setTyping] = useState(false);
      const bottomRef = useRef(null);

      useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,typing]);

      const send = useCallback(()=>{
        const text=input.trim(); if(!text) return;
        setMsgs(p=>[...p,{role:"user",text,time:fmtTime()}]);
        setInput(""); setTyping(true);
        setTimeout(()=>{
          setTyping(false);
          setMsgs(p=>[...p,{role:"assistant",text:getBotReply(text),time:fmtTime()}]);
        }, 1500+Math.random()*500);
      },[input]);

      const handleKey=(e)=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} };
      const QUICK=["Прогноз клёва","Белый амур","Где щука?","Давление растёт"];

      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
          <div style={{padding:"10px 16px 6px",borderBottom:`1px solid ${C.border}`,
            display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:36,height:36,borderRadius:"50%",
              background:`linear-gradient(135deg,${C.accent},${C.cyan})`,
              display:"flex",alignItems:"center",justifyContent:"center",
              boxShadow:`0 0 12px ${C.accentGlow}`}}>
              <Fish size={17} color="#07111e"/>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>Егерь ИИ</div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:C.accent,
                  animation:"pulseGlow 2s ease infinite"}}/>
                <span style={{fontSize:10,color:C.accent}}>онлайн · Знает Дон</span>
              </div>
            </div>
          </div>

          <div style={{flex:1,overflowY:"auto",padding:"14px 14px 6px"}}>
            {msgs.map((m,i)=><Bubble key={i} msg={m}/>)}
            {typing && <Typing/>}
            <div ref={bottomRef}/>
          </div>

          <div style={{display:"flex",gap:8,padding:"6px 14px",overflowX:"auto",scrollbarWidth:"none"}}>
            {QUICK.map(q=>(
              <button key={q} onClick={()=>setInput(q)} style={{flexShrink:0,padding:"6px 12px",
                borderRadius:20,border:`1px solid ${C.borderHi}`,background:C.accentDim,
                color:C.accent,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>
                {q}
              </button>
            ))}
          </div>

          <div style={{padding:"8px 14px 14px",background:"rgba(7,17,30,.92)",
            backdropFilter:"blur(20px)",borderTop:`1px solid ${C.border}`,
            display:"flex",gap:10,alignItems:"flex-end"}}>
            <div style={{flex:1,position:"relative"}}>
              <textarea rows={1} value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={handleKey} placeholder="Спроси Егеря..."
                style={{width:"100%",resize:"none",background:C.surfaceHi,
                  border:`1px solid ${C.border}`,borderRadius:16,
                  padding:"11px 42px 11px 14px",color:C.text,fontSize:14,
                  outline:"none",lineHeight:1.4,boxSizing:"border-box",
                  backdropFilter:"blur(12px)",transition:"border-color .2s"}}
                onFocus={e=>e.target.style.borderColor=C.borderHi}
                onBlur={e=>e.target.style.borderColor=C.border}/>
              <Mic size={17} color={C.dimmer}
                style={{position:"absolute",right:12,bottom:13,cursor:"pointer"}}/>
            </div>
            <button onClick={send} disabled={!input.trim()} style={{
              width:46,height:46,borderRadius:"50%",border:"none",flexShrink:0,
              background:input.trim()?`linear-gradient(135deg,#1a8a50,${C.accent})`:C.surface,
              cursor:input.trim()?"pointer":"not-allowed",
              display:"flex",alignItems:"center",justifyContent:"center",
              boxShadow:input.trim()?`0 4px 16px ${C.accentGlow}`:"none",transition:"all .25s"}}>
              <Send size={18} color={input.trim()?"#07111e":C.dimmer}/>
            </button>
          </div>
        </div>
      );
    }

    /* ─── MAP SCREEN ─── */
    function MapScreen() {
      const areas=["Дон — Аксайский р-н","Мёртвый Донец","Левобережные заводи","Азовское море (Таганрог)"];
      return (
        <div style={{height:"100%",display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",padding:24,gap:20}}>
          <div style={{...glass(`0 0 0 1px ${C.borderHi}`),padding:32,textAlign:"center",maxWidth:280}}>
            <MapIcon size={52} color={C.accent} style={{marginBottom:16,
              filter:`drop-shadow(0 0 14px ${C.accent})`}}/>
            <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:8}}>Карта водоёмов</div>
            <div style={{fontSize:13,color:C.muted,lineHeight:1.7}}>
              Интерактивная карта рыбных мест Дона и Ростовской области.<br/>
              <span style={{color:C.accent,fontWeight:600}}>В разработке — скоро!</span>
            </div>
          </div>
          <div style={{...glass(),padding:16,width:"100%",maxWidth:320}}>
            {areas.map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",
                borderBottom:i<3?`1px solid ${C.border}`:"none"}}>
                <MapPin size={14} color={C.accent}/>
                <span style={{fontSize:13,color:C.text}}>{r}</span>
                <ChevronRight size={13} color={C.dimmer} style={{marginLeft:"auto"}}/>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ─── PROFILE SCREEN ─── */
    function ProfileScreen() {
      const stats=[{label:"Уловов",val:"47"},{label:"Рекорд (кг)",val:"12.3"},{label:"Дней",val:"38"}];
      const menu=[
        {Icon:Clock,       label:"История уловов"},
        {Icon:MapPin,      label:"Мои точки"},
        {Icon:AlertCircle, label:"Уведомления"},
        {Icon:Gauge,       label:"Настройки"},
      ];
      return (
        <div style={{padding:"16px 14px",overflowY:"auto",height:"100%"}}>
          <div style={{...glass(`0 0 0 1px ${C.borderHi}`),
            background:"linear-gradient(135deg,rgba(46,204,113,.12),rgba(59,130,246,.08))",
            padding:24,textAlign:"center",marginBottom:14}}>
            <div style={{width:72,height:72,borderRadius:"50%",margin:"0 auto 12px",
              background:`linear-gradient(135deg,${C.accent},${C.cyan})`,
              display:"flex",alignItems:"center",justifyContent:"center",
              boxShadow:`0 0 24px ${C.accentGlow}`}}>
              <User size={32} color="#07111e"/>
            </div>
            <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:2}}>Рыбак Донской</div>
            <div style={{fontSize:12,color:C.muted}}>Аксайский район · с 2018</div>
            <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:10}}>
              {[1,2,3,4,5].map(i=><Star key={i} size={14} color={C.gold} fill={C.gold}/>)}
            </div>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            {stats.map(s=>(
              <div key={s.label} style={{...glass(),flex:1,padding:"14px 8px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:800,color:C.accent,
                  filter:`drop-shadow(0 0 8px ${C.accent})`}}>{s.val}</div>
                <div style={{fontSize:10,color:C.dimmer,marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>
          {menu.map(({Icon,label})=>(
            <div key={label} style={{...glass(),padding:"14px 16px",marginBottom:8,
              display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
              <Icon size={18} color={C.accent}/>
              <span style={{fontSize:14,color:C.text,flex:1}}>{label}</span>
              <ChevronRight size={15} color={C.dimmer}/>
            </div>
          ))}
        </div>
      );
    }

    /* ─── ROOT APP ─── */
    function App() {
      const [tab, setTab] = useState("home");
      const NAV = [
        {id:"home",    label:"Главная", Icon:Home},
        {id:"chat",    label:"Егерь",   Icon:Fish},
        {id:"map",     label:"Карта",   Icon:MapIcon},
        {id:"profile", label:"Профиль", Icon:User},
      ];
      return (
        <div style={{maxWidth:430,margin:"0 auto",height:"100dvh",display:"flex",
          flexDirection:"column",background:"linear-gradient(180deg,#07111e 0%,#0a192f 100%)",
          position:"relative",overflow:"hidden"}}>

          {/* ambient orbs */}
          <div style={{position:"absolute",top:-100,left:-60,width:280,height:280,
            borderRadius:"50%",pointerEvents:"none",zIndex:0,
            background:"radial-gradient(circle,rgba(46,204,113,.08) 0%,transparent 70%)"}}/>
          <div style={{position:"absolute",bottom:80,right:-80,width:240,height:240,
            borderRadius:"50%",pointerEvents:"none",zIndex:0,
            background:"radial-gradient(circle,rgba(34,211,238,.07) 0%,transparent 70%)"}}/>

          {/* header */}
          <header style={{padding:"48px 16px 12px",display:"flex",alignItems:"center",
            justifyContent:"space-between",background:"rgba(7,17,30,.85)",
            backdropFilter:"blur(24px)",borderBottom:`1px solid ${C.border}`,
            position:"relative",zIndex:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:40,height:40,borderRadius:12,
                background:`linear-gradient(135deg,${C.accent},${C.cyan})`,
                display:"flex",alignItems:"center",justifyContent:"center",
                boxShadow:`0 4px 18px ${C.accentGlow}`}}>
                <Fish size={21} color="#07111e"/>
              </div>
              <div>
                <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:24,
                  letterSpacing:2.5,lineHeight:1,
                  background:"linear-gradient(90deg,#fff 20%,#2ecc71 80%)",
                  WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                  Егерь ИИ
                </div>
                <div style={{fontSize:10,color:C.dimmer,letterSpacing:.5}}>
                  Умный помощник рыбака
                </div>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
              <div style={{display:"flex",alignItems:"center",gap:5,background:C.accentDim,
                border:`1px solid ${C.borderHi}`,borderRadius:20,padding:"4px 10px"}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:C.accent,
                  animation:"pulseGlow 2s ease infinite",boxShadow:`0 0 6px ${C.accent}`}}/>
                <MapPin size={11} color={C.accent}/>
                <span style={{fontSize:10,color:C.accent,fontWeight:700,letterSpacing:.3}}>
                  Аксайский р-н
                </span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:5,
                background:"rgba(34,211,238,.1)",border:"1px solid rgba(34,211,238,.3)",
                borderRadius:20,padding:"4px 10px"}}>
                <WaveIcon size={14}/>
                <span style={{fontSize:10,color:C.cyan,fontWeight:700}}>Дон +40 см</span>
              </div>
            </div>
          </header>

          {/* main */}
          <main style={{flex:1,overflow:"hidden",position:"relative",zIndex:1}}>
            {tab==="home"    && <HomeScreen onGoChat={()=>setTab("chat")}/>}
            {tab==="chat"    && <ChatScreen/>}
            {tab==="map"     && <MapScreen/>}
            {tab==="profile" && <ProfileScreen/>}
          </main>

          {/* bottom nav */}
          <nav style={{display:"flex",background:"rgba(7,17,30,.95)",
            backdropFilter:"blur(24px)",borderTop:`1px solid ${C.border}`,
            paddingBottom:"env(safe-area-inset-bottom,8px)",position:"relative",zIndex:10}}>
            {NAV.map(({id,label,Icon})=>{
              const active=tab===id;
              return (
                <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"10px 0 8px",
                  background:"none",border:"none",cursor:"pointer",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
                  {active && (
                    <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",
                      width:28,height:2.5,borderRadius:2,background:C.accent,
                      boxShadow:`0 0 10px ${C.accent}`}}/>
                  )}
                  <div style={{width:38,height:38,borderRadius:11,
                    background:active?C.accentDim:"transparent",
                    border:`1px solid ${active?C.borderHi:"transparent"}`,
                    display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                    <Icon size={19} color={active?C.accent:C.dimmer}
                      style={active?{filter:`drop-shadow(0 0 6px ${C.accent})`}:undefined}/>
                  </div>
                  <span style={{fontSize:9.5,letterSpacing:.3,
                    fontWeight:active?700:500,color:active?C.accent:C.dimmer}}>
                    {label}
                  </span>
                </button>
              );
            })}
          </nav>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
